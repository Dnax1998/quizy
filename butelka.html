<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Licznik Kaucji Live - Korekta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --secondary: #3498db;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        .counter-display {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .progress-container {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            height: 25px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #2ecc71, #f1c40f);
            transition: width 0.8s ease;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        .btn-add { background: rgba(255, 255, 255, 0.25); font-size: 1rem; }
        .btn-add:hover { background: rgba(255, 255, 255, 0.35); transform: translateY(-2px); }

        .btn-remove { 
            background: rgba(231, 76, 60, 0.4); 
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .btn-remove:hover { background: rgba(231, 76, 60, 0.6); }

        button:active { transform: scale(0.95); }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            padding: 10px 20px;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kaucjometr Live</h1>
    <div class="counter-display" id="total">Wczytywanie...</div>

    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>

    <div class="button-grid">
        <div class="action-group">
            <button class="btn-add" onclick="updateFirebase(0.5)">🥤 Plastik/Puszka<br>+0,50 zł</button>
            <button class="btn-remove" onclick="updateFirebase(-0.5)">Usuń -0,50 zł</button>
        </div>

        <div class="action-group">
            <button class="btn-add" onclick="updateFirebase(1.0)">🍾 Szkło<br>+1,00 zł</button>
            <button class="btn-remove" onclick="updateFirebase(-1.0)">Usuń -1,00 zł</button>
        </div>
    </div>
</div>

<div id="toast" class="toast-msg">Zaktualizowano dane!</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const counterRef = ref(db, 'counter/value');
    const MAX_VAL = 500000;

    onValue(counterRef, (snapshot) => {
        const value = snapshot.val() || 0;
        updateUI(value);
    });

    window.updateFirebase = function(amount) {
        runTransaction(counterRef, (currentValue) => {
            let newValue = (currentValue || 0) + amount;
            
            // Zabezpieczenie przed ujemnym bilansem
            if (newValue < 0) newValue = 0;
            // Zabezpieczenie przed przekroczeniem limitu
            if (newValue > MAX_VAL) newValue = MAX_VAL;
            
            return newValue;
        }).then(() => {
            showToast();
        });
    };

    function updateUI(val) {
        document.getElementById('total').innerText = val.toLocaleString('pl-PL', { minimumFractionDigits: 2 }) + ' zł';
        const percentage = (val / MAX_VAL) * 100;
        document.getElementById('progress').style.width = percentage + '%';
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
    }
</script>

</body>
</html>
