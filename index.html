<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazyn WMS - System Etykiet</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Twoje style CSS - zachowaj oryginalne */
    </style>
</head>
<body>
    <div class="app">
        </div>

<script>
    // 1. KONFIGURACJA (Pamiętaj, żeby tu wkleić swoje dane z firebaseConfig)
    const firebaseConfig = { /* ... Twoje dane ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. FUNKCJA ZAPISU (Tu dzieje się magia etykiet)
    saveSlotBtn.addEventListener('click', async () => {
        if (!currentEditingLocation) return;
        const newBatches = collectBatchesFromForm(); // Twoja istniejąca funkcja zbierająca dane
        
        try {
            const slotRef = db.collection("slots").doc(currentEditingLocation);
            // Pobieramy stan przed zapisem, aby wiedzieć, czy etykieta była już wykorzystana
            const oldBatchesSnapshot = await slotRef.collection("batches").get();
            const oldBatches = oldBatchesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Usuwamy stare partie z subkolekcji
            await Promise.all(oldBatchesSnapshot.docs.map(doc => doc.ref.delete()));
            
            // Przetwarzamy nowe partie
            for (const b of newBatches) {
                if (b.productId) {
                    const oldBatch = oldBatches.find(o => o.productId === b.productId && o.signature === b.signature);
                    
                    // Jeśli zaznaczono "Oklejony" (a wcześniej nie był) -> Odejmij 1
                    if (b.oklejony && (!oldBatch || !oldBatch.oklejony)) {
                        await db.collection("products").doc(b.productId).update({
                            ilosc_etykiet: firebase.firestore.FieldValue.increment(-1)
                        });
                    }
                    // Jeśli odznaczono "Oklejony" (a wcześniej był) -> Dodaj 1 (zwrot)
                    else if (!b.oklejony && oldBatch && oldBatch.oklejony) {
                        await db.collection("products").doc(b.productId).update({
                            ilosc_etykiet: firebase.firestore.FieldValue.increment(1)
                        });
                    }
                }
                // Zapisujemy nową partię do subkolekcji
                await slotRef.collection("batches").add(b);
            }
            
            editModal.style.display = 'none';
            renderCurrentRack(); // Odśwież widok
        } catch (err) {
            alert('Błąd zapisu: ' + err.message);
        }
    });

    // 3. FUNKCJA CZYSZCZENIA (Tu odzyskujemy etykiety)
    clearSlotBtn.addEventListener('click', async () => {
        if (!currentEditingLocation) return;
        if (!confirm('Na pewno czyścisz miejsce? Etykiety wrócą na stan!')) return;
        
        try {
            const slotRef = db.collection("slots").doc(currentEditingLocation);
            const batches = await slotRef.collection("batches").get();
            
            for (const doc of batches.docs) {
                const b = doc.data();
                // Jeśli partia była oklejona, zwróć etykietę do puli produktu
                if (b.oklejony && b.productId) {
                    await db.collection("products").doc(b.productId).update({
                        ilosc_etykiet: firebase.firestore.FieldValue.increment(1)
                    });
                }
                await doc.ref.delete();
            }
            await slotRef.delete();
            editModal.style.display = 'none';
            renderCurrentRack();
        } catch (err) {
            alert('Błąd: ' + err.message);
        }
    });

    // Reszta Twojego kodu JS...
</script>
</body>
</html>
