<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System kompletacji paczek</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

button{
padding:15px;
font-size:18px;
margin:10px;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
border:3px solid #333;
border-radius:10px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#eee;
margin:6px;
padding:12px;
border-radius:6px;
font-size:18px;
}

.done{
background:#9be79b;
}

</style>

</head>
<body>

<h1>📦 System kompletacji</h1>

<h2>1️⃣ Zrób zdjęcie dokumentu</h2>

<input type="file" id="photoInput" accept="image/*" capture="environment">

<button onclick="scanPhoto()">📄 Odczytaj dokument</button>

<h2>Lista produktów</h2>

<ul id="productList"></ul>

<h2>2️⃣ Skanuj produkty</h2>

<button onclick="startScanner()">📷 Skanuj kod</button>

<div id="scanner"></div>

<script>

let order=[];

const list=document.getElementById("productList");

/* tutaj wpisujesz kody kreskowe produktów */

const productCodes={

"8720359200198":"ALOE VERA GEL",
"8720359205773":"FOREVER ALOE MANGO",
"5909876543210":"MINERAŁY NATURE-MIN"

};

function render(){

list.innerHTML="";

order.forEach(p=>{

let li=document.createElement("li");

li.innerText=p.name+" ("+p.picked+"/"+p.qty+")";

if(p.picked==p.qty){
li.classList.add("done");
}

list.appendChild(li);

});

}

/* OCR dokumentu */

function scanPhoto(){

const file=document.getElementById("photoInput").files[0];

if(!file) return;

Tesseract.recognize(
file,
'eng'
).then(({data:{text}})=>{

console.log(text);

order=[];

let lines=text.split("\n");

lines.forEach(line=>{

let match=line.match(/\d+\s+(\d+)\s+(.+)/);

if(match){

let qty=parseInt(match[1]);
let name=match[2].trim();

order.push({
name:name,
qty:qty,
picked:0
});

}

});

render();

});

}

/* skaner kodów */

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:["ean_reader","code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

let code=result.codeResult.code;

if(productCodes[code]){

let productName=productCodes[code];

order.forEach(p=>{

if(p.name.includes(productName) && p.picked<p.qty){
p.picked++;
}

});

}

render();

});

}

</script>

</body>
</html>
