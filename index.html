<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cenomat – inteligentna porównywarka cen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #0d1222 50%, #0a0f1c 100%);
            color: #eef2ff;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* efekt szkła */
        .glass {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 28px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* header z gradientem */
        .header {
            text-align: center;
            margin-bottom: 48px;
            position: relative;
        }

        .logo {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #38bdf8, #a855f7, #38bdf8);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sub {
            color: #94a3b8;
            margin-top: 12px;
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* pasek wyszukiwania premium */
        .search-wrapper {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 6px 6px 6px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            margin-bottom: 32px;
        }

        .search-wrapper:focus-within {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .search-wrapper i {
            color: #38bdf8;
            font-size: 1.2rem;
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.05rem;
            padding: 16px 0;
            color: #f1f5f9;
            font-weight: 500;
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: #475569;
            font-weight: 400;
        }

        .search-wrapper button {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .search-wrapper button:hover {
            transform: scale(0.97);
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            box-shadow: 0 6px 16px rgba(56, 189, 248, 0.4);
        }

        /* panel filtrów */
        .filter-panel {
            background: rgba(18, 25, 45, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 10px 20px 10px 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .sort-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sort-group label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .custom-select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 8px 20px;
            color: #e2e8f0;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            font-family: 'Inter', monospace;
            transition: 0.2s;
        }

        .custom-select:hover {
            border-color: #38bdf8;
        }

        .stats-badge {
            background: rgba(56, 189, 248, 0.12);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #b9e6fe;
        }

        /* karty produktów */
        .products-grid {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .product-card {
            background: linear-gradient(135deg, rgba(18, 25, 45, 0.9), rgba(12, 18, 32, 0.95));
            backdrop-filter: blur(4px);
            border-radius: 32px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 12px 24px -12px rgba(0,0,0,0.5);
        }

        .product-card:hover {
            border-color: rgba(56, 189, 248, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 24px 36px -14px rgba(0,0,0,0.6);
        }

        .product-header {
            padding: 22px 28px;
            background: rgba(56, 189, 248, 0.03);
            border-bottom: 1px solid rgba(56, 189, 248, 0.12);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .product-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #f0f9ff, #bae6fd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .best-price-badge {
            background: rgba(34, 197, 94, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .offers-list {
            padding: 16px 20px 24px;
        }

        .offer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 16px 12px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
            transition: background 0.2s;
            border-radius: 20px;
        }

        .offer-item:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        .shop-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 160px;
        }

        .shop-icon {
            width: 36px;
            height: 36px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #38bdf8;
        }

        .shop-name {
            font-weight: 700;
            font-size: 1rem;
            color: #e2e8f0;
        }

        .price-block {
            text-align: right;
            min-width: 140px;
        }

        .price-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #facc15;
            letter-spacing: -0.5px;
        }

        .delivery {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .cheapest-tag {
            background: #22c55e20;
            color: #4ade80;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 10px;
            border: 1px solid #22c55e40;
        }

        .offer-link {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.4);
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            color: #bae6fd;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .offer-link:hover {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        .no-results {
            text-align: center;
            padding: 70px 30px;
            background: rgba(18, 25, 45, 0.6);
            border-radius: 48px;
            border: 1px dashed #38bdf8;
        }

        .no-results i {
            font-size: 3rem;
            color: #38bdf8;
            margin-bottom: 20px;
            opacity: 0.7;
        }

        footer {
            margin-top: 60px;
            text-align: center;
            padding: 28px 0 20px;
            border-top: 1px solid rgba(71, 85, 105, 0.4);
            font-size: 0.75rem;
            color: #64748b;
        }

        @media (max-width: 800px) {
            .offer-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .price-block {
                text-align: left;
                width: 100%;
            }
            .product-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .search-wrapper {
                padding: 5px 5px 5px 18px;
            }
            .search-wrapper button {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <i class="fas fa-chart-line"></i> Cenomat
        </div>
        <div class="sub">Znajdź najniższą cenę w sekundę · Porównaj sklepy · Oszczędzaj mądrze</div>
    </div>

    <div class="search-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Szukaj produktu... np. iPhone 14, Samsung A54, słuchawki Sony">
        <button id="searchBtn"><i class="fas fa-bolt"></i> Szukaj</button>
    </div>

    <div class="filter-panel">
        <div class="sort-group">
            <label><i class="fas fa-arrow-down-wide-short"></i> Sortuj:</label>
            <select id="sortSelect" class="custom-select">
                <option value="default">✨ Najlepsze oferty</option>
                <option value="price_asc">💰 Od najtańszego produktu</option>
                <option value="name_asc">📦 Nazwa A-Z</option>
            </select>
        </div>
        <div class="stats-badge" id="statsInfo">
            <i class="fas fa-database"></i> <span>Wpisz produkt</span>
        </div>
    </div>

    <div id="resultsContainer" class="products-grid"></div>

    <footer>
        <i class="fas fa-shield-alt"></i> Dane przykładowe · W pełni darmowa wersja demonstracyjna · 
        Po dodaniu własnych linków afiliacyjnych zacznij zarabiać
    </footer>
</div>

<script>
    // ---------- DANE PRODUKTÓW (pięknie rozbudowane) ----------
    const productsData = [
        { id: 1, name: "Samsung Galaxy A54 5G 128GB", offers: [{ shop: "Media Expert", price: 1299.99, delivery: "darmowa dostawa", url: "#" }, { shop: "x-kom", price: 1349.00, delivery: "odbiór w salonie", url: "#" }, { shop: "Allegro", price: 1250.00, delivery: "smart! gratis", url: "#" }, { shop: "Euro RTV AGD", price: 1399.00, delivery: "wysyłka gratis", url: "#" }] },
        { id: 2, name: "iPhone 14 128GB", offers: [{ shop: "Media Expert", price: 3999.00, delivery: "gratis", url: "#" }, { shop: "x-kom", price: 3899.00, delivery: "odbiór osobisty", url: "#" }, { shop: "Allegro", price: 3799.00, delivery: "0 zł Smart", url: "#" }, { shop: "iSpot", price: 4099.00, delivery: "+19 zł", url: "#" }] },
        { id: 3, name: "Myszka Logitech MX Master 3S", offers: [{ shop: "Media Expert", price: 429.99, delivery: "darmowa", url: "#" }, { shop: "x-kom", price: 419.00, delivery: "odbiór", url: "#" }, { shop: "Allegro", price: 399.00, delivery: "+9 zł", url: "#" }, { shop: "Morele", price: 415.00, delivery: "kurier 0 zł", url: "#" }] },
        { id: 4, name: "Słuchawki Sony WH-1000XM4", offers: [{ shop: "Media Expert", price: 1099.00, delivery: "darmowa", url: "#" }, { shop: "x-kom", price: 1049.00, delivery: "odbiór", url: "#" }, { shop: "Allegro", price: 999.00, delivery: "gratis", url: "#" }, { shop: "Euro RTV AGD", price: 1050.00, delivery: "+10 zł", url: "#" }] },
        { id: 5, name: "Laptop ASUS Zenbook 14 OLED", offers: [{ shop: "Media Expert", price: 5299.00, delivery: "gratis", url: "#" }, { shop: "x-kom", price: 5199.00, delivery: "odbiór", url: "#" }, { shop: "Allegro", price: 4999.00, delivery: "0 zł", url: "#" }] }
    ];

    function getMinPrice(offers) {
        return Math.min(...offers.map(o => o.price));
    }

    function sortProducts(products, sortType) {
        const copy = [...products];
        if (sortType === "price_asc") copy.sort((a,b) => getMinPrice(a.offers) - getMinPrice(b.offers));
        else if (sortType === "name_asc") copy.sort((a,b) => a.name.localeCompare(b.name));
        else copy.sort((a,b) => getMinPrice(a.offers) - getMinPrice(b.offers));
        return copy;
    }

    function filterProducts(products, query) {
        if (!query.trim()) return products;
        return products.filter(p => p.name.toLowerCase().includes(query.toLowerCase()));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function render(productsToRender) {
        const container = document.getElementById('resultsContainer');
        const statsSpan = document.getElementById('statsInfo');

        if (!productsToRender.length) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-store-slash"></i><h3>Nie znaleziono produktów</h3><p style="color:#94a3b8">Spróbuj wpisać inną nazwę :)</p></div>`;
            statsSpan.innerHTML = `<i class="fas fa-search-minus"></i> Brak wyników`;
            return;
        }

        let totalOffersCount = 0;
        let html = '';

        for (let product of productsToRender) {
            const minPrice = getMinPrice(product.offers);
            const sortedOffers = [...product.offers].sort((a,b) => a.price - b.price);
            totalOffersCount += sortedOffers.length;

            html += `<div class="product-card">
                        <div class="product-header">
                            <h2><i class="fas fa-tag" style="font-size:1.2rem; margin-right:10px; color:#38bdf8"></i>${escapeHtml(product.name)}</h2>
                            <div class="best-price-badge"><i class="fas fa-crown"></i> Najniższa: ${minPrice.toFixed(2)} zł</div>
                        </div>
                        <div class="offers-list">`;

            for (let offer of sortedOffers) {
                const isCheapest = (offer.price === minPrice);
                html += `<div class="offer-item">
                            <div class="shop-info">
                                <div class="shop-icon"><i class="fas fa-store"></i></div>
                                <span class="shop-name">${escapeHtml(offer.shop)}</span>
                                ${isCheapest ? '<span class="cheapest-tag"><i class="fas fa-gem"></i> NAJTAŃSZE</span>' : ''}
                            </div>
                            <div class="price-block">
                                <div class="price-value">${offer.price.toFixed(2)} zł</div>
                                <div class="delivery"><i class="fas fa-truck"></i> ${escapeHtml(offer.delivery)}</div>
                            </div>
                            <a href="${escapeHtml(offer.url)}" class="offer-link" target="_blank" rel="noopener"><i class="fas fa-arrow-right"></i> Sprawdź ofertę</a>
                        </div>`;
            }
            html += `</div></div>`;
        }

        container.innerHTML = html;
        statsSpan.innerHTML = `<i class="fas fa-chart-simple"></i> ${productsToRender.length} produktów · ${totalOffersCount} ofert`;
    }

    // Stan aplikacji
    let currentQuery = "";
    let currentSort = "default";
    let currentFiltered = [...productsData];

    function update() {
        let filtered = filterProducts(productsData, currentQuery);
        const sorted = sortProducts(filtered, currentSort);
        currentFiltered = sorted;
        render(sorted);
    }

    // Eventy DOM
    document.getElementById('searchBtn').addEventListener('click', () => {
        currentQuery = document.getElementById('searchInput').value;
        update();
    });
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });
    document.getElementById('sortSelect').addEventListener('change', (e) => {
        currentSort = e.target.value;
        update();
    });

    window.addEventListener('DOMContentLoaded', () => {
        update();
    });
</script>
</body>
</html>
