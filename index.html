<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zdrowie Psychiczne - pełnoekranowa infografika</title>
    <style>
        /* Reset marginesów i paddingu – obrazek ma wypełnić całe okno */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f7ff; /* kolor tła na wypadek gdyby obrazek nie wypełnił idealnie */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Link (klikalny obszar) zajmuje całą przestrzeń */
        .fullscreen-link {
            display: block;
            width: 100vw;
            height: 100vh;
            text-decoration: none;
        }

        /* Obrazek – ma wypełnić cały ekran, ale bez przycinania treści */
        .fullscreen-img {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* cały obrazek widoczny – może zostawić puste pasy po bokach/górze */
            /* object-fit: cover;  /* odkomentuj, jeśli chcesz wypełnić całkowicie (przycina treść) */
            cursor: pointer;
        }

        /* Dla lepszego efektu – jeśli wolisz całkowite wypełnienie bez pasów, użyj cover */
        /* UWAGA: przy cover część tekstu może być ucięta – sprawdź na swojej grafice */
    </style>
</head>
<body>
    <a href="https://docelowy-link.pl" target="_blank" rel="noopener noreferrer" class="fullscreen-link">
        <img src="IMG_2535.png" alt="Zdrowie psychiczne – telefony zaufania, poradnie, wsparcie" class="fullscreen-img">
    </a>
</body>
</html>
