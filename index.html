<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Magazyn Regały + Partie</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; padding: 16px; background: #f4f6f9; }
        .app { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin: 0 0 8px 0; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .top-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .search-group { display: flex; gap: 8px; flex: 2; min-width: 250px; }
        .search-box { flex: 1; padding: 12px 16px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .btn-secondary { background: white; border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 40px; font-weight: 600; color: #1e293b; cursor: pointer; white-space: nowrap; }
        .racks-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .rack-tab { padding: 12px 24px; background: none; border: none; font-size: 18px; font-weight: 600; color: #64748b; cursor: pointer; border-radius: 20px 20px 0 0; transition: 0.2s; }
        .rack-tab.active { color: #2563eb; background: white; box-shadow: 0 -2px 8px rgba(0,0,0,0.02); }
        .rack-container { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .shelf { margin-bottom: 16px; }
        .shelf-label { font-weight: 700; margin-bottom: 6px; color: #334155; font-size: 14px; display: flex; justify-content: space-between; }
        .slots { display: grid; grid-template-columns: repeat(21, 1fr); gap: 6px; }
        .slot { aspect-ratio: 1 / 1.2; background: #f1f5f9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #1e293b; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; padding: 4px 2px; text-align: center; line-height: 1.2; box-shadow: inset 0 1px 3px rgba(0,0,0,0.03); }
        .slot.occupied-mag { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .slot.occupied-sped { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .slot.occupied-other { background: #dbeafe; border-color: #3b82f6; color: #1e3a8a; }
        .slot:hover { background: #e2e8f0; transform: scale(0.98); }
        .slot-code { font-size: 9px; opacity: 0.7; margin-bottom: 2px; }
        .slot-data { font-size: 10px; }

        /* Modale */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; border-radius: 28px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-card h3 { margin-top: 0; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; color: #334155; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 16px; background: white; }
        .btn { padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; background: #e2e8f0; color: #1e293b; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .flex-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
        .status-badge { font-size: 12px; background: #cbd5e1; padding: 2px 8px; border-radius: 20px; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 2000; }

        /* Lista partii */
        .batch-list { margin-top: 8px; }
        .batch-item { background: #f8fafc; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .batch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .batch-fields { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
        .batch-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; padding: 0 4px; }
        .add-batch-btn { margin-top: 8px; width: 100%; }

        /* Produkty */
        .product-list { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .product-info { font-size: 14px; }
        .product-actions { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 20px; }
        .icon-btn:hover { background: #e2e8f0; }
    </style>
</head>
<body>
<div class="app">
    <h1>📦 Magazyn Regały <span style="font-size: 14px; background: #e2e8f0; padding: 4px 12px; border-radius: 40px;">A · B · C (5x21)</span></h1>
    
    <div class="top-bar">
        <div class="search-group">
            <input type="text" id="searchProductInput" class="search-box" placeholder="🔍 Produkt / kod" autocomplete="off">
            <input type="text" id="searchDateInput" class="search-box" placeholder="📅 Data (np. 1.04.2026)" autocomplete="off">
        </div>
        <button class="btn-secondary" id="clearSearchBtn">✖ Wyczyść</button>
        <button class="btn-secondary" id="manageProductsBtn">📋 Produkty</button>
    </div>

    <div class="racks-tabs">
        <button class="rack-tab active" data-rack="A">Regał A</button>
        <button class="rack-tab" data-rack="B">Regał B</button>
        <button class="rack-tab" data-rack="C">Regał C</button>
    </div>

    <div id="rackView" class="rack-container">
        <div style="text-align: center; padding: 40px; color: #64748b;">Ładowanie danych...</div>
    </div>
</div>

<!-- Modal edycji pola (z partiami) -->
<div class="modal" id="editModal">
    <div class="modal-card">
        <h3>Pole <span id="locationCodeDisplay"></span></h3>
        <div class="form-group">
            <label>📦 Wybierz produkt</label>
            <select id="productSelect" style="width:100%; padding:12px; border-radius:16px; border:1px solid #cbd5e1;">
                <option value="">-- Wybierz z listy --</option>
            </select>
            <div style="font-size:12px; margin-top:4px; color:#64748b;">lub <a href="#" id="addNewProductLink" style="color:#2563eb;">dodaj nowy produkt</a></div>
        </div>
        <div class="form-group">
            <label>🏷️ Nazwa (wyświetlana)</label>
            <input type="text" id="productNameDisplay" readonly disabled style="background:#f8fafc;">
        </div>
        <div class="form-group">
            <label>🔢 Kod produktu</label>
            <input type="text" id="productCode" readonly disabled style="background:#f8fafc;">
        </div>
        <div class="form-group">
            <label>🚚 Typ palety</label>
            <select id="palletType">
                <option value="magazynowa">🔴 Magazynowa (czerwony)</option>
                <option value="spedycyjna">🟢 Spedycyjna (zielony)</option>
            </select>
        </div>
        
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #e2e8f0;">
        <label style="font-weight:600;">📦 Partie towaru</label>
        <div id="batchesContainer" class="batch-list"></div>
        <button class="btn btn-secondary add-batch-btn" id="addBatchBtn">➕ Dodaj partię</button>
        
        <div class="flex-row">
            <button class="btn" id="cancelEditBtn">Anuluj</button>
            <button class="btn btn-primary" id="saveSlotBtn">Zapisz</button>
            <button class="btn btn-danger" id="clearSlotBtn">Wyczyść pole</button>
        </div>
    </div>
</div>

<!-- Modal produktów -->
<div class="modal" id="productsModal">
    <div class="modal-card">
        <h3>📋 Baza produktów</h3>
        <div style="margin-bottom:20px;">
            <div class="form-group">
                <label>Nazwa produktu</label>
                <input type="text" id="newProductName" placeholder="np. Dezodorant 067">
            </div>
            <div class="form-group">
                <label>Kod produktu</label>
                <input type="text" id="newProductCode" placeholder="IND-12345">
            </div>
            <div class="form-group">
                <label>Domyślna ilość na palecie (szt.)</label>
                <input type="number" id="newProductQty" min="0" step="1" value="1">
            </div>
            <button class="btn btn-primary" id="addProductBtn" style="width:100%;">➕ Dodaj produkt</button>
        </div>
        <div class="product-list" id="productsListContainer">
            <div style="text-align:center; color:#64748b;">Ładowanie...</div>
        </div>
        <div class="flex-row">
            <button class="btn" id="closeProductsBtn">Zamknij</button>
        </div>
    </div>
</div>

<div id="toast" class="toast-msg">Zapisano</div>

<script>
    // ========== KONFIGURACJA FIREBASE ==========
    // 👇 WKLEJ SWÓJ KLUCZ Z KONSOLI FIREBASE 👇
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };
    // 👆 KONIEC KONFIGURACJI 👆

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const RACKS = ['A', 'B', 'C'];
    const LEVELS = 5;
    const COLUMNS = 21;
    let currentRack = 'A';
    let allSlotsData = {};
    let slotBatches = {};
    let productsList = [];
    let unsubscribeSlots = null;
    let unsubscribeProducts = null;
    let unsubscribeBatches = null;

    // DOM
    const rackView = document.getElementById('rackView');
    const searchProductInput = document.getElementById('searchProductInput');
    const searchDateInput = document.getElementById('searchDateInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const tabs = document.querySelectorAll('.rack-tab');
    
    const editModal = document.getElementById('editModal');
    const locCodeSpan = document.getElementById('locationCodeDisplay');
    const productSelect = document.getElementById('productSelect');
    const productNameDisplay = document.getElementById('productNameDisplay');
    const productCodeInp = document.getElementById('productCode');
    const palletType = document.getElementById('palletType');
    const batchesContainer = document.getElementById('batchesContainer');
    const saveSlotBtn = document.getElementById('saveSlotBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const clearSlotBtn = document.getElementById('clearSlotBtn');
    const addNewProductLink = document.getElementById('addNewProductLink');
    const addBatchBtn = document.getElementById('addBatchBtn');
    
    const productsModal = document.getElementById('productsModal');
    const newProductName = document.getElementById('newProductName');
    const newProductCode = document.getElementById('newProductCode');
    const newProductQty = document.getElementById('newProductQty');
    const addProductBtn = document.getElementById('addProductBtn');
    const productsListContainer = document.getElementById('productsListContainer');
    const manageProductsBtn = document.getElementById('manageProductsBtn');
    const closeProductsBtn = document.getElementById('closeProductsBtn');
    
    const toast = document.getElementById('toast');
    
    let currentEditingLocation = null;
    let currentBatches = [];

    function getLocationId(rack, level, col) {
        return `R${rack}-P${level}-K${col}`;
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }

    // ========== SUBSKRYPCJE ==========
    function subscribeToSlots() {
        if (unsubscribeSlots) unsubscribeSlots();
        unsubscribeSlots = db.collection("slots").onSnapshot(snapshot => {
            allSlotsData = {};
            snapshot.forEach(doc => allSlotsData[doc.id] = doc.data());
            renderCurrentRack();
            applySearchHighlight();
        }, err => console.error("Slots error:", err));
    }

    function subscribeToBatches() {
        if (unsubscribeBatches) unsubscribeBatches();
        unsubscribeBatches = db.collectionGroup("batches").onSnapshot(snapshot => {
            slotBatches = {};
            snapshot.forEach(doc => {
                const locId = doc.ref.parent.parent.id;
                if (!slotBatches[locId]) slotBatches[locId] = [];
                slotBatches[locId].push({ id: doc.id, ...doc.data() });
            });
            Object.keys(slotBatches).forEach(locId => {
                slotBatches[locId].sort((a,b) => (a.prodDate?.seconds || 0) - (b.prodDate?.seconds || 0));
            });
            renderCurrentRack();
            applySearchHighlight();
        }, err => console.error("Batches error:", err));
    }

    function subscribeToProducts() {
        if (unsubscribeProducts) unsubscribeProducts();
        unsubscribeProducts = db.collection("products").onSnapshot(snapshot => {
            productsList = [];
            snapshot.forEach(doc => productsList.push({ id: doc.id, ...doc.data() }));
            productsList.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
            updateProductSelect();
            renderProductsList();
        }, err => console.error("Products error:", err));
    }

    // ========== RENDER REGAŁÓW (POPRAWIONY) ==========
    function renderCurrentRack() {
        let html = '';
        for (let level = 1; level <= LEVELS; level++) {
            html += `<div class="shelf"><div class="shelf-label"><span>📌 Poziom ${level}</span><span class="status-badge">${COLUMNS} pól</span></div><div class="slots">`;
            for (let col = 1; col <= COLUMNS; col++) {
                const locId = getLocationId(currentRack, level, col);
                const data = allSlotsData[locId] || null;
                const isOccupied = data && data.productName;
                let slotClass = '';
                if (isOccupied) {
                    if (data.palletType === 'magazynowa') slotClass = 'occupied-mag';
                    else if (data.palletType === 'spedycyjna') slotClass = 'occupied-sped';
                    else slotClass = 'occupied-other';
                }
                const productShort = isOccupied ? (data.productName.substring(0, 12) + (data.productName.length>12?'…':'')) : '';
                
                const batches = slotBatches[locId] || [];
                let totalCartons = 0, totalPieces = 0;
                batches.forEach(b => { totalCartons += b.cartons || 0; totalPieces += b.pieces || 0; });
                
                // Bezpieczne odczytanie starej ilości
                const oldQty = (data && data.quantity) ? `${data.quantity} szt` : '';
                const qtyStr = (totalCartons > 0 || totalPieces > 0) ? `${totalCartons}k ${totalPieces}szt` : oldQty;
                
                html += `<div class="slot ${slotClass}" data-location-id="${locId}">`;
                html += `<div class="slot-code">${level}-${col}</div>`;
                if (isOccupied) {
                    html += `<div class="slot-data" style="font-weight:700;">${productShort || '—'}</div>`;
                    if (batches.length > 0) {
                        const firstDate = batches[0].prodDate?.toDate();
                        if (firstDate) html += `<div class="slot-data" style="font-size:9px;">${firstDate.toLocaleDateString('pl-PL')}</div>`;
                        if (batches.length > 1) html += `<div class="slot-data">📦+${batches.length-1}</div>`;
                    } else if (data && data.prodDate) {
                        const d = data.prodDate.toDate ? data.prodDate.toDate() : new Date(data.prodDate);
                        html += `<div class="slot-data" style="font-size:9px;">${d.toLocaleDateString('pl-PL')}</div>`;
                    }
                    if (qtyStr) html += `<div class="slot-data">${qtyStr}</div>`;
                } else {
                    html += `<div class="slot-data" style="opacity:0.5;">puste</div>`;
                }
                html += `</div>`;
            }
            html += `</div></div>`;
        }
        rackView.innerHTML = html;
        document.querySelectorAll('.slot').forEach(slot => {
            slot.addEventListener('click', () => openEditModal(slot.dataset.locationId));
        });
    }

    // ========== WYSZUKIWANIE ==========
    function applySearchHighlight() {
        const productQuery = searchProductInput.value.trim().toLowerCase();
        const dateQuery = searchDateInput.value.trim();
        
        document.querySelectorAll('.slot').forEach(s => { s.style.outline = 'none'; s.style.boxShadow = ''; });
        if (!productQuery && !dateQuery) return;
        
        Object.entries(allSlotsData).forEach(([locId, data]) => {
            if (!data.productName && !data.productCode) return;
            
            let productMatch = true, dateMatch = true;
            
            if (productQuery) {
                const name = (data.productName || '').toLowerCase();
                const code = (data.productCode || '').toLowerCase();
                productMatch = name.includes(productQuery) || code.includes(productQuery);
            }
            
            if (dateQuery) {
                const batches = slotBatches[locId] || [];
                if (batches.length === 0 && data && data.prodDate) {
                    const d = data.prodDate.toDate ? data.prodDate.toDate() : new Date(data.prodDate);
                    const dateStr = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
                    dateMatch = dateStr.includes(dateQuery);
                } else {
                    dateMatch = batches.some(b => {
                        if (!b.prodDate) return false;
                        const d = b.prodDate.toDate();
                        const dateStr = `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
                        return dateStr.includes(dateQuery);
                    });
                }
            }
            
            if (productMatch && dateMatch) {
                const el = document.querySelector(`.slot[data-location-id="${locId}"]`);
                if (el) {
                    el.style.outline = '4px solid #fbbf24';
                    el.style.boxShadow = '0 0 0 4px rgba(251,191,36,0.3)';
                    if (!window._firstHighlightScrolled) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        window._firstHighlightScrolled = true;
                    }
                }
            }
        });
        window._firstHighlightScrolled = false;
    }

    searchProductInput.addEventListener('input', applySearchHighlight);
    searchDateInput.addEventListener('input', applySearchHighlight);
    clearSearchBtn.addEventListener('click', () => {
        searchProductInput.value = '';
        searchDateInput.value = '';
        applySearchHighlight();
    });

    // ========== OBSŁUGA PARTII ==========
    function renderBatchesList() {
        let html = '';
        currentBatches.forEach((batch, index) => {
            const dateVal = batch.prodDate ? batch.prodDate.toISOString().split('T')[0] : '';
            html += `<div class="batch-item" data-index="${index}">
                <div class="batch-header">
                    <span>Partia ${index+1}</span>
                    <button class="batch-remove" data-index="${index}">🗑️</button>
                </div>
                <div class="batch-fields">
                    <input type="date" class="batch-date" value="${dateVal}" placeholder="Data">
                    <input type="number" class="batch-cartons" placeholder="Kartony" min="0" value="${batch.cartons || 0}">
                    <input type="number" class="batch-pieces" placeholder="Sztuki" min="0" value="${batch.pieces || 0}">
                </div>
            </div>`;
        });
        batchesContainer.innerHTML = html || '<div style="color:#64748b; text-align:center;">Brak partii. Kliknij "Dodaj partię".</div>';
        
        document.querySelectorAll('.batch-remove').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                currentBatches.splice(idx, 1);
                renderBatchesList();
            });
        });
    }

    function collectBatchesFromForm() {
        const batches = [];
        document.querySelectorAll('.batch-item').forEach(item => {
            const dateInput = item.querySelector('.batch-date');
            const cartonsInput = item.querySelector('.batch-cartons');
            const piecesInput = item.querySelector('.batch-pieces');
            if (dateInput.value) {
                batches.push({
                    prodDate: firebase.firestore.Timestamp.fromDate(new Date(dateInput.value)),
                    cartons: parseInt(cartonsInput.value) || 0,
                    pieces: parseInt(piecesInput.value) || 0
                });
            }
        });
        return batches;
    }

    addBatchBtn.addEventListener('click', () => {
        currentBatches.push({ cartons: 0, pieces: 0 });
        renderBatchesList();
    });

    // ========== MODAL EDYCJI ==========
    function updateProductSelect() {
        productSelect.innerHTML = '<option value="">-- Wybierz z listy --</option>';
        productsList.forEach(prod => {
            const option = document.createElement('option');
            option.value = prod.id;
            option.textContent = `${prod.name} (${prod.code || 'brak kodu'})`;
            productSelect.appendChild(option);
        });
    }

    function openEditModal(locId) {
        currentEditingLocation = locId;
        locCodeSpan.textContent = locId;
        const data = allSlotsData[locId] || {};
        
        palletType.value = data.palletType || 'magazynowa';
        
        const productId = data.productId || '';
        const selectedProduct = productsList.find(p => p.id === productId);
        if (selectedProduct) {
            productSelect.value = selectedProduct.id;
            productNameDisplay.value = selectedProduct.name || '';
            productCodeInp.value = selectedProduct.code || '';
        } else {
            productSelect.value = '';
            productNameDisplay.value = data.productName || '';
            productCodeInp.value = data.productCode || '';
        }
        
        const batches = slotBatches[locId] || [];
        currentBatches = batches.map(b => ({
            id: b.id,
            prodDate: b.prodDate,
            cartons: b.cartons || 0,
            pieces: b.pieces || 0
        }));
        renderBatchesList();
        
        editModal.style.display = 'flex';
    }

    productSelect.addEventListener('change', () => {
        const selectedId = productSelect.value;
        const prod = productsList.find(p => p.id === selectedId);
        if (prod) {
            productNameDisplay.value = prod.name || '';
            productCodeInp.value = prod.code || '';
        } else {
            productNameDisplay.value = '';
            productCodeInp.value = '';
        }
    });

    addNewProductLink.addEventListener('click', (e) => {
        e.preventDefault();
        editModal.style.display = 'none';
        productsModal.style.display = 'flex';
    });

    saveSlotBtn.addEventListener('click', async () => {
        if (!currentEditingLocation) return;
        
        const selectedId = productSelect.value;
        let productData = {};
        if (selectedId) {
            const prod = productsList.find(p => p.id === selectedId);
            if (prod) {
                productData = {
                    productId: prod.id,
                    productName: prod.name,
                    productCode: prod.code || null
                };
            }
        } else {
            productData = {
                productName: productNameDisplay.value.trim() || null,
                productCode: productCodeInp.value.trim() || null,
                productId: null
            };
        }
        
        const type = palletType.value;
        const newBatches = collectBatchesFromForm();
        
        const slotData = {
            ...productData,
            palletType: type,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        try {
            const slotRef = db.collection("slots").doc(currentEditingLocation);
            await slotRef.set(slotData, { merge: true });
            
            const oldBatchesSnapshot = await slotRef.collection("batches").get();
            await Promise.all(oldBatchesSnapshot.docs.map(doc => doc.ref.delete()));
            
            for (const b of newBatches) {
                await slotRef.collection("batches").add({
                    prodDate: b.prodDate,
                    cartons: b.cartons,
                    pieces: b.pieces
                });
            }
            
            showToast('✅ Zapisano');
            editModal.style.display = 'none';
        } catch (err) {
            alert('Błąd zapisu: ' + err.message);
        }
    });

    clearSlotBtn.addEventListener('click', async () => {
        if (!currentEditingLocation) return;
        if (!confirm('Na pewno wyczyścić to pole (usunie też wszystkie partie)?')) return;
        try {
            const slotRef = db.collection("slots").doc(currentEditingLocation);
            const batchesSnapshot = await slotRef.collection("batches").get();
            await Promise.all(batchesSnapshot.docs.map(d => d.ref.delete()));
            await slotRef.delete();
            showToast('🗑️ Pole wyczyszczone');
            editModal.style.display = 'none';
        } catch (err) {
            alert('Błąd: ' + err.message);
        }
    });

    cancelEditBtn.addEventListener('click', () => editModal.style.display = 'none');

    // ========== PRODUKTY ==========
    function renderProductsList() {
        if (productsList.length === 0) {
            productsListContainer.innerHTML = '<div style="text-align:center; color:#64748b;">Brak produktów.</div>';
            return;
        }
        let html = '';
        productsList.forEach(prod => {
            html += `<div class="product-item">
                <div class="product-info">
                    <strong>${prod.name}</strong><br>
                    <span style="font-size:12px; color:#64748b;">Kod: ${prod.code || '—'} | Domyślnie: ${prod.defaultQty || 1} szt.</span>
                </div>
                <div class="product-actions">
                    <button class="icon-btn edit-product" data-id="${prod.id}">✏️</button>
                    <button class="icon-btn delete-product" data-id="${prod.id}">🗑️</button>
                </div>
            </div>`;
        });
        productsListContainer.innerHTML = html;
        document.querySelectorAll('.edit-product').forEach(btn => btn.addEventListener('click', () => editProduct(btn.dataset.id)));
        document.querySelectorAll('.delete-product').forEach(btn => btn.addEventListener('click', () => deleteProduct(btn.dataset.id)));
    }

    async function addProduct() {
        const name = newProductName.value.trim();
        if (!name) { alert('Podaj nazwę'); return; }
        try {
            await db.collection("products").add({
                name, code: newProductCode.value.trim() || null,
                defaultQty: parseInt(newProductQty.value) || 1,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            newProductName.value = newProductCode.value = ''; newProductQty.value = '1';
            showToast('✅ Produkt dodany');
        } catch (err) { alert('Błąd: ' + err.message); }
    }

    async function editProduct(id) {
        const prod = productsList.find(p => p.id === id);
        if (!prod) return;
        const newName = prompt('Nowa nazwa:', prod.name); if (newName === null) return;
        const newCode = prompt('Nowy kod:', prod.code || '');
        const newQty = prompt('Domyślna ilość:', prod.defaultQty || 1);
        if (!newName.trim()) { alert('Nazwa wymagana'); return; }
        try {
            await db.collection("products").doc(id).update({
                name: newName.trim(), code: newCode.trim() || null,
                defaultQty: parseInt(newQty) || 1
            });
            showToast('✅ Zaktualizowano');
        } catch (err) { alert('Błąd: ' + err.message); }
    }

    async function deleteProduct(id) {
        if (!confirm('Usunąć produkt?')) return;
        try { await db.collection("products").doc(id).delete(); showToast('🗑️ Usunięto'); }
        catch (err) { alert('Błąd: ' + err.message); }
    }

    addProductBtn.addEventListener('click', addProduct);
    manageProductsBtn.addEventListener('click', () => productsModal.style.display = 'flex');
    closeProductsBtn.addEventListener('click', () => productsModal.style.display = 'none');

    // ========== INICJALIZACJA ==========
    tabs.forEach(tab => tab.addEventListener('click', () => {
        currentRack = tab.dataset.rack;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCurrentRack();
        applySearchHighlight();
    }));

    window.addEventListener('click', (e) => {
        if (e.target === editModal) editModal.style.display = 'none';
        if (e.target === productsModal) productsModal.style.display = 'none';
    });

    subscribeToSlots();
    subscribeToBatches();
    subscribeToProducts();
</script>
</body>
</html>
