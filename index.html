<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Magazyn Regały 4x5x21 + PRZENOSZENIE + FIFO + CSV</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { margin: 0; padding: 16px; background: #f4f6f9; }
        .app { max-width: 1300px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin: 0 0 8px 0; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .top-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .search-group { display: flex; gap: 8px; flex: 2; min-width: 250px; }
        .search-box { flex: 1; padding: 12px 16px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 40px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .btn-secondary { background: white; border: 1px solid #cbd5e1; padding: 10px 18px; border-radius: 40px; font-weight: 600; color: #1e293b; cursor: pointer; white-space: nowrap; }
        .racks-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
        .rack-tab { padding: 12px 24px; background: none; border: none; font-size: 18px; font-weight: 600; color: #64748b; cursor: pointer; border-radius: 20px 20px 0 0; transition: 0.2s; }
        .rack-tab.active { color: #2563eb; background: white; box-shadow: 0 -2px 8px rgba(0,0,0,0.02); }
        .rack-container { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .shelf { margin-bottom: 16px; }
        .shelf-label { font-weight: 700; margin-bottom: 6px; color: #334155; font-size: 14px; display: flex; justify-content: space-between; }
        .slots { display: grid; grid-template-columns: repeat(21, 1fr); gap: 6px; }
        .slot { aspect-ratio: 1 / 1.2; background: #f1f5f9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #1e293b; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; padding: 4px 2px; text-align: center; line-height: 1.2; box-shadow: inset 0 1px 3px rgba(0,0,0,0.03); }
        .slot.occupied-mag { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .slot.occupied-sped { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .slot.occupied-other { background: #dbeafe; border-color: #3b82f6; color: #1e3a8a; }
        .slot:hover { background: #e2e8f0; transform: scale(0.98); }
        .slot-code { font-size: 9px; opacity: 0.7; margin-bottom: 2px; }
        .slot-data { font-size: 10px; }

        /* Tryb przenoszenia */
        body.move-mode .slot:not(.occupied-mag):not(.occupied-sped):not(.occupied-other) { background: #fef9c3; cursor: copy; border-color: #eab308; }
        body.move-mode .slot.occupied-mag, body.move-mode .slot.occupied-sped, body.move-mode .slot.occupied-other { cursor: not-allowed; opacity: 0.5; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; border-radius: 28px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-card h3 { margin-top: 0; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 6px; color: #334155; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 16px; background: white; }
        .btn { padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; background: #e2e8f0; color: #1e293b; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #eab308; color: white; }
        .flex-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
        .status-badge { font-size: 12px; background: #cbd5e1; padding: 2px 8px; border-radius: 20px; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 2000; }

        .batch-list { margin-top: 8px; }
        .batch-item { background: #f8fafc; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .batch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .batch-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .batch-product-select { grid-column: span 2; }
        .batch-remove { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; padding: 0 4px; }
        .add-batch-btn { margin-top: 8px; width: 100%; }

        .product-batches-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 14px; }
        .product-batches-table th { text-align: left; padding: 8px; background: #f1f5f9; position: sticky; top: 0; }
        .product-batches-table td { padding: 8px; border-bottom: 1px solid #e2e8f0; cursor: pointer; }
        .product-batches-table tr:hover { background: #f8fafc; }

        .product-list { margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px; }
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
        .product-info { font-size: 14px; }
        .product-actions { display: flex; gap: 8px; }
        .icon-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 20px; }
        .icon-btn:hover { background: #e2e8f0; }

        .small-modal-card { max-width: 400px !important; }
        .warning-text { color: #b45309; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>
<div class="app">
    <h1>📦 Magazyn Regały <span style="font-size: 14px; background: #e2e8f0; padding: 4px 12px; border-radius: 40px;">A · B · C · D (5x21) + PRZENOSZENIE</span></h1>
    
    <div class="top-bar">
        <div class="search-group">
            <input type="text" id="searchProductInput" class="search-box" placeholder="🔍 Produkt / kod" autocomplete="off">
            <input type="text" id="searchDateInput" class="search-box" placeholder="📅 Data (np. 1.04.2026)" autocomplete="off">
        </div>
        <button class="btn-secondary" id="clearSearchBtn">✖ Wyczyść</button>
        <button class="btn-secondary" id="batchesByProductBtn">📊 Partie wg produktu</button>
        <button class="btn-secondary" id="exportCsvBtn">📥 Eksportuj CSV</button>
        <button class="btn-secondary" id="manageProductsBtn">📋 Produkty</button>
    </div>

    <div class="racks-tabs">
        <button class="rack-tab active" data-rack="A">Regał A</button>
        <button class="rack-tab" data-rack="B">Regał B</button>
        <button class="rack-tab" data-rack="C">Regał C</button>
        <button class="rack-tab" data-rack="D">Regał D</button>
    </div>

    <div id="rackView" class="rack-container">
        <div style="text-align: center; padding: 40px; color: #64748b;">Ładowanie danych...</div>
    </div>
</div>

<!-- Modal edycji pola -->
<div class="modal" id="editModal">
    <div class="modal-card">
        <h3>Pole <span id="locationCodeDisplay"></span></h3>
        <div class="form-group">
            <label>🚚 Typ palety</label>
            <select id="palletType">
                <option value="magazynowa">🔴 Magazynowa (czerwony)</option>
                <option value="spedycyjna">🟢 Spedycyjna (zielony)</option>
            </select>
        </div>
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #e2e8f0;">
        <label style="font-weight:600;">📦 Produkty na palecie</label>
        <div id="batchesContainer" class="batch-list"></div>
        <button class="btn btn-secondary add-batch-btn" id="addBatchBtn">➕ Dodaj produkt</button>
        <div class="flex-row">
            <button class="btn" id="cancelEditBtn">Anuluj</button>
            <button class="btn btn-primary" id="saveSlotBtn">Zapisz</button>
            <button class="btn btn-warning" id="moveSlotBtn" style="display:none;">↗️ Przenieś</button>
            <button class="btn btn-danger" id="clearSlotBtn">Wyczyść pole</button>
        </div>
    </div>
</div>

<!-- Modal produktów -->
<div class="modal" id="productsModal">
    <div class="modal-card">
        <h3>📋 Baza produktów</h3>
        <div style="margin-bottom:20px;">
            <div class="form-group"><label>Nazwa produktu</label><input type="text" id="newProductName" placeholder="np. Dezodorant 067"></div>
            <div class="form-group"><label>Kod produktu</label><input type="text" id="newProductCode" placeholder="IND-12345"></div>
            <button class="btn btn-primary" id="addProductBtn" style="width:100%;">➕ Dodaj produkt</button>
        </div>
        <div class="product-list" id="productsListContainer">Ładowanie...</div>
        <div class="flex-row"><button class="btn" id="closeProductsBtn">Zamknij</button></div>
    </div>
</div>

<!-- Modal FIFO -->
<div class="modal" id="productBatchesModal">
    <div class="modal-card" style="max-width:800px;">
        <h3>📊 Wszystkie partie produktu (FIFO)</h3>
        <div class="form-group">
            <label>Wybierz produkt</label>
            <select id="productFilterSelect" style="width:100%;"><option value="">-- Wybierz produkt --</option></select>
        </div>
        <div style="max-height:400px; overflow-y:auto;">
            <table class="product-batches-table">
                <thead><tr><th>Lokalizacja</th><th>Data prod.</th><th>Kartony</th><th>Sztuki</th><th>Typ</th></tr></thead>
                <tbody id="batchesTableBody"><tr><td colspan="5">Wybierz produkt</td></tr></tbody>
            </table>
        </div>
        <div class="flex-row"><button class="btn" id="closeProductBatchesBtn">Zamknij</button></div>
    </div>
</div>

<!-- Modal wyboru regału dla CSV -->
<div class="modal" id="exportCsvModal">
    <div class="modal-card small-modal-card">
        <h3>📥 Eksportuj dane do CSV</h3>
        <div class="form-group">
            <label>Wybierz zakres</label>
            <select id="exportRackSelect">
                <option value="">-- Wszystkie regały --</option>
                <option value="A">Regał A</option>
                <option value="B">Regał B</option>
                <option value="C">Regał C</option>
                <option value="D">Regał D</option>
            </select>
        </div>
        <div class="flex-row">
            <button class="btn" id="cancelExportCsvBtn">Anuluj</button>
            <button class="btn btn-primary" id="confirmExportCsvBtn">Eksportuj</button>
        </div>
    </div>
</div>

<div id="toast" class="toast-msg">Zapisano</div>

<script>
    // ========== KONFIGURACJA FIREBASE (zachowana Twoja) ==========
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    const RACKS = ['A', 'B', 'C', 'D'];
    const LEVELS = 5;
    const COLUMNS = 21;
    let currentRack = 'A';
    let allSlotsData = {};
    let slotBatches = {};
    let productsList = [];
    let unsubscribeSlots = null;
    let unsubscribeProducts = null;
    let unsubscribeBatches = null;

    // Elementy DOM
    const rackView = document.getElementById('rackView');
    const searchProductInput = document.getElementById('searchProductInput');
    const searchDateInput = document.getElementById('searchDateInput');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const tabs = document.querySelectorAll('.rack-tab');
    const editModal = document.getElementById('editModal');
    const locCodeSpan = document.getElementById('locationCodeDisplay');
    const palletType = document.getElementById('palletType');
    const batchesContainer = document.getElementById('batchesContainer');
    const saveSlotBtn = document.getElementById('saveSlotBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const clearSlotBtn = document.getElementById('clearSlotBtn');
    const moveSlotBtn = document.getElementById('moveSlotBtn');
    const addBatchBtn = document.getElementById('addBatchBtn');
    const productsModal = document.getElementById('productsModal');
    const newProductName = document.getElementById('newProductName');
    const newProductCode = document.getElementById('newProductCode');
    const addProductBtn = document.getElementById('addProductBtn');
    const productsListContainer = document.getElementById('productsListContainer');
    const manageProductsBtn = document.getElementById('manageProductsBtn');
    const closeProductsBtn = document.getElementById('closeProductsBtn');
    const productBatchesModal = document.getElementById('productBatchesModal');
    const productFilterSelect = document.getElementById('productFilterSelect');
    const batchesTableBody = document.getElementById('batchesTableBody');
    const batchesByProductBtn = document.getElementById('batchesByProductBtn');
    const closeProductBatchesBtn = document.getElementById('closeProductBatchesBtn');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const exportCsvModal = document.getElementById('exportCsvModal');
    const exportRackSelect = document.getElementById('exportRackSelect');
    const cancelExportCsvBtn = document.getElementById('cancelExportCsvBtn');
    const confirmExportCsvBtn = document.getElementById('confirmExportCsvBtn');
    const toast = document.getElementById('toast');
    
    let currentEditingLocation = null;
    let currentBatches = [];
    let moveMode = false;
    let sourceLocation = null;

    function getLocationId(rack, level, col) {
        return `R${rack}-P${level}-K${col}`;
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }

    // ========== SUBSKRYPCJE (bez zmian) ==========
    function subscribeToSlots() {
        if (unsubscribeSlots) unsubscribeSlots();
        unsubscribeSlots = db.collection("slots").onSnapshot(snapshot => {
            allSlotsData = {};
            snapshot.forEach(doc => allSlotsData[doc.id] = doc.data());
            renderCurrentRack();
            applySearchHighlight();
        }, err => console.error("Slots error:", err));
    }

    function subscribeToBatches() {
        if (unsubscribeBatches) unsubscribeBatches();
        unsubscribeBatches = db.collectionGroup("batches").onSnapshot(snapshot => {
            slotBatches = {};
            snapshot.forEach(doc => {
                const locId = doc.ref.parent.parent.id;
                if (!slotBatches[locId]) slotBatches[locId] = [];
                slotBatches[locId].push({ id: doc.id, ...doc.data() });
            });
            Object.keys(slotBatches).forEach(locId => {
                slotBatches[locId].sort((a,b) => (a.prodDate?.seconds || 0) - (b.prodDate?.seconds || 0));
            });
            renderCurrentRack();
            applySearchHighlight();
        }, err => console.error("Batches error:", err));
    }

    function subscribeToProducts() {
        if (unsubscribeProducts) unsubscribeProducts();
        unsubscribeProducts = db.collection("products").onSnapshot(snapshot => {
            productsList = [];
            snapshot.forEach(doc => productsList.push({ id: doc.id, ...doc.data() }));
            productsList.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
            renderProductsList();
            updateProductFilterSelect();
        }, err => console.error("Products error:", err));
    }

    // ========== RENDER (drobna zmiana – wyłączenie podświetlania w trybie move) ==========
    function renderCurrentRack() {
        let html = '';
        for (let level = 1; level <= LEVELS; level++) {
            html += `<div class="shelf"><div class="shelf-label"><span>📌 Poziom ${level}</span><span class="status-badge">${COLUMNS} pól</span></div><div class="slots">`;
            for (let col = 1; col <= COLUMNS; col++) {
                const locId = getLocationId(currentRack, level, col);
                const data = allSlotsData[locId] || null;
                const batches = slotBatches[locId] || [];
                const isOccupied = batches.length > 0 || (data && data.productName);
                let slotClass = '';
                if (isOccupied) {
                    const type = data?.palletType || 'magazynowa';
                    if (type === 'magazynowa') slotClass = 'occupied-mag';
                    else if (type === 'spedycyjna') slotClass = 'occupied-sped';
                    else slotClass = 'occupied-other';
                }
                
                const productNames = [...new Set(batches.map(b => b.productName).filter(n => n))];
                if (productNames.length === 0 && data?.productName) productNames.push(data.productName);
                const mainProduct = productNames[0] || '—';
                const productShort = mainProduct.substring(0, 12) + (mainProduct.length>12?'…':'');
                const productCount = productNames.length;
                
                let totalCartons = 0, totalPieces = 0;
                batches.forEach(b => { totalCartons += b.cartons || 0; totalPieces += b.pieces || 0; });
                const qtyStr = (totalCartons > 0 || totalPieces > 0) ? `${totalCartons}k ${totalPieces}szt` : (data?.quantity ? `${data.quantity} szt` : '');
                
                html += `<div class="slot ${slotClass}" data-location-id="${locId}">`;
                html += `<div class="slot-code">${level}-${col}</div>`;
                if (isOccupied) {
                    html += `<div class="slot-data" style="font-weight:700;">${productShort}</div>`;
                    if (batches.length > 0) {
                        const firstDate = batches[0].prodDate?.toDate();
                        if (firstDate) html += `<div class="slot-data" style="font-size:9px;">${firstDate.toLocaleDateString('pl-PL')}</div>`;
                        if (batches.length > 1 || productCount > 1) {
                            html += `<div class="slot-data">📦${batches.length>1? '+'+ (batches.length-1):''}${productCount>1? ' ('+productCount+' prod)':''}</div>`;
                        }
                    } else if (data?.prodDate) {
                        const d = data.prodDate.toDate ? data.prodDate.toDate() : new Date(data.prodDate);
                        html += `<div class="slot-data" style="font-size:9px;">${d.toLocaleDateString('pl-PL')}</div>`;
                    }
                    if (qtyStr) html += `<div class="slot-data">${qtyStr}</div>`;
                } else {
                    html += `<div class="slot-data" style="opacity:0.5;">puste</div>`;
                }
                html += `</div>`;
            }
            html += `</div></div>`;
        }
        rackView.innerHTML = html;
        if (moveMode) {
            document.body.classList.add('move-mode');
        } else {
            document.body.classList.remove('move-mode');
        }
    }

    // ========== WYSZUKIWANIE (bez zmian) ==========
    function applySearchHighlight() { /* ... identycznie jak wcześniej ... */ }
    searchProductInput.addEventListener('input', applySearchHighlight);
    searchDateInput.addEventListener('input', applySearchHighlight);
    clearSearchBtn.addEventListener('click', () => {
        searchProductInput.value = '';
        searchDateInput.value = '';
        applySearchHighlight();
    });

    // ========== OBSŁUGA WIELU PRODUKTÓW (bez zmian) ==========
    function renderBatchesList() { /* ... */ }
    function collectBatchesFromForm() { /* ... */ }
    addBatchBtn.addEventListener('click', () => { currentBatches.push({ cartons: 0, pieces: 0 }); renderBatchesList(); });

    // ========== MODAL EDYCJI z nowym przyciskiem "Przenieś" ==========
    function openEditModal(locId) {
        currentEditingLocation = locId;
        locCodeSpan.textContent = locId;
        const data = allSlotsData[locId] || {};
        palletType.value = data.palletType || 'magazynowa';
        const batches = slotBatches[locId] || [];
        currentBatches = batches.map(b => ({
            id: b.id, productId: b.productId || null, productName: b.productName || '', productCode: b.productCode || '',
            prodDate: b.prodDate, cartons: b.cartons || 0, pieces: b.pieces || 0
        }));
        if (currentBatches.length === 0 && data.productName) {
            currentBatches.push({
                productId: data.productId || null, productName: data.productName, productCode: data.productCode,
                prodDate: data.prodDate, cartons: 0, pieces: data.quantity || 0
            });
        }
        renderBatchesList();
        // Pokaż przycisk "Przenieś" tylko jeśli slot jest zajęty
        moveSlotBtn.style.display = (data && data.productName) ? 'inline-block' : 'none';
        editModal.style.display = 'flex';
    }

    // NOWA FUNKCJA: Wejście w tryb przenoszenia
    moveSlotBtn.addEventListener('click', () => {
        if (!currentEditingLocation) return;
        const data = allSlotsData[currentEditingLocation];
        if (!data || !data.productName) {
            alert('Ten slot jest pusty – nie ma czego przenosić.');
            return;
        }
        sourceLocation = currentEditingLocation;
        moveMode = true;
        editModal.style.display = 'none';
        renderCurrentRack();
        showToast('🗺️ Kliknij na pusty slot, aby przenieść paletę. Kliknij ESC aby anulować.');
    });

    // Obsługa kliknięcia w slot podczas trybu przenoszenia
    function handleMoveClick(targetLocId) {
        if (!moveMode || !sourceLocation) return false;
        
        const targetData = allSlotsData[targetLocId] || {};
        if (targetData.productName) {
            alert('Docelowy slot musi być pusty.');
            return true; // zatrzymaj propagację
        }
        
        // Sprawdź, czy cel nie jest linkowany
        if (targetData.linkedTo) {
            alert('Nie można przenieść na slot zablokowany (część palety amerykańskiej).');
            return true;
        }

        // Pobierz dane źródłowe
        const sourceData = allSlotsData[sourceLocation];
        if (!sourceData) {
            cancelMoveMode();
            return true;
        }

        // Potwierdzenie
        if (!confirm(`Przenieść paletę z ${sourceLocation} do ${targetLocId}?`)) {
            cancelMoveMode();
            return true;
        }

        // Wykonaj przeniesienie (asynchronicznie)
        (async () => {
            try {
                const sourceRef = db.collection("slots").doc(sourceLocation);
                const targetRef = db.collection("slots").doc(targetLocId);
                const sourceBatches = slotBatches[sourceLocation] || [];
                
                // 1. Zapisz dane w celu
                const targetSlotData = {
                    productId: sourceData.productId,
                    productName: sourceData.productName,
                    productCode: sourceData.productCode,
                    palletType: sourceData.palletType || 'magazynowa',
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                await targetRef.set(targetSlotData, { merge: true });
                
                // 2. Skopiuj partie
                for (const b of sourceBatches) {
                    await targetRef.collection("batches").add({
                        productId: b.productId, productName: b.productName, productCode: b.productCode,
                        prodDate: b.prodDate, cartons: b.cartons || 0, pieces: b.pieces || 0
                    });
                }
                
                // 3. Wyczyść źródło (usuń dokument i jego partie)
                const oldBatches = await sourceRef.collection("batches").get();
                await Promise.all(oldBatches.docs.map(d => d.ref.delete()));
                await sourceRef.delete();
                
                showToast('✅ Paleta przeniesiona');
            } catch (err) {
                alert('Błąd przenoszenia: ' + err.message);
            } finally {
                cancelMoveMode();
            }
        })();
        
        return true;
    }

    function cancelMoveMode() {
        moveMode = false;
        sourceLocation = null;
        document.body.classList.remove('move-mode');
        renderCurrentRack();
    }

    // Modyfikacja delegacji kliknięć
    rackView.addEventListener('click', (e) => {
        const slot = e.target.closest('.slot');
        if (!slot) return;
        const locId = slot.dataset.locationId;
        if (!locId) return;
        
        if (moveMode) {
            handleMoveClick(locId);
        } else {
            openEditModal(locId);
        }
    });

    // Anulowanie trybu przenoszenia klawiszem ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && moveMode) {
            cancelMoveMode();
            showToast('❌ Przenoszenie anulowane');
        }
    });

    // ========== EKSPORT CSV (bez zmian) ==========
    function doExportCsv(rackChoice) { /* ... */ }
    exportCsvBtn.addEventListener('click', () => { /* ... */ });
    confirmExportCsvBtn.addEventListener('click', () => { /* ... */ });
    cancelExportCsvBtn.addEventListener('click', () => exportCsvModal.style.display = 'none');

    // ========== INICJALIZACJA ==========
    tabs.forEach(tab => tab.addEventListener('click', () => {
        if (moveMode) cancelMoveMode();
        currentRack = tab.dataset.rack;
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCurrentRack();
        applySearchHighlight();
    }));

    window.addEventListener('click', (e) => {
        if (e.target === editModal) editModal.style.display = 'none';
        if (e.target === productsModal) productsModal.style.display = 'none';
        if (e.target === productBatchesModal) productBatchesModal.style.display = 'none';
        if (e.target === exportCsvModal) exportCsvModal.style.display = 'none';
