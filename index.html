<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System kompletacji paczek</title>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
border:3px solid #333;
border-radius:10px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#eee;
padding:10px;
margin:5px;
border-radius:6px;
font-size:18px;
}

.done{
background:#9be79b;
}

button{
padding:15px;
font-size:18px;
margin:10px;
}
</style>

</head>
<body>

<h1>📦 Kompletacja paczek</h1>

<button onclick="startScanner()">📷 Skanuj kod</button>

<div id="scanner"></div>

<h2>Produkty</h2>
<ul id="productList"></ul>

<script>

const order = [
{name:"Butelka", code:"8720359200198", qty:5, picked:0}
];

const list = document.getElementById("productList");

function render(){

list.innerHTML="";

order.forEach(p=>{

let li=document.createElement("li");
li.innerText=p.name+" ("+p.picked+"/"+p.qty+")";

if(p.picked==p.qty){
li.classList.add("done");
}

list.appendChild(li);

});

}

render();

function startScanner(){

Quagga.init({
inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},
decoder:{
readers:["ean_reader","code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return
}

Quagga.start();

});

Quagga.onDetected(function(result){

let code=result.codeResult.code;

order.forEach(p=>{

if(p.code==code && p.picked<p.qty){
p.picked++;
}

});

render();

});

}

</script>

</body>
</html>
