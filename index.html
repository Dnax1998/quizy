<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Lotto - USDT Lottery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        .number-btn {
            transition: all 0.2s ease;
        }
        .number-btn.selected {
            background-color: #eab308;
            color: #1f2937;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

<div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">🎰 Crypto Lotto USDT</h1>
        <button id="connectWalletBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition">Connect Wallet</button>
        <div id="walletAddress" class="hidden text-gray-300"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Left column: round info, user tickets, rewards -->
        <div>
            <!-- Round Info Card -->
            <div class="bg-gray-800 rounded-xl p-6 shadow-lg mb-6">
                <h2 class="text-xl font-semibold mb-2">📊 Runda #<span id="roundId">?</span></h2>
                <div class="space-y-2">
                    <p>💰 Pula nagród: <span id="prizePool" class="font-mono">0</span> USDT</p>
                    <p>🎫 Sprzedane losy: <span id="totalTickets">0</span></p>
                    <p>📅 Status: <span id="roundStatus">Aktywna</span></p>
                    <div id="winningNumbersContainer" class="hidden">
                        <p>🏆 Zwycięskie liczby: <span id="winningNumbers"></span></p>
                    </div>
                </div>
            </div>

            <!-- User Tickets -->
            <div id="userTicketsCard" class="bg-gray-800 rounded-xl p-6 shadow-lg mb-6 hidden">
                <h2 class="text-xl font-semibold mb-2">🎟️ Twoje losy w tej rundzie</h2>
                <div id="userTicketsList" class="space-y-2"></div>
            </div>

            <!-- Claim Reward -->
            <div id="claimCard" class="bg-green-900 rounded-xl p-6 shadow-lg hidden">
                <h2 class="text-xl font-semibold mb-2">🏆 Niewypłacona nagroda</h2>
                <p id="pendingReward" class="text-2xl font-bold">0 USDT</p>
                <button id="claimBtn" class="mt-3 bg-yellow-500 text-black px-4 py-2 rounded-lg hover:bg-yellow-600 transition">Odbierz nagrodę</button>
            </div>
        </div>

        <!-- Right column: buy ticket -->
        <div class="bg-gray-800 rounded-xl p-6 shadow-lg">
            <h2 class="text-2xl font-bold mb-4">Kup los</h2>
            <p class="mb-4">Cena losu: <span id="ticketPriceDisplay" class="font-mono">...</span> USDT</p>
            <div class="mb-6">
                <label class="block text-gray-300 mb-2">Wybierz 6 liczb (1-48):</label>
                <div id="numbersGrid" class="grid grid-cols-8 gap-2 mb-4"></div>
                <div id="selectedNumbersDisplay" class="text-gray-400 text-sm mb-3">Wybrane: <span id="selectedNumbers">brak</span></div>
                <button id="buyTicketBtn" class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg font-bold transition disabled:opacity-50" disabled>Kup los</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ================== KONFIGURACJA ==================
    // ZMIEŃ PONIŻSZE DANE NA SWOJE!
    const CONTRACT_ADDRESS = "0xYourContractAddressHere";      // adres wdrożonego kontraktu
    const USDT_ADDRESS = "0xdAC17F958D2ee523a2206206994597C13D831ec7"; // USDT mainnet – DLA TESTÓW UŻYJ TESTNETOWEGO
    const CONTRACT_ABI = [
        // Skrócone ABI – uzupełnij pełne ABI swojego kontraktu!
        "function ticketPrice() view returns (uint256)",
        "function buyTicket(uint8[6] calldata numbers) external",
        "function currentRoundId() view returns (uint256)",
        "function getRoundInfo(uint256 roundId) view returns (uint256 prizePool, uint256 totalTickets, bool isDrawn, uint8[6] winningNumbers, uint256[6] categoryPools)",
        "function getTicket(uint256 roundId, uint256 ticketId) view returns (address player, uint8[6] numbers, bool claimed)",
        "function claimPrize(uint256 roundId) external",
        "function getPendingReward(uint256 roundId, address player) view returns (uint256)",
        "function roundTickets(uint256 roundId, uint256) view returns (address, uint8[6], bool)",
        "function userTicketIds(address, uint256) view returns (uint256[])"
    ];
    // UWAGA: powyższe ABI jest uproszczone. Musisz wkleić pełne ABI z kompilacji kontraktu.
    // Jeśli nie masz funkcji userTicketIds, możesz pominąć wyświetlanie losów użytkownika.
    // =================================================

    // Stan aplikacji
    let provider, signer, lottoContract, usdtContract;
    let currentRoundId = 1;
    let selectedNumbers = [];
    let userAddress = null;
    let isConnected = false;

    // Elementy DOM
    const connectBtn = document.getElementById('connectWalletBtn');
    const walletAddressSpan = document.getElementById('walletAddress');
    const roundIdSpan = document.getElementById('roundId');
    const prizePoolSpan = document.getElementById('prizePool');
    const totalTicketsSpan = document.getElementById('totalTickets');
    const roundStatusSpan = document.getElementById('roundStatus');
    const winningNumbersContainer = document.getElementById('winningNumbersContainer');
    const winningNumbersSpan = document.getElementById('winningNumbers');
    const ticketPriceDisplay = document.getElementById('ticketPriceDisplay');
    const numbersGrid = document.getElementById('numbersGrid');
    const selectedNumbersSpan = document.getElementById('selectedNumbers');
    const buyTicketBtn = document.getElementById('buyTicketBtn');
    const userTicketsCard = document.getElementById('userTicketsCard');
    const userTicketsList = document.getElementById('userTicketsList');
    const claimCard = document.getElementById('claimCard');
    const pendingRewardSpan = document.getElementById('pendingReward');
    const claimBtn = document.getElementById('claimBtn');

    // Helper: formatowanie USDT (18 decimals)
    function formatUSDT(wei) {
        return ethers.utils.formatUnits(wei, 18);
    }
    function parseUSDT(amount) {
        return ethers.utils.parseUnits(amount.toString(), 18);
    }

    // Generowanie przycisków z liczbami 1-48
    function buildNumberGrid() {
        numbersGrid.innerHTML = '';
        for (let i = 1; i <= 48; i++) {
            const btn = document.createElement('button');
            btn.textContent = i;
            btn.className = 'number-btn w-10 h-10 rounded-full bg-gray-700 text-white hover:bg-gray-600 focus:outline-none';
            btn.addEventListener('click', () => toggleNumber(i, btn));
            numbersGrid.appendChild(btn);
        }
    }

    function toggleNumber(num, btn) {
        if (selectedNumbers.includes(num)) {
            selectedNumbers = selectedNumbers.filter(n => n !== num);
            btn.classList.remove('selected');
        } else {
            if (selectedNumbers.length >= 6) {
                alert('Możesz wybrać tylko 6 liczb!');
                return;
            }
            selectedNumbers.push(num);
            btn.classList.add('selected');
        }
        selectedNumbersSpan.textContent = selectedNumbers.length ? selectedNumbers.join(', ') : 'brak';
        buyTicketBtn.disabled = selectedNumbers.length !== 6;
    }

    // Odświeżanie informacji o rundzie
    async function refreshRoundInfo() {
        if (!lottoContract) return;
        try {
            const round = await lottoContract.getRoundInfo(currentRoundId);
            const prizePool = formatUSDT(round.prizePool);
            const totalTickets = round.totalTickets.toString();
            const isDrawn = round.isDrawn;
            const winningNumbers = round.winningNumbers;

            prizePoolSpan.textContent = prizePool;
            totalTicketsSpan.textContent = totalTickets;
            roundStatusSpan.textContent = isDrawn ? 'Zakończona (losowanie)' : 'Aktywna';
            if (isDrawn && winningNumbers.some(n => n !== 0)) {
                winningNumbersContainer.classList.remove('hidden');
                winningNumbersSpan.textContent = winningNumbers.join(', ');
            } else {
                winningNumbersContainer.classList.add('hidden');
            }
        } catch (err) {
            console.error('Błąd odświeżania rundy:', err);
        }
    }

    // Pobieranie cenę losu
    async function fetchTicketPrice() {
        if (!lottoContract) return;
        try {
            const price = await lottoContract.ticketPrice();
            ticketPriceDisplay.textContent = formatUSDT(price);
        } catch (err) {
            console.error('Nie udało się pobrać ceny losu:', err);
        }
    }

    // Pobieranie losów użytkownika dla bieżącej rundy
    async function fetchUserTickets() {
        if (!lottoContract || !userAddress) return;
        try {
            // Sprawdzamy, czy kontrakt ma funkcję userTicketIds (w naszym kontrakcie jest)
            let ticketIds;
            try {
                ticketIds = await lottoContract.userTicketIds(userAddress, currentRoundId);
            } catch (e) {
                console.warn('Brak funkcji userTicketIds, pomijam wyświetlanie losów');
                userTicketsCard.classList.add('hidden');
                return;
            }
            if (ticketIds.length === 0) {
                userTicketsCard.classList.add('hidden');
                return;
            }
            userTicketsCard.classList.remove('hidden');
            userTicketsList.innerHTML = '';
            for (let i = 0; i < ticketIds.length; i++) {
                const ticket = await lottoContract.getTicket(currentRoundId, ticketIds[i]);
                const numbers = ticket.numbers.filter(n => n !== 0); // czyszczenie pustych
                const claimed = ticket.claimed;
                const div = document.createElement('div');
                div.className = 'bg-gray-700 p-2 rounded';
                div.innerHTML = `<span class="font-mono">${numbers.join(', ')}</span> ${claimed ? '✅ odebrany' : '⏳ nieodebrany'}`;
                userTicketsList.appendChild(div);
            }
        } catch (err) {
            console.error('Błąd pobierania losów:', err);
        }
    }

    // Pobieranie niewypłaconej nagrody
    async function fetchPendingReward() {
        if (!lottoContract || !userAddress) return;
        try {
            const reward = await lottoContract.getPendingReward(currentRoundId, userAddress);
            const formatted = formatUSDT(reward);
            if (reward.gt(0)) {
                claimCard.classList.remove('hidden');
                pendingRewardSpan.textContent = formatted + ' USDT';
            } else {
                claimCard.classList.add('hidden');
            }
        } catch (err) {
            console.error('Błąd pobierania nagrody:', err);
        }
    }

    // Odświeżenie wszystkich danych dla użytkownika
    async function refreshUserData() {
        await fetchUserTickets();
        await fetchPendingReward();
    }

    // Zakup losu
    async function buyTicket() {
        if (!isConnected || selectedNumbers.length !== 6) return;
        if (!usdtContract || !lottoContract) return;

        const price = await lottoContract.ticketPrice();
        try {
            // Sprawdzenie allowance
            const allowance = await usdtContract.allowance(userAddress, CONTRACT_ADDRESS);
            if (allowance.lt(price)) {
                const approveTx = await usdtContract.approve(CONTRACT_ADDRESS, price);
                await approveTx.wait();
            }
            // Zakup
            const tx = await lottoContract.buyTicket(selectedNumbers);
            await tx.wait();
            alert('Los zakupiony!');
            // Wyczyść wybór
            selectedNumbers = [];
            document.querySelectorAll('.number-btn').forEach(btn => btn.classList.remove('selected'));
            selectedNumbersSpan.textContent = 'brak';
            buyTicketBtn.disabled = true;
            // Odśwież dane
            await refreshRoundInfo();
            await refreshUserData();
        } catch (err) {
            console.error(err);
            alert('Transakcja nieudana: ' + err.message);
        }
    }

    // Odebranie nagrody
    async function claimPrize() {
        if (!lottoContract || !userAddress) return;
        try {
            const tx = await lottoContract.claimPrize(currentRoundId);
            await tx.wait();
            alert('Nagroda odebrana!');
            await refreshUserData();
            await refreshRoundInfo(); // może zmienić się pula?
        } catch (err) {
            console.error(err);
            alert('Nie udało się odebrać nagrody: ' + err.message);
        }
    }

    // Inicjalizacja kontraktów po podłączeniu portfela
    async function initContracts() {
        if (!window.ethereum) {
            alert('Zainstaluj MetaMask!');
            return false;
        }
        provider = new ethers.providers.Web3Provider(window.ethereum);
        signer = provider.getSigner();
        lottoContract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        // ABI dla USDT (standard ERC20)
        const usdtAbi = [
            "function approve(address spender, uint256 amount) public returns (bool)",
            "function allowance(address owner, address spender) public view returns (uint256)",
            "function balanceOf(address account) public view returns (uint256)"
        ];
        usdtContract = new ethers.Contract(USDT_ADDRESS, usdtAbi, signer);
        return true;
    }

    // Połączenie z portfelem
    async function connectWallet() {
        if (!window.ethereum) {
            alert('Zainstaluj MetaMask!');
            return;
        }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userAddress = accounts[0];
            isConnected = true;
            connectBtn.classList.add('hidden');
            walletAddressSpan.classList.remove('hidden');
            walletAddressSpan.textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
            await initContracts();
            // Pobierz aktualny roundId z kontraktu
            currentRoundId = await lottoContract.currentRoundId();
            roundIdSpan.textContent = currentRoundId.toString();
            // Odśwież dane
            await fetchTicketPrice();
            await refreshRoundInfo();
            await refreshUserData();
            // Nasłuchuj zmiany konta
            window.ethereum.on('accountsChanged', (acc) => {
                if (acc.length === 0) {
                    // rozłącz
                    location.reload();
                } else {
                    userAddress = acc[0];
                    walletAddressSpan.textContent = `${userAddress.slice(0,6)}...${userAddress.slice(-4)}`;
                    refreshUserData();
                }
            });
            window.ethereum.on('chainChanged', () => location.reload());
        } catch (err) {
            console.error(err);
            alert('Nie udało się połączyć z portfelem');
        }
    }

    // Event listeners
    connectBtn.addEventListener('click', connectWallet);
    buyTicketBtn.addEventListener('click', buyTicket);
    claimBtn.addEventListener('click', claimPrize);

    // Generowanie siatki liczb
    buildNumberGrid();
</script>
</body>
</html>
