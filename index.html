<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zdrowie Psychiczne – tło</title>
    <style>
        /* Reset marginesów i paddingów */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Ustawienie obrazka jako tła całej strony */
            background-image: url('IMG_2531.png');  /* ← ZMIEŃ NAZWĘ PLIKU na swoją */
            background-size: cover;                /* Obrazek wypełnia całe okno (zachowując proporcje) */
            background-position: center center;    /* Wyśrodkowanie */
            background-repeat: no-repeat;          /* Bez powtarzania */
            background-attachment: fixed;          /* Tło nieruchome podczas przewijania */
            
            /* Opcjonalnie: jeśli obrazek jest jasny, można dodać cień lub półprzezroczyste tło dla czytelności tekstu */
            /* Nie dodajemy żadnego tekstu, żeby nic nie zasłaniało – sam obrazek jako tło */
            
            min-height: 100vh;
            width: 100%;
        }

        /* Możesz dodać dowolną treść na stronie – będzie wyświetlana na tle */
        /* Ale jeśli chcesz tylko tło bez niczego, zostaw puste body */
        .content {
            position: relative;
            z-index: 1;
            /* opcjonalne style dla tekstu na tle – jeśli potrzebujesz */
            color: white;
            text-shadow: 1px 1px 3px black;
            padding: 2rem;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        /* Jeśli nie chcesz żadnego tekstu, usuń div.content lub zostaw pusty */
    </style>
</head>
<body>
    <!-- Jeśli chcesz, możesz dodać tutaj jakąś treść na tle (np. nagłówek) -->
    <div class="content">
        <h1>Twoja strona z tłem</h1>
        <p>Obrazek w tle wyświetla się poprawnie.</p>
    </div>
    <!-- Aby usunąć tekst, po prostu usuń powyższy div -->
</body>
</html>
