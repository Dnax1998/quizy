<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Gwiezdny Zbieracz ✨ | kosmiczna gra zręcznościowa</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #030318, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Courier New', monospace;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 48px;
            padding: 20px 25px 25px 25px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.4), 0 10px 25px black;
            cursor: none;
            background-color: #010113;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 18px;
            margin-bottom: 12px;
            gap: 20px;
            flex-wrap: wrap;
            color: #b9f3ff;
            text-shadow: 0 0 5px #0af;
        }

        .stats {
            background: #000000aa;
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 60px;
            display: flex;
            gap: 28px;
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .stats span {
            color: #f5d742;
            font-size: 1.7rem;
            font-weight: 800;
            margin-left: 8px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #2a6f8f, #0d3b4f);
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #02131f;
        }

        .restart-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #02131f;
        }

        .controls-tip {
            font-size: 0.7rem;
            background: #0a1a22aa;
            border-radius: 40px;
            padding: 5px 15px;
            display: inline-flex;
            gap: 18px;
        }

        .controls-tip i {
            font-style: normal;
            background: #00000066;
            padding: 2px 8px;
            border-radius: 30px;
        }

        @media (max-width: 850px) {
            .stats { font-size: 1rem; gap: 15px; padding: 5px 14px;}
            .stats span { font-size: 1.3rem;}
            .controls-tip { font-size: 0.6rem;}
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600" style="width:100%; height:auto; max-width:1000px; aspect-ratio:1000/600"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div>💎 PUNKTY: <span id="scoreValue">0</span></div>
                <div>❤️ ŻYCIA: <span id="livesValue">3</span></div>
                <div>🌟 POZIOM: <span id="levelValue">1</span></div>
            </div>
            <button class="restart-btn" id="restartButton">🚀 NOWY START</button>
        </div>
        <div class="controls-tip">
            <span>🖱️ MYSZĄ / PALCEM → statek podąża za kursorem</span>
            <span>⚡ zbieraj ✨ kryształy | unikaj ☄️ asteroid</span>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- KONFIGURACJA GRY ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Wymiary logiczne canvas (stałe 1000x600)
        const CW = 1000;
        const CH = 600;
        canvas.width = CW;
        canvas.height = CH;
        
        // Elementy UI
        const scoreSpan = document.getElementById('scoreValue');
        const livesSpan = document.getElementById('livesValue');
        const levelSpan = document.getElementById('levelValue');
        const restartBtn = document.getElementById('restartButton');
        
        // ---------- GRAFIKA (wektorowa / emoji / cieniowanie) ----------
        // Wszystkie obiekty będą rysowane jako kształty + gradienty, bez zewnętrznych assetów.
        
        // Parametry gry
        let gameRunning = true;
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        
        // Statek gracza (pozycja)
        let player = {
            x: CW/2,
            y: CH/2,
            radius: 18      // promień kolizji / rozmiar
        };
        
        // Tablice obiektów
        let crystals = [];     // kryształy (punkty)
        let asteroids = [];    // asteroidy (zagrożenie)
        
        // Efekty cząsteczkowe (dla zbierania / kolizji)
        let particles = [];
        
        // Flagi poziomów i spawnu
        let frameCounter = 0;
        let difficultyMultiplier = 1.0;
        
        // Współczynniki spawnu
        let crystalSpawnDelay = 25;     // klatki między spawnem kryształów (bazowo)
        let asteroidSpawnDelay = 45;
        let crystalCounter = 0;
        let asteroidCounter = 0;
        
        // Maksymalna liczba obiektów (dla wydajności)
        const MAX_CRYSTALS = 22;
        const MAX_ASTEROIDS = 12;
        
        // ---------- FUNKCJE POMOCNICZE ----------
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            livesSpan.innerText = lives;
            levelSpan.innerText = currentLevel;
        }
        
        // Generowanie losowej liczby z zakresu
        function randomRange(min, max) {
            return min + Math.random() * (max - min);
        }
        
        // Sprawdzanie kolizji między dwoma okręgami
        function circlesCollide(x1,y1,r1, x2,y2,r2) {
            const dx = x1 - x2;
            const dy = y1 - y2;
            const dist = Math.hypot(dx,dy);
            return dist < r1 + r2;
        }
        
        // Tworzenie nowego kryształu (w bezpiecznej odległości od gracza)
        function spawnCrystal() {
            if (crystals.length >= MAX_CRYSTALS) return;
            let safe = false;
            let tries = 0;
            let randX, randY;
            while (!safe && tries < 30) {
                randX = randomRange(40, CW - 40);
                randY = randomRange(40, CH - 40);
                const distToPlayer = Math.hypot(randX - player.x, randY - player.y);
                if (distToPlayer > 70) safe = true;
                tries++;
            }
            crystals.push({
                x: randX,
                y: randY,
                radius: 10,
                value: 10 + Math.floor(currentLevel * 1.5),  // więcej punktów na wyższych poziomach
                pulse: 0
            });
        }
        
        // Tworzenie asteroidy
        function spawnAsteroid() {
            if (asteroids.length >= MAX_ASTEROIDS) return;
            // asteroida pojawia się na krawędziach ekranu
            let side = Math.floor(Math.random() * 4); // 0-lewo,1-prawo,2-góra,3-dół
            let x, y;
            const padding = 25;
            if (side === 0) { // lewa
                x = -padding;
                y = randomRange(30, CH - 30);
            } else if (side === 1) { // prawa
                x = CW + padding;
                y = randomRange(30, CH - 30);
            } else if (side === 2) { // góra
                x = randomRange(30, CW - 30);
                y = -padding;
            } else { // dół
                x = randomRange(30, CW - 30);
                y = CH + padding;
            }
            
            // prędkość zależna od poziomu i losowości
            const baseSpeed = 1.2 + (currentLevel * 0.35);
            const angle = Math.atan2(CH/2 - y, CW/2 - x);
            const speed = randomRange(baseSpeed * 0.8, baseSpeed * 1.5);
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            
            asteroids.push({
                x: x, y: y, radius: 14 + Math.random() * 7,
                vx: vx, vy: vy,
                rotation: Math.random() * Math.PI * 2
            });
        }
        
        // Efekt cząsteczkowy (dla zbierania / obrażeń)
        function addParticles(px, py, color, count = 6) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: px, y: py,
                    vx: (Math.random() - 0.5) * 3.5,
                    vy: (Math.random() - 0.5) * 3.5 - 1.5,
                    life: 0.7 + Math.random() * 0.6,
                    size: 3 + Math.random() * 4,
                    color: color,
                    alpha: 1
                });
            }
        }
        
        // reset gry całkowity
        function resetGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            currentLevel = 1;
            difficultyMultiplier = 1.0;
            crystals = [];
            asteroids = [];
            particles = [];
            frameCounter = 0;
            crystalCounter = 0;
            asteroidCounter = 0;
            
            // statek na środku
            player.x = CW/2;
            player.y = CH/2;
            
            // startowe obiekty: 3 kryształy, 1 asteroida
            for(let i=0;i<4;i++) spawnCrystal();
            for(let i=0;i<2;i++) spawnAsteroid();
            
            updateUI();
        }
        
        // zadanie obrażeń graczowi
        function damagePlayer() {
            if (!gameRunning) return;
            lives--;
            updateUI();
            addParticles(player.x, player.y, "#ff5555", 14);
            
            if (lives <= 0) {
                gameRunning = false;
                lives = 0;
                updateUI();
                // komunikat końca gry
            } else {
                // krótkie odrzucenie / miganie? reset pozycji bezpiecznej?
                // dodatkowo usuwamy asteroidy w pobliżu żeby nie było nieskończonego chaina
                asteroids = asteroids.filter(ast => {
                    const distToPlayer = Math.hypot(ast.x - player.x, ast.y - player.y);
                    if (distToPlayer < player.radius + ast.radius + 15) return false;
                    return true;
                });
                // małe cooldown: przez moment gracz jest nienaruszony (przez 20 klatek) - dodajmy flagę invincibility
                // ale zrobimy prostsze: po utracie życia gracz ma 1.2 sekundy nietykalności (flash)
                window.invincibleFrames = 45; // ustawiamy licznik nietykalności w grze
            }
        }
        
        // zwiększenie poziomu (co 300 punktów)
        function updateLevelByScore() {
            let newLevel = 1 + Math.floor(score / 300);
            if (newLevel > 10) newLevel = 10;
            if (newLevel !== currentLevel) {
                currentLevel = newLevel;
                updateUI();
                // efekty wizualne zmiany poziomu
                addParticles(player.x, player.y, "#FFD966", 20);
                // dodatkowo zwiększamy spawn trudności
                // przy zmianie poziomu uzupełnijmy asteroidy
                for(let i=0;i<currentLevel;i++) {
                    if(asteroids.length < MAX_ASTEROIDS) spawnAsteroid();
                }
            }
        }
        
        // aktualizacja fizyki, kolizji, spawnu
        function updateGame() {
            if (!gameRunning) return;
            
            // ----- NIETYKALNOŚĆ (invincibility frames) -----
            if (window.invincibleFrames > 0) {
                window.invincibleFrames--;
            }
            
            // 1. Aktualizacja pozycji statku - podążanie za myszą / dotykiem
            // Obsługa zdarzeń myszy już jest w eventListener, ale dla bezpieczeństwa:
            // pozycja player jest modyfikowana przez mousemove/touchmove.
            
            // 2. Asteroidy: ruch i usuwanie poza ekranem (jeśli daleko poza, respawn? lepiej usuwać i spawnować nowe)
            for(let i=0; i<asteroids.length; i++) {
                const a = asteroids[i];
                a.x += a.vx;
                a.y += a.vy;
                a.rotation += 0.03;
                // jeśli asteroida całkowicie poza ekranem (z marginesem) -> usuń
                if (a.x + a.radius < -150 || a.x - a.radius > CW + 150 || a.y + a.radius < -150 || a.y - a.radius > CH + 150) {
                    asteroids.splice(i,1);
                    i--;
                }
            }
            
            // 3. Kryształy: nie mają ruchu, ale mogą delikatnie pulsować (w renderze)
            
            // 4. Kolizje gracz <-> kryształ (zbieranie)
            for(let i=0; i<crystals.length; i++) {
                const c = crystals[i];
                if (circlesCollide(player.x, player.y, player.radius, c.x, c.y, c.radius)) {
                    // zebrany kryształ
                    score += c.value;
                    updateUI();
                    updateLevelByScore();
                    addParticles(c.x, c.y, "#FFD966", 8);
                    crystals.splice(i,1);
                    i--;
                }
            }
            
            // 5. Kolizje gracz <-> asteroidy (tylko jeśli brak invincible)
            for(let i=0; i<asteroids.length; i++) {
                const a = asteroids[i];
                if (circlesCollide(player.x, player.y, player.radius, a.x, a.y, a.radius)) {
                    if (window.invincibleFrames <= 0) {
                        damagePlayer();
                        // usuwamy asteroidę która uderzyła (żeby nie kaskadować)
                        asteroids.splice(i,1);
                        i--;
                        if(lives <= 0) break;
                    } else {
                        // jeśli nietykalny: odbij asteroidę? dla przyjemności lekko odrzućmy
                        const angle = Math.atan2(a.y - player.y, a.x - player.x);
                        const knock = 3.2;
                        a.vx += Math.cos(angle) * knock;
                        a.vy += Math.sin(angle) * knock;
                        // małe iskierki
                        addParticles(a.x, a.y, "#88aaff", 3);
                    }
                }
            }
            
            // jeśli gra skończona po kolizji -> zatrzymaj update dalej
            if (lives <= 0) {
                gameRunning = false;
                return;
            }
            
            // 6. Spawnowanie nowych obiektów (zależne od poziomu i frameCounter)
            crystalCounter++;
            asteroidCounter++;
            
            let crystalRate = Math.max(12, Math.floor(25 - currentLevel * 1.2));
            let asteroidRate = Math.max(18, Math.floor(42 - currentLevel * 2.1));
            
            if (crystalCounter >= crystalRate) {
                crystalCounter = 0;
                if (crystals.length < MAX_CRYSTALS) spawnCrystal();
                // dodatkowo szansa na drugi kryształ na wyższych poziomach
                if (currentLevel >= 3 && Math.random() < 0.33 && crystals.length < MAX_CRYSTALS) spawnCrystal();
            }
            
            if (asteroidCounter >= asteroidRate) {
                asteroidCounter = 0;
                if (asteroids.length < MAX_ASTEROIDS + Math.floor(currentLevel/2)) {
                    spawnAsteroid();
                    // większy poziom -> więcej asteroid
                    if (currentLevel >= 4 && Math.random() < 0.4 && asteroids.length < MAX_ASTEROIDS+2) spawnAsteroid();
                }
            }
            
            // 7. Cząsteczki - aktualizacja życia
            for(let i=0; i<particles.length; i++) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.15;
                p.life -= 0.025;
                p.alpha = p.life;
                if(p.life <= 0 || p.y > CH+100 || p.x < -100 || p.x > CW+100) {
                    particles.splice(i,1);
                    i--;
                }
            }
            
            // 8. Ograniczenie statku w granicach canvas
            player.x = Math.min(Math.max(player.x, player.radius + 5), CW - player.radius - 5);
            player.y = Math.min(Math.max(player.y, player.radius + 5), CH - player.radius - 5);
        }
        
        // ---------- RENDEROWANIE CAŁEJ GRY (efekty świetlne) ----------
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, CW, CH);
            
            // 1. Tło gwiazd (dynamiczne, migotanie)
            ctx.fillStyle = "#010113";
            ctx.fillRect(0, 0, CW, CH);
            for(let i=0; i<300; i++) {
                if (i%2 === 0) continue; // już istniejące gwiazdy w stałych pozycjach? użyjmy pseudo-random
                // lepsze: losowe gwiazdy ale zależne od seed
            }
            // Stałe gwiazdy (przyjemny efekt)
            ctx.fillStyle = "white";
            for(let i=0;i<200;i++) {
                const sx = (i * 131)%CW;
                const sy = (i * 253)%CH;
                const brightness = 0.4 + Math.sin(Date.now() * 0.002 + i) * 0.3;
                ctx.globalAlpha = brightness * 0.7;
                ctx.beginPath();
                ctx.arc(sx, sy, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // mgławica
            ctx.fillStyle = "#22113333";
            ctx.fillRect(0,0,CW,CH);
            
            // 2. Asteroidy (z teksturą)
            for(let a of asteroids) {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.rotation);
                // ciemny korpus
                ctx.shadowBlur = 8;
                ctx.shadowColor = "black";
                ctx.beginPath();
                ctx.arc(0, 0, a.radius-2, 0, Math.PI*2);
                ctx.fillStyle = "#5a4c3a";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(0, 0, a.radius-4, 0, Math.PI*2);
                ctx.fillStyle = "#3d2c1e";
                ctx.fill();
                // kratery
                ctx.fillStyle = "#2f241b";
                for(let k=0;k<4;k++) {
                    ctx.beginPath();
                    ctx.arc((Math.sin(k)*6), (Math.cos(k*2)*5), 2.5, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
                // obrys
                ctx.beginPath();
                ctx.arc(a.x, a.y, a.radius, 0, Math.PI*2);
                ctx.strokeStyle = "#d6a15a";
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }
            
            // 3. Kryształy (błyszczące)
            for(let c of crystals) {
                const glow = Math.sin(Date.now() * 0.008 + c.x) * 0.3 + 0.7;
                ctx.shadowBlur = 12;
                ctx.shadowColor = "#ffcc66";
                ctx.beginPath();
                ctx.moveTo(c.x, c.y - c.radius);
                ctx.lineTo(c.x + c.radius*0.8, c.y - c.radius*0.4);
                ctx.lineTo(c.x + c.radius*0.5, c.y + c.radius*0.6);
                ctx.lineTo(c.x, c.y + c.radius);
                ctx.lineTo(c.x - c.radius*0.5, c.y + c.radius*0.6);
                ctx.lineTo(c.x - c.radius*0.8, c.y - c.radius*0.4);
                ctx.closePath();
                ctx.fillStyle = `rgba(255, 220, 100, ${0.7+glow*0.3})`;
                ctx.fill();
                ctx.fillStyle = "#ffdd88";
                ctx.beginPath();
                ctx.arc(c.x, c.y-2, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // 4. Statek gracza (dynamiczny, z ogonem)
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#0af";
            const angleToCursor = 0; // statek zawsze patrzy w górę? możemy delikatnie obracać w kierunku ruchu? ale nie ma wektora prędkości.
            ctx.save();
            ctx.translate(player.x, player.y);
            // efekt migania przy invincible
            let alphaShip = 1;
            if (window.invincibleFrames > 0 && (Math.floor(Date.now()/60)%2 === 0)) alphaShip = 0.5;
            ctx.globalAlpha = alphaShip;
            // trójkąt statku
            ctx.beginPath();
            ctx.moveTo(0, -player.radius*0.9);
            ctx.lineTo(-player.radius*0.7, player.radius*0.6);
            ctx.lineTo(0, player.radius*0.2);
            ctx.lineTo(player.radius*0.7, player.radius*0.6);
            ctx.closePath();
            ctx.fillStyle = "#3efffa";
            ctx.fill();
            ctx.fillStyle = "#2aaacc";
            ctx.beginPath();
            ctx.rect(-5, player.radius*0.2, 10, 7);
            ctx.fill();
            // płomień
            ctx.beginPath();
            ctx.moveTo(-4, player.radius*0.5);
            ctx.lineTo(0, player.radius+5);
            ctx.lineTo(4, player.radius*0.5);
            ctx.fillStyle = "#ff8800";
            ctx.fill();
            ctx.restore();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
            
            // 5. Cząsteczki
            for(let p of particles) {
                ctx.globalAlpha = p.alpha * 0.8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size*0.7, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // 6. HUD na canvas (dodatkowe efekty)
            if (!gameRunning && lives <= 0) {
                ctx.font = "bold 44px 'Orbitron', monospace";
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#ff5577";
                ctx.shadowColor = "black";
                ctx.fillText("💀 GAME OVER 💀", CW/2-170, CH/2-50);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#ffccaa";
                ctx.fillText("kliknij NOWY START", CW/2-135, CH/2+40);
            }
            
            // poziom wizualny
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#bbeeff";
            ctx.fillText("☄️ UNIKAJ | 💎 ZBIERAJ", 20, 40);
        }
        
        // ---------- OBSŁUGA MYSZY / DOTYKU ----------
        function handleMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(canvasX, player.radius), CW - player.radius);
            canvasY = Math.min(Math.max(canvasY, player.radius), CH - player.radius);
            player.x = canvasX;
            player.y = canvasY;
        }
        
        function onMouseMove(e) {
            if (!gameRunning) return;
            handleMove(e.clientX, e.clientY);
        }
        
        function onTouchMove(e) {
            e.preventDefault();
            if (!gameRunning) return;
            const touch = e.touches[0];
            if (touch) handleMove(touch.clientX, touch.clientY);
        }
        
        function onTouchStart(e) {
            e.preventDefault();
            if (!gameRunning) return;
            const touch = e.touches[0];
            if (touch) handleMove(touch.clientX, touch.clientY);
        }
        
        // ---------- PĘTLA GRY (requestAnimationFrame) ----------
        let lastTimestamp = 0;
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // ---------- INICJALIZACja i RESTART ----------
        function initEvents() {
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('touchmove', onTouchMove, {passive: false});
            canvas.addEventListener('touchstart', onTouchStart, {passive: false});
            window.addEventListener('resize', () => {}); // dummy
        }
        
        restartBtn.addEventListener('click', () => {
            resetGame();
            gameRunning = true;
            window.invincibleFrames = 0;
            updateUI();
        });
        
        // Start
        resetGame();
        initEvents();
        gameLoop();
        // Dodatkowe czyszczenie przy starcie by statek nie uciekał
        setInterval(() => {
            if (!gameRunning && lives<=0) { /* czekamy na restart */ }
        }, 100);
    })();
</script>
</body>
