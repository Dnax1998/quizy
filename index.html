<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Belkownia 🏗️ | Generator Belek Konstrukcyjnych</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e0e2e8 0%, #cdd0d9 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* główny kontener */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* nagłówek z belkowym urokiem */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #2c3e2f, #5a3e1b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 4px 4px 12px rgba(0,0,0,0.1);
            display: inline-block;
            padding: 0 1rem;
        }

        .header h1 span {
            font-size: 2.5rem;
        }

        .sub {
            color: #2d2e2e;
            background: rgba(255,245,215,0.7);
            backdrop-filter: blur(2px);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 500;
            margin-top: 0.8rem;
            font-size: 1.05rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        /* panel główny */
        .beam-panel {
            background: rgba(250, 248, 240, 0.9);
            backdrop-filter: blur(3px);
            border-radius: 3rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,245,210,0.7);
            margin-bottom: 2rem;
            transition: all 0.2s;
        }

        /* przycisk generowania */
        .generate-area {
            display: flex;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .btn-generate {
            background: #2c2e2f;
            border: none;
            padding: 1rem 2.8rem;
            font-size: 1.7rem;
            font-weight: bold;
            border-radius: 60px;
            color: #fbe9c3;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #121212;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .btn-generate:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #121212;
        }

        .counter-badge {
            background: #ffb347;
            color: #2c1e0f;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            margin-left: 15px;
        }

        /* wizualizacja belki (duża belka) */
        .visual-beam {
            background: #b97f44;
            border-radius: 32px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            box-shadow: inset 0 1px 4px rgba(255,255,200,0.6), 0 12px 20px -8px rgba(0,0,0,0.3);
            transition: background 0.25s ease;
        }

        .beam-bar {
            background: rgba(0,0,0,0.15);
            border-radius: 28px;
            padding: 1.8rem 1rem;
            text-align: center;
            backdrop-filter: brightness(0.98);
        }

        .beam-bar h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff3e0;
            text-shadow: 2px 2px 0 #5a3a1a;
            letter-spacing: 1px;
        }

        .beam-bar p {
            font-size: 1.2rem;
            color: #ffefcf;
            font-weight: 500;
            margin-top: 6px;
        }

        /* dane techniczne belki */
        .beam-specs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            background: #fef7e6;
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            margin-top: 0.5rem;
        }

        .spec-card {
            background: white;
            border-radius: 1.8rem;
            padding: 0.8rem 1rem;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid #ecd9b4;
        }

        .spec-label {
            font-weight: 600;
            color: #8b5a2b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spec-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2d2a24;
        }

        .beam-rating {
            background: #e9dbc9;
            border-radius: 40px;
            padding: 0.3rem 1rem;
            display: inline-block;
            font-weight: bold;
        }

        /* sekcja historii */
        .history-section {
            background: #fef7efdb;
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
        }

        .history-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 8px solid #bc8f50;
            padding-left: 1rem;
        }

        .history-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: flex-start;
        }

        .history-card {
            background: white;
            border-radius: 1.5rem;
            padding: 0.8rem 1.2rem;
            width: 190px;
            cursor: pointer;
            transition: 0.15s linear;
            border: 1px solid #e4cfb0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .history-card:hover {
            transform: scale(0.97);
            background: #fff3e0;
            border-color: #bc8f50;
        }

        .history-beam-name {
            font-weight: 800;
            font-size: 1rem;
            color: #5a3a1a;
        }

        .history-meta {
            font-size: 0.7rem;
            color: #7a6233;
            margin-top: 6px;
        }

        .history-time {
            font-size: 0.65rem;
            font-family: monospace;
            color: #a57c46;
        }

        .empty-history {
            color: #8b6946;
            font-style: italic;
            padding: 1rem;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #2c2b26;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .beam-bar h2 { font-size: 1.5rem; }
            .btn-generate { font-size: 1.2rem; padding: 0.7rem 1.6rem; }
            .spec-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏗️ BELKOWNIA <span>🪵⚙️</span></h1>
        <div class="sub">✦ Profesjonalny generator belek konstrukcyjnych ✦ <br> żadnych wymagań, same belki</div>
    </div>

    <div class="beam-panel">
        <div class="generate-area">
            <button class="btn-generate" id="generateBtn">✨ NOWA BELKA ✨</button>
            <div class="counter-badge" id="totalCounter">wygenerowano: 0</div>
        </div>

        <!-- aktualna belka -->
        <div id="currentBeamContainer">
            <!-- dynamiczne wnętrze -->
        </div>
    </div>

    <div class="history-section">
        <div class="history-title">
            📜 OSTATNIE BELKI (kliknij, by przywrócić)
        </div>
        <div id="historyList" class="history-grid">
            <!-- lista historii -->
        </div>
    </div>
    <footer>
        🧱 Belkownia v1.0 | Nic nie zapisujemy, nie logujemy, same belki. Klikaj bezkarnie!
    </footer>
</div>

<script>
    // -------- BAZA ZABAWNYCH TYPÓW BELEK ----------
    const beamTypes = [
        "Belka główna", "Belka pomocnicza", "Belka stropowa", "Belka dachowa", "Belka podciąg",
        "Belka ryglowa", "Belka wieńcowa", "Belka krawędziowa", "Belka swobodnie podparta",
        "Belka utwierdzona", "Belka wspornikowa", "Belka ciągła", "Belka Gerbera",
        "Belka Langer", "Belka Vierendeela", "Belka drewniana", "Belka stalowa",
        "Belka żelbetowa", "Belka kompozytowa", "Belka bambusowa", "Belka z makaronu",
        "Belka z klocków", "Belka z ciasta", "Belka internetowa", "Belka programistyczna",
        "Belka administratora", "Belka socjalna", "Belka podatkowa", "Belka wyborcza",
        "Belka absurdu", "Belka z odzysku", "Belka premium", "Belka ekonomiczna",
        "Belka nieskończona", "Belka kwantowa", "Belka relaksacyjna", "Belka wędzona",
        "Belka marynowana", "Belka turbo", "Belka retro", "Belka księżycowa"
    ];

    const materials = [
        "Drewno dębowe", "Stal nierdzewna", "Żelbet zbrojony", "Kompozyt węglowy",
        "Bambus", "Karton falisty", "Plastik wzmocniony", "Lód arktyczny", "Czekolada gorzka",
        "Żelatyna", "Próżnia kwantowa", "Ciemna materia", "Marmur", "Beton komórkowy",
        "Wełna mineralna (nie nośna)", "Tytan Grade 5", "Mosiądz", "Sklejka lotnicza"
    ];

    // funkcja losowa z tablicy
    function randomFrom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // losowanie liczby z zakresu z dokładnością
    function randomRange(min, max, decimals = 1) {
        const val = min + Math.random() * (max - min);
        return decimals === 0 ? Math.floor(val) : Number(val.toFixed(decimals));
    }

    // generuje obiekt belki z wszystkimi parametrami
    function generateRandomBeam() {
        const type = randomFrom(beamTypes);
        const material = randomFrom(materials);
        const length_m = randomRange(1.2, 12.0, 1);      // metry
        const height_mm = randomRange(80, 600, 0);       // mm
        const load_kN = randomRange(12, 580, 0);         // nośność kN
        const deflection_mm = randomRange(0.8, 48, 1);    // ugięcie mm
        const beaminess = randomRange(12, 99.9, 1);       // stopień belkowości %
        const price_pln = randomRange(99, 12499, 0);      // cena w zł
        
        // kolorystyka wizualna w zależności od materiału (mapa dla tła)
        let visualBg = "#b97f44"; // domyślnie drewniane
        if (material.includes("Stal") || material.includes("Tytan") || material.includes("Mosiądz"))
            visualBg = "#7a7f85";
        else if (material.includes("Beton") || material.includes("Żelbet"))
            visualBg = "#9aaebf";
        else if (material.includes("Czekolada"))
            visualBg = "#7b4a2e";
        else if (material.includes("Lód"))
            visualBg = "#b9e2f0";
        else if (material.includes("Karton"))
            visualBg = "#cfbc93";
        else if (material.includes("Kompozyt"))
            visualBg = "#5f7c6b";
        else if (material.includes("Próżnia") || material.includes("Ciemna materia"))
            visualBg = "#2b2b3a";
        else
            visualBg = "#c28a4b"; 
        
        return {
            id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + "-" + Math.random(),
            type: type,
            material: material,
            length: length_m,
            height: height_mm,
            load: load_kN,
            deflection: deflection_mm,
            beaminess: beaminess,
            price: price_pln,
            visualBg: visualBg,
            timestamp: Date.now()
        };
    }

    // pomocnik do formatowania czasu
    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
    }

    // -------- GŁÓWNY STAN APLIKACJI ----------
    let currentBeam = null;               // obecnie wyświetlana belka
    let historyBeams = [];                // max 5 ostatnio WYGENEROWANYCH (nowa belka)
    let totalGeneratedCount = 0;          // licznik kliknięć "NOWA BELKA"

    // referencje do DOM
    const currentContainer = document.getElementById('currentBeamContainer');
    const historyContainer = document.getElementById('historyList');
    const totalCounterSpan = document.getElementById('totalCounter');

    // renderowanie aktualnej belki (z efektem wizualnym)
    function renderCurrentBeam() {
        if (!currentBeam) return;
        const beam = currentBeam;
        // ustawiamy tło wizualnego paska (dopasowane do materiału)
        const visualStyle = `background: ${beam.visualBg};`;
        
        const html = `
            <div class="visual-beam" style="${visualStyle} transition: background 0.2s;">
                <div class="beam-bar">
                    <h2>🪵 ${beam.type.toUpperCase()} 🧱</h2>
                    <p>✧ materiał: ${beam.material} ✧</p>
                </div>
            </div>
            <div class="beam-specs">
                <div class="spec-card"><div class="spec-label">📏 Długość</div><div class="spec-value">${beam.length} m</div></div>
                <div class="spec-card"><div class="spec-label">📐 Wysokość przekroju</div><div class="spec-value">${beam.height} mm</div></div>
                <div class="spec-card"><div class="spec-label">⚡ Nośność</div><div class="spec-value">${beam.load} kN</div></div>
                <div class="spec-card"><div class="spec-label">📉 Ugięcie</div><div class="spec-value">${beam.deflection} mm</div></div>
                <div class="spec-card"><div class="spec-label">💪 Stopień belkowości</div><div class="spec-value">${beam.beaminess}% <progress value="${beam.beaminess}" max="100" style="width:70px; height:6px; border-radius:8px;"></progress></div></div>
                <div class="spec-card"><div class="spec-label">💰 Cena rynkowa</div><div class="spec-value">${beam.price.toLocaleString('pl-PL')} zł</div></div>
            </div>
            <div style="margin-top: 12px; text-align: right; font-size:0.75rem; color:#9b7a4a;">🕒 wygenerowano: ${formatTime(beam.timestamp)}</div>
        `;
        currentContainer.innerHTML = html;
    }

    // renderowanie listy historii (max 5 ostatnich)
    function renderHistory() {
        if (!historyContainer) return;
        if (historyBeams.length === 0) {
            historyContainer.innerHTML = '<div class="empty-history">✨ Brak belek w historii. Kliknij "NOWA BELKA" ✨</div>';
            return;
        }
        let historyHtml = '';
        // wyświetlamy od najnowszej do najstarszej (dla czytelności)
        [...historyBeams].reverse().forEach(beam => {
            const timeStr = formatTime(beam.timestamp);
            historyHtml += `
                <div class="history-card" data-id="${beam.id}">
                    <div class="history-beam-name">🏗️ ${beam.type}</div>
                    <div class="history-meta">${beam.material} | ${beam.length}m</div>
                    <div class="history-time">⏱️ ${timeStr}</div>
                </div>
            `;
        });
        historyContainer.innerHTML = historyHtml;
        
        // dodajemy nasłuchiwanie kliknięć na każdym history-card (delegacja)
        document.querySelectorAll('.history-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = card.getAttribute('data-id');
                const selectedBeam = historyBeams.find(b => b.id === id);
                if (selectedBeam) {
                    // przywracamy belkę z historii jako aktualną (nie zmieniamy listy historii)
                    currentBeam = selectedBeam;
                    renderCurrentBeam();
                }
            });
        });
    }

    // dodanie nowej belki do historii (zachowując limit 5)
    function addToHistory(beamObj) {
        // unikamy duplikatów w historii na podstawie id? ale przy generowaniu nowej belki zawsze nowy obiekt
        // wrzucamy na początek tablicy (najnowsza jako pierwsza)
        historyBeams.unshift(beamObj);
        if (historyBeams.length > 5) {
            historyBeams.pop();
        }
        renderHistory();
    }

    // akcja: generowanie nowej belki (kliknięcie w przycisk)
    function generateNewBeam() {
        const newBeam = generateRandomBeam();
        currentBeam = newBeam;
        renderCurrentBeam();
        // dodajemy do historii
        addToHistory(newBeam);
        // zwiększamy licznik totalny
        totalGeneratedCount++;
        totalCounterSpan.innerText = `wygenerowano: ${totalGeneratedCount}`;
        
        // mały efekt wibracji dla przycisku (opcjonalnie)
        const btn = document.getElementById('generateBtn');
        btn.style.transform = 'scale(0.98)';
        setTimeout(() => { btn.style.transform = ''; }, 120);
    }

    // tworzenie pierwszej startowej belki (aby od razu coś było)
    function initFirstBeam() {
        const starterBeam = generateRandomBeam();
        currentBeam = starterBeam;
        renderCurrentBeam();
        // nie dodajemy do historii na starcie? dla spójności dodajemy (pierwsza w historii)
        addToHistory(starterBeam);
        totalGeneratedCount = 1;
        totalCounterSpan.innerText = `wygenerowano: ${totalGeneratedCount}`;
    }

    // dodatkowa opcja: przy starcie jeżeli historia pusta to robimy init
    function setupEventListeners() {
        const genBtn = document.getElementById('generateBtn');
        if (genBtn) {
            genBtn.addEventListener('click', generateNewBeam);
        }
    }

    // odpalenie
    function startApp() {
        setupEventListeners();
        initFirstBeam();   // pierwsza belka pojawia się z historią
    }

    startApp();
</script>
</body>
</html>
