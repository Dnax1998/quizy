<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System kompletacji</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
border:3px solid #333;
border-radius:10px;
}

ul{
list-style:none;
padding:0;
}

li{
background:#eee;
padding:12px;
margin:6px;
border-radius:6px;
font-size:18px;
}

.done{
background:#9be79b;
}

button{
padding:14px;
font-size:18px;
margin:10px;
}

</style>

</head>
<body>

<h1>📦 Kompletacja paczki</h1>

<h2>1️⃣ Zrób zdjęcie listy produktów</h2>

<input type="file" id="photoInput" accept="image/*" capture="environment">

<button onclick="scanPhoto()">📄 Odczytaj produkty</button>

<h2>Lista produktów</h2>

<ul id="productList"></ul>

<h2>2️⃣ Skanuj produkty</h2>

<button onclick="startScanner()">📷 Skanuj kod</button>

<div id="scanner"></div>

<script>

let order = [];

const list = document.getElementById("productList");

const productCodes = {

"Aloe Vera Gel 1L":"8720359200198",
"Freedom 1L":"8720359205773",
"Chipsy":"5909876543210"

};

function render(){

list.innerHTML="";

order.forEach(p=>{

let li=document.createElement("li");

li.innerText=p.name+" ("+p.picked+"/"+p.qty+")";

if(p.picked==p.qty){
li.classList.add("done");
}

list.appendChild(li);

});

}

function scanPhoto(){

const file=document.getElementById("photoInput").files[0];

if(!file) return;

Tesseract.recognize(
file,
'pol+eng'
).then(({data:{text}})=>{

let lines=text.split("\n");

order=[];

lines.forEach(line=>{

let parts=line.split("-");

if(parts.length==2){

let name=parts[0].trim();
let qty=parseInt(parts[1]);

if(productCodes[name]){

order.push({
name:name,
code:productCodes[name],
qty:qty,
picked:0
});

}

}

});

render();

});

}

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:["ean_reader","code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

let code=result.codeResult.code;

order.forEach(p=>{

if(p.code==code && p.picked<p.qty){
p.picked++;
}

});

render();

});

}

</script>

</body>
</html>
