<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Magazyn</title>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:20px;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
border:3px solid #333;
}

ul{
list-style:none;
padding:0;
}

li{
background:#eee;
padding:10px;
margin:5px;
border-radius:6px;
}

</style>

</head>
<body>

<h1>📦 Kompletacja</h1>

<button onclick="startScanner()">📷 Skanuj produkt</button>

<div id="scanner"></div>

<h2>Produkty</h2>

<ul id="list"></ul>

<script>

const products={

"037":"MINERAŁY NATURE-MIN",
"036":"MLECZKO PSZCZELE FOREVER",
"206":"FOREVER CALCIUM",
"374":"FOREVER VITALIZE MEN",
"247":"FOREVER VITALIZE WOMEN",
"051":"KREM ALOESOWO PROPOLISOWY"

};

let order={};

function render(){

const list=document.getElementById("list");

list.innerHTML="";

for(let code in order){

let li=document.createElement("li");

li.innerText=products[code]+" ("+order[code]+")";

list.appendChild(li);

}

}

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{facingMode:"environment"}
},

decoder:{
readers:["ean_reader","code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

let code=result.codeResult.code;

let shortCode=code.slice(-3);

if(products[shortCode]){

if(!order[shortCode]){
order[shortCode]=0;
}

order[shortCode]++;

render();

}

});

}

</script>

</body>
</html>
