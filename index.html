<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>System kompletacji</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

button{
padding:15px;
font-size:18px;
margin:10px;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
border:3px solid #333;
border-radius:10px;
}

canvas{
display:none;
}

ul{
list-style:none;
padding:0;
}

li{
background:#eee;
margin:6px;
padding:12px;
border-radius:6px;
font-size:18px;
}

.done{
background:#9be79b;
}

</style>

</head>
<body>

<h1>📦 Kompletacja zamówienia</h1>

<h2>1️⃣ Zrób zdjęcie dokumentu</h2>

<input type="file" id="photoInput" accept="image/*" capture="environment">

<br>

<button onclick="scanPhoto()">📄 Odczytaj dokument</button>

<canvas id="canvas"></canvas>

<h2>Lista produktów</h2>

<ul id="productList"></ul>

<h2>2️⃣ Skanuj produkty</h2>

<button onclick="startScanner()">📷 Skanuj kod</button>

<div id="scanner"></div>

<script>

let order=[];

const list=document.getElementById("productList");

const productCodes={
"8720359200198":"ALOE VERA GEL",
"8720359205773":"FOREVER ALOE MANGO",
"5901234567890":"FOREVER FREEDOM",
"5909876543210":"FOREVER ACTIVE HA"
};

function render(){

list.innerHTML="";

order.forEach(p=>{

let li=document.createElement("li");

li.innerText=p.name+" ("+p.picked+"/"+p.qty+")";

if(p.picked==p.qty){
li.classList.add("done");
}

list.appendChild(li);

});

}

function preprocessImage(file,callback){

const img=new Image();
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

let imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
let data=imageData.data;

for(let i=0;i<data.length;i+=4){

let avg=(data[i]+data[i+1]+data[i+2])/3;

if(avg>150){
data[i]=255;
data[i+1]=255;
data[i+2]=255;
}else{
data[i]=0;
data[i+1]=0;
data[i+2]=0;
}

}

ctx.putImageData(imageData,0,0);

canvas.toBlob(callback);

};

img.src=URL.createObjectURL(file);

}

function scanPhoto(){

const file=document.getElementById("photoInput").files[0];

if(!file){
alert("Najpierw zrób zdjęcie dokumentu");
return;
}

preprocessImage(file,function(processed){

Tesseract.recognize(processed,'eng').then(({data:{text}})=>{

console.log(text);

order=[];

let lines=text.split("\n");

lines.forEach(line=>{

let numbers=line.match(/\d+/g);

if(numbers && numbers.length>=2){

let qty=parseInt(numbers[1]);

let name=line.replace(/^\D*\d+\s+\d+\s*/,'').trim();

if(
name.length>5 &&
/[A-Z]{3,}/.test(name)
){

order.push({
name:name,
qty:qty,
picked:0
});

}

}

});

render();

});

});

}

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:["ean_reader","code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

let code=result.codeResult.code;

if(productCodes[code]){

let productName=productCodes[code];

order.forEach(p=>{

if(p.name.toLowerCase().includes(productName.toLowerCase()) && p.picked<p.qty){

p.picked++;

}

});

render();

}

});

}

</script>

</body>
</html>
