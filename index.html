<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ ARKANE – kosmiczna strzelanka z ulepszeniami ⚡</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #020214, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 2rem;
            padding: 1rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            align-items: flex-start;
        }

        canvas {
            display: block;
            border-radius: 1.5rem;
            box-shadow: 0 0 0 3px rgba(0, 255, 255, 0.5), 0 12px 28px black;
            cursor: none;
            background-color: #030318;
            width: 100%;
            height: auto;
            max-width: 1000px;
            aspect-ratio: 1000 / 600;
        }

        .shop-panel {
            background: rgba(10, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            width: 260px;
            border: 1px solid #2f8faa;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            color: #c0eef9;
        }

        .shop-title {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #ffcc44;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .currency {
            background: #000000aa;
            border-radius: 40px;
            padding: 4px 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .currency span {
            color: #ffd966;
            font-size: 1.6rem;
        }

        .upgrade-btn {
            background: linear-gradient(135deg, #1a485f, #0a2a3a);
            border: none;
            width: 100%;
            margin: 6px 0;
            padding: 8px 8px;
            border-radius: 60px;
            color: white;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 5px black;
        }

        .upgrade-btn:active {
            transform: scale(0.97);
        }

        .upgrade-name {
            text-align: left;
        }

        .upgrade-cost {
            background: #f5a623;
            padding: 2px 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e2a2a;
        }

        .stats-mini {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 0.75rem;
            background: #03121e;
            padding: 6px 10px;
            border-radius: 28px;
        }

        .restart-btn {
            background: #ff7043;
            width: 100%;
            margin-top: 15px;
            border: none;
            padding: 8px;
            border-radius: 60px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
            color: white;
        }

        @media (max-width: 850px) {
            .shop-panel { width: 220px; padding: 0.6rem; }
            .upgrade-btn { font-size: 0.7rem; }
        }
        @media (max-width: 700px) {
            .game-container { flex-direction: column; align-items: center; }
            .shop-panel { width: 90%; max-width: 320px; }
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #000000cc;
            color: #ffd966;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-family: monospace;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" width="1000" height="600"></canvas>
            <div class="shop-panel" id="shopPanel">
                <div class="shop-title">🛸 ULEPSZENIA 🛸</div>
                <div class="currency">💎 KRYSTALITY: <span id="crystalBalance">0</span></div>
                <div id="upgradesList"></div>
                <div class="stats-mini">
                    <span>❤️ ŻYCIA: <span id="livesUi">3</span></span>
                    <span>⚡ POZIOM: <span id="levelUi">1</span></span>
                    <span>🎯 WYNIK: <span id="scoreUi">0</span></span>
                </div>
                <button class="restart-btn" id="resetGameBtn">🔄 RESTART GRY</button>
                <div style="font-size: 10px; text-align:center; margin-top:8px;">🖱️ MYSZ = ruch | 🔫 KLIKNIJ = STRZAŁ | 💪 sklep na żywo</div>
            </div>
        </div>
    </div>
    <div id="notification" class="notification">✨ ARKANE gotowe do walki!</div>
</div>

<script>
    (function(){
        // ---------- KONFIGURACJA ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CW = 1000, CH = 600;
        canvas.width = CW; canvas.height = CH;
        
        // ---------- ELEMENTY UI ----------
        const crystalSpan = document.getElementById('crystalBalance');
        const livesUiSpan = document.getElementById('livesUi');
        const levelUiSpan = document.getElementById('levelUi');
        const scoreUiSpan = document.getElementById('scoreUi');
        const resetBtn = document.getElementById('resetGameBtn');
        const upgradesContainer = document.getElementById('upgradesList');
        const notifDiv = document.getElementById('notification');
        
        let notificationTimeout = null;
        function showNotif(msg, isError = false) {
            if(notificationTimeout) clearTimeout(notificationTimeout);
            notifDiv.style.color = isError ? "#ffaa88" : "#ffd966";
            notifDiv.innerHTML = msg;
            notificationTimeout = setTimeout(() => {
                notifDiv.innerHTML = "✨ ARKANE w akcji!";
                notifDiv.style.color = "#ffd966";
            }, 1800);
        }
        
        // ---------- GLOBALNY STAN GRY ----------
        let gameRunning = true;
        let score = 0;          // punkty za zabójstwa (wpływa na poziom i bossa)
        let crystals = 0;       // waluta do ulepszeń (zbierana z kryształów)
        let lives = 3;
        let currentWave = 1;    // poziom fali / poziom trudności
        let enemies = [];        // wrogowie (asteroidy, wrogie statki)
        let projectiles = [];    // pociski gracza
        let enemyProjectiles = []; // pociski wrogów (tylko dla wrogich statków)
        let powerups = [];
        let particles = [];
        let bossActive = false;
        let boss = null;          // obiekt bossa (jeśli istnieje)
        let invincibleFrames = 0;
        let frame = 0;
        
        // spawn controllery
        let spawnCounter = 0;
        let waveClearDelay = 0;
        
        // statek gracza
        let player = {
            x: CW/2,
            y: CH - 70,
            radius: 16,
            speed: 6.5
        };
        
        // ---------- SYSTEM ULEPSZEŃ (staty) ----------
        let upgrades = {
            fireRate: { level: 0, base: 18, max: 5, cost: [50, 100, 180, 280, 400], desc: "⚡ Szybkostrzelność" },
            damage: { level: 0, base: 1, max: 6, cost: [40, 90, 160, 250, 380, 520], desc: "💥 Obrażenia" },
            extraLife: { level: 0, base: 0, max: 3, cost: [120, 250, 400], desc: "❤️ Dodatkowe życie" },
            magnet: { level: 0, base: 0, max: 3, cost: [80, 180, 300], desc: "🧲 Magnetyzm (zbieranie)" },
            speed: { level: 0, base: 0, max: 4, cost: [60, 130, 220, 350], desc: "🚀 Prędkość statku" },
            shield: { level: 0, base: 0, max: 2, cost: [150, 350], desc: "🛡️ Tarcza (absorpcja)" }
        };
        
        let currentFireDelay = 0;
        let fireCooldownFrames = () => Math.max(4, 18 - upgrades.fireRate.level * 2.2);
        let playerDamage = () => 1 + upgrades.damage.level;
        let magnetRange = () => 50 + upgrades.magnet.level * 28;
        let playerSpeedBonus = () => upgrades.speed.level * 1.2;
        let shieldActive = upgrades.shield.level > 0;
        let shieldHits = upgrades.shield.level;  // tyle obrażeń może znieść
        
        // funkcja kupna
        function buyUpgrade(upgKey) {
            const up = upgrades[upgKey];
            if(up.level >= up.max) { showNotif("Maksymalny poziom!", true); return false; }
            const cost = up.cost[up.level];
            if(crystals >= cost) {
                crystals -= cost;
                up.level++;
                updateCrystalUI();
                updateUpgradesUI();
                // natychmiastowe efekty
                if(upgKey === "extraLife") {
                    lives += 1;
                    if(lives > 10) lives = 10;
                    updateStatsUI();
                    showNotif(`+1 życia! Aktualne: ${lives}`);
                }
                if(upgKey === "speed") player.speed = 6.5 + playerSpeedBonus();
                if(upgKey === "shield") {
                    shieldActive = true;
                    showNotif(`Tarcza aktywna! (wytrzyma ${upgrades.shield.level} trafień)`);
                }
                showNotif(`✨ Ulepszono ${up.desc} do lvl ${up.level}`);
                return true;
            } else {
                showNotif(`❌ Brak kryształów! Potrzeba ${cost}`, true);
                return false;
            }
        }
        
        function updateUpgradesUI() {
            upgradesContainer.innerHTML = "";
            for(let [key, up] of Object.entries(upgrades)) {
                const btn = document.createElement("button");
                btn.className = "upgrade-btn";
                const costNow = up.level < up.max ? up.cost[up.level] : "MAX";
                btn.innerHTML = `<span class="upgrade-name">${up.desc} Lv.${up.level}</span>
                                 <span class="upgrade-cost">${costNow === "MAX" ? "✔️" : costNow + "💎"}</span>`;
                if(up.level >= up.max) btn.style.opacity = "0.6";
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    buyUpgrade(key);
                });
                upgradesContainer.appendChild(btn);
            }
        }
        
        // ---------- OBIEKTY GRY ----------
        class Projectile {
            constructor(x,y, dmg) {
                this.x = x; this.y = y; this.radius = 5;
                this.damage = dmg;
                this.speed = -9;
            }
            update() { this.y += this.speed; }
            draw(ctx) {
                ctx.shadowBlur = 8;
                ctx.fillStyle = "#0cf";
                ctx.beginPath();
                ctx.rect(this.x-2, this.y-5, 4, 10);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(this.x, this.y-3, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // klasy wrogów
        class Asteroid {
            constructor(x,y, vx, vy, size=1) {
                this.x = x; this.y = y; this.radius = 12 + size*4;
                this.vx = vx; this.vy = vy;
                this.health = 1 + Math.floor(size*0.8);
                this.value = 10;
                this.crystalDrop = 3 + Math.floor(Math.random()*5);
            }
            update() { this.x += this.vx; this.y += this.vy; }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = "#6a4e2e";
                ctx.beginPath(); ctx.arc(0,0,this.radius-2,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#4a3520";
                ctx.beginPath(); ctx.arc(0,0,this.radius-5,0,Math.PI*2); ctx.fill();
                ctx.restore();
            }
        }
        
        class EnemyShip {
            constructor(x,y) {
                this.x = x; this.y = y; this.radius = 13;
                this.health = 2 + Math.floor(currentWave/5);
                this.vx = (Math.random() - 0.5)*1.2;
                this.vy = 1.2 + Math.random()*1.5;
                this.value = 20;
                this.crystalDrop = 5 + Math.floor(Math.random()*9);
                this.shootCooldown = 0;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.shootCooldown > 0) this.shootCooldown--;
            }
            draw(ctx) {
                ctx.fillStyle = "#a32c6d";
                ctx.beginPath(); ctx.moveTo(this.x, this.y-10); ctx.lineTo(this.x-12, this.y+5); ctx.lineTo(this.x-4, this.y+2); ctx.lineTo(this.x-4, this.y+10); ctx.lineTo(this.x, this.y+8); ctx.lineTo(this.x+4, this.y+10); ctx.lineTo(this.x+4, this.y+2); ctx.lineTo(this.x+12, this.y+5); ctx.fill();
                ctx.fillStyle = "#ff4455";
                ctx.beginPath(); ctx.arc(this.x-3, this.y-2, 2, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(this.x+3, this.y-2, 2, 0, Math.PI*2); ctx.fill();
            }
        }
        
        class Boss {
            constructor() {
                this.x = CW/2; this.y = 80;
                this.radius = 45;
                this.health = 60 + currentWave * 8;
                this.maxHealth = this.health;
                this.pattern = 0;
                this.shootTimer = 0;
                this.value = 500;
                this.crystalDrop = 100;
            }
            update() {
                this.x += Math.sin(frame*0.02)*2.2;
                this.x = Math.min(Math.max(this.x, 60), CW-60);
                if(this.shootTimer <= 0) {
                    for(let i=-2; i<=2; i++) {
                        let angle = Math.PI/2 + i*0.4;
                        let vx = Math.sin(angle)*3;
                        let vy = Math.cos(angle)*4;
                        enemyProjectiles.push({x: this.x, y: this.y+15, radius: 6, vx: vx, vy: vy, damage: 2});
                    }
                    this.shootTimer = 38;
                } else this.shootTimer--;
            }
            draw(ctx) {
                ctx.fillStyle = "#aa3377";
                ctx.shadowBlur = 16;
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.radius, this.radius*0.7, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#dd5555";
                ctx.beginPath(); ctx.arc(this.x-15, this.y-8, 8, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(this.x+15, this.y-8, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillRect(this.x-25, this.y+15, 50, 12);
                ctx.fillStyle = "#ffaa33";
                let hpPercent = this.health/this.maxHealth;
                ctx.fillRect(this.x-25, this.y+15, 50*hpPercent, 12);
                ctx.shadowBlur = 0;
            }
        }
        
        // power-up
        class PowerUp {
            constructor(x,y, type) {
                this.x = x; this.y = y; radius=10;
                this.type = type; // "heal", "doublePoints", "rapidFire", "invincible"
            }
            draw(ctx) {
                ctx.fillStyle = this.type === "heal" ? "#ff88aa" : (this.type === "doublePoints" ? "#ffcc44" : "#44ffcc");
                ctx.beginPath(); ctx.arc(this.x, this.y, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 12px monospace";
                ctx.fillText(this.type === "heal" ? "❤️" : (this.type === "doublePoints" ? "2X" : "⚡"), this.x-5, this.y+4);
            }
        }
        
        // pomocnicze funkcje
        function addParticles(x,y,color, cnt=7) {
            for(let i=0;i<cnt;i++) particles.push({x,y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3-1, life:0.8, size:3+Math.random()*4, color});
        }
        
        function spawnEnemyByWave() {
            if(bossActive || waveClearDelay > 0) return;
            let r = Math.random();
            if(r < 0.55) {
                let side = Math.floor(Math.random()*4);
                let x,y; if(side===0){x=-30; y=Math.random()*CH;} else if(side===1){x=CW+30; y=Math.random()*CH;} else if(side===2){x=Math.random()*CW; y=-30;} else {x=Math.random()*CW; y=CH+30;}
                let dx = player.x - x, dy = player.y - y; let len = Math.hypot(dx,dy);
                let vx = dx/len * (1+currentWave*0.12);
                let vy = dy/len * (1+currentWave*0.12);
                enemies.push(new Asteroid(x,y, vx+ (Math.random()-0.5)*0.7, vy+(Math.random()-0.5)*0.7, Math.random()>0.7?2:1));
            } else {
                let x = Math.random() * (CW-100)+50;
                let y = -30;
                enemies.push(new EnemyShip(x,y));
            }
        }
        
        function spawnPowerup(x,y) {
            let types = ["heal","doublePoints","rapidFire","invincible"];
            let rand = types[Math.floor(Math.random()*types.length)];
            powerups.push(new PowerUp(x,y,rand));
        }
        
        function updateGame() {
            if(!gameRunning) return;
            if(invincibleFrames > 0) invincibleFrames--;
            // strzelanie (automatyczne z cooldownem)
            if(currentFireDelay <= 0) {
                let dmg = playerDamage();
                projectiles.push(new Projectile(player.x, player.y-8, dmg));
                if(upgrades.fireRate.level >= 4) projectiles.push(new Projectile(player.x-6, player.y-6, dmg), new Projectile(player.x+6, player.y-6, dmg));
                currentFireDelay = fireCooldownFrames();
            } else currentFireDelay--;
            // ruch gracza
            // (sterowanie myszą)
            
            // kolizje pocisków
            for(let i=0;i<projectiles.length;i++) {
                let p = projectiles[i];
                p.update();
                if(p.y + p.radius < 0 || p.y > CH+100) { projectiles.splice(i,1); i--; continue; }
                let hit = false;
                for(let j=0;j<enemies.length;j++) {
                    let e = enemies[j];
                    let dist = Math.hypot(p.x - e.x, p.y - e.y);
                    if(dist < e.radius + 5) {
                        e.health -= p.damage;
                        if(e.health <= 0) {
                            let addScore = e.value;
                            score += addScore;
                            crystals += e.crystalDrop;
                            addParticles(e.x, e.y, "#ffaa44", 10);
                            if(Math.random()<0.3) spawnPowerup(e.x, e.y);
                            enemies.splice(j,1);
                            updateCrystalUI();
                        }
                        hit=true; break;
                    }
                }
                if(!hit && bossActive && boss && Math.hypot(p.x-boss.x, p.y-boss.y) < boss.radius+7) {
                    boss.health -= p.damage;
                    addParticles(boss.x, boss.y, "#ff8844", 4);
                    if(boss.health <= 0) {
                        score += boss.value; crystals += boss.crystalDrop;
                        addParticles(boss.x, boss.y, "#ffaa66", 30);
                        bossActive=false; boss=null;
                        showNotif("🔥 BOSS POKONANY! +500pkt +100💎");
                        updateCrystalUI();
                    }
                    hit=true;
                }
                if(hit) { projectiles.splice(i,1); i--; }
            }
            // aktualizacja wrogów i strzały wrogów
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                e.update();
                if(e instanceof EnemyShip && e.shootCooldown<=0 && Math.random()<0.02) {
                    let dx = player.x - e.x, dy = player.y - e.y; let len = Math.hypot(dx,dy);
                    if(len<350) {
                        let vx = dx/len*3.5; let vy = dy/len*3.5;
                        enemyProjectiles.push({x:e.x, y:e.y, radius:5, vx:vx, vy:vy, damage:1});
                        e.shootCooldown=45;
                    }
                }
                if(e.x+e.radius < -150 || e.x-e.radius > CW+150 || e.y+e.radius < -150 || e.y-e.radius > CH+150) enemies.splice(i,1),i--;
            }
            // pociski wrogów
            for(let i=0;i<enemyProjectiles.length;i++) {
                let ep = enemyProjectiles[i];
                ep.x += ep.vx; ep.y += ep.vy;
                if(ep.x<-100||ep.x>CW+100||ep.y<-100||ep.y>CH+100) { enemyProjectiles.splice(i,1); i--; continue; }
                if(Math.hypot(ep.x-player.x, ep.y-player.y) < player.radius+5) {
                    if(invincibleFrames<=0 && !(shieldActive && shieldHits>0)) {
                        lives--; invincibleFrames=35;
                        updateStatsUI();
                        addParticles(player.x, player.y, "#ff5555", 12);
                        if(lives<=0) gameRunning=false;
                    } else if(shieldActive && shieldHits>0){
                        shieldHits--; addParticles(player.x, player.y, "#77aaff", 8);
                        showNotif(`🛡️ Tarcza wytrzymała! pozostało ${shieldHits}`);
                        if(shieldHits<=0) shieldActive=false;
                    }
                    enemyProjectiles.splice(i,1); i--;
                }
            }
            // kolizje gracz vs wróg
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                if(Math.hypot(player.x-e.x, player.y-e.y) < player.radius+e.radius) {
                    if(invincibleFrames<=0 && !shieldActive) {
                        lives--; invincibleFrames=40; updateStatsUI(); addParticles(player.x, player.y, "#ff4444", 15);
                        enemies.splice(i,1); i--;
                        if(lives<=0) gameRunning=false;
                    } else if(shieldActive) { shieldActive=false; shieldHits=0; enemies.splice(i,1); i--; addParticles(player.x, player.y, "#88aaff", 12); showNotif("Tarcza zniszczona!");}
                    else { enemies.splice(i,1); i--; }
                }
            }
            // powerupy
            for(let i=0;i<powerups.length;i++) {
                let pu = powerups[i];
                if(Math.hypot(pu.x-player.x, pu.y-player.y) < 20) {
                    if(pu.type==="heal") { lives = Math.min(lives+1, 8); updateStatsUI(); showNotif("❤️ +1 życia");}
                    else if(pu.type==="doublePoints") { /* uproszczone, dajemy dodatkowe punkty */ score+=50; showNotif("✨ +50 pkt");}
                    else if(pu.type==="rapidFire") { currentFireDelay=0; showNotif("⚡ szybkostrzelność!");}
                    else if(pu.type==="invincible") { invincibleFrames=90; showNotif("🛡️ NIETYKALNOŚĆ!");}
                    powerups.splice(i,1); i--;
                }
            }
            // magnet
            let magR = magnetRange();
            for(let i=0;i<powerups.length;i++) if(Math.hypot(powerups[i].x-player.x, powerups[i].y-player.y)<magR) { powerups[i].x += (player.x-powerups[i].x)*0.15; powerups[i].y += (player.y-powerups[i].y)*0.15; }
            
            // spawn fal
            if(!bossActive && enemies.length===0 && waveClearDelay<=0) {
                currentWave++;
                updateStatsUI();
                if(currentWave % 4 === 0 && currentWave>2) {
                    bossActive=true;
                    boss = new Boss();
                    showNotif("⚠️ BOSS NADCHODZI! ⚠️");
                } else {
                    for(let i=0;i<3+Math.min(6, currentWave);i++) spawnEnemyByWave();
                }
                waveClearDelay=25;
            } else if(waveClearDelay>0) waveClearDelay--;
            else if(enemies.length<5+Math.floor(currentWave/3) && !bossActive && Math.random()<0.02) spawnEnemyByWave();
            
            // gracz granice
            player.x = Math.min(Math.max(player.x, player.radius+8), CW-player.radius-8);
            player.y = Math.min(Math.max(player.y, player.radius+20), CH-20);
            frame++;
        }
        
        // RENDEROWANIE
        function draw() {
            ctx.clearRect(0,0,CW,CH);
            // tło gwiazdy
            for(let i=0;i<300;i++) { ctx.fillStyle=`rgba(255,255,200,${0.3+Math.sin(Date.now()*0.002+i)*0.2})`; ctx.beginPath(); ctx.arc((i*131)%CW, (i*253)%CH, 1.2,0,Math.PI*2); ctx.fill(); }
            // wrogowie
            for(let e of enemies) e.draw(ctx);
            if(bossActive && boss) boss.draw(ctx);
            for(let p of projectiles) p.draw(ctx);
            for(let ep of enemyProjectiles) { ctx.fillStyle="#ff6655"; ctx.beginPath(); ctx.arc(ep.x, ep.y, 4,0,Math.PI*2); ctx.fill(); }
            for(let pu of powerups) pu.draw(ctx);
            // statek
            ctx.shadowBlur=8; ctx.fillStyle="#44ffff"; ctx.beginPath(); ctx.moveTo(player.x, player.y-14); ctx.lineTo(player.x-12, player.y+6); ctx.lineTo(player.x-4, player.y+2); ctx.lineTo(player.x-4, player.y+12); ctx.lineTo(player.x, player.y+8); ctx.lineTo(player.x+4, player.y+12); ctx.lineTo(player.x+4, player.y+2); ctx.lineTo(player.x+12, player.y+6); ctx.fill(); ctx.fillStyle="#ffaa44"; ctx.beginPath(); ctx.moveTo(player.x-3, player.y+5); ctx.lineTo(player.x, player.y+15); ctx.lineTo(player.x+3, player.y+5); ctx.fill(); ctx.shadowBlur=0;
            if(invincibleFrames>0 && (Math.floor(Date.now()/60)%2===0)) ctx.fillStyle="rgba(255,255,200,0.5)", ctx.beginPath(), ctx.arc(player.x, player.y, 20,0,Math.PI*2), ctx.fill();
            for(let p of particles) { p.life-=0.02; p.x+=p.vx; p.y+=p.vy; ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size*0.7,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1;
            particles = particles.filter(p=>p.life>0);
            if(!gameRunning) { ctx.font="bold 40px Orbitron"; ctx.fillStyle="#ff5577"; ctx.fillText("💀 GAME OVER 💀", CW/2-180, CH/2); ctx.font="18px monospace"; ctx.fillStyle="white"; ctx.fillText("kliknij RESTART", CW/2-80, CH/2+60); }
        }
        
        // UI
        function updateStatsUI() { livesUiSpan.innerText = lives; levelUiSpan.innerText = currentWave; scoreUiSpan.innerText = Math.floor(score); }
        function updateCrystalUI() { crystalSpan.innerText = Math.floor(crystals); }
        
        // sterowanie
        let mouseX = player.x, mouseY = player.y;
        function handleMove(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            let canvasX = (clientX - rect.left) * (CW/rect.width);
            let canvasY = (clientY - rect.top) * (CH/rect.height);
            canvasX = Math.min(Math.max(canvasX, 20), CW-20);
            canvasY = Math.min(Math.max(canvasY, 40), CH-30);
            player.x = canvasX; player.y = canvasY;
        }
        canvas.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); });
        canvas.addEventListener('click', (e) => { currentFireDelay = 0; }); // natychmiastowy strzał
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); currentFireDelay = 0; });
        
        function resetFullGame() {
            gameRunning = true; score = 0; crystals = 100; lives = 3; currentWave = 1; enemies = []; projectiles = []; enemyProjectiles = []; powerups = []; particles = []; bossActive=false; boss=null; invincibleFrames=0;
            for(let key in upgrades) upgrades[key].level = 0;
            shieldActive=false; shieldHits=0;
            player.speed = 6.5; player.x = CW/2; player.y = CH-70;
            updateCrystalUI(); updateStatsUI(); updateUpgradesUI();
            for(let i=0;i<4;i++) spawnEnemyByWave();
            showNotif("✨ Gra zresetowana! Powodzenia ✨");
        }
        resetBtn.addEventListener('click', resetFullGame);
        resetFullGame();
        // pętla gry
        function gameLoop() { updateGame(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    })();
</script>
</body>
</html>
