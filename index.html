<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikalne zdjęcie – zdrowie psychiczne</title>
    <style>
        /* Proste wyśrodkowanie i responsywność */
        .clickable-image {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            max-width: 100%;
        }
        .clickable-image a {
            display: inline-block;
            max-width: 100%;
            line-height: 0;
        }
        .clickable-image img {
            max-width: 100%;
            height: auto;
            border: none;
            cursor: pointer;
            /* Opcjonalny cień dla lepszego wyglądu */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        /* Dodatkowa informacja dla użytkownika */
        .info {
            text-align: center;
            font-family: sans-serif;
            color: #555;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="clickable-image">
        <!-- 
            UWAGA:
            1. ZAMIENŃ "twoje-zdjecie.png" na prawdziwą ścieżkę do pliku graficznego.
            2. ZAMIENŃ "https://docelowy-link.pl" na adres URL, który ma otworzyć się po kliknięciu.
            3. Możesz dodać target="_blank", aby link otwierał się w nowej karcie.
        -->
        <a href="https://docelowy-link.pl" target="_blank" rel="noopener noreferrer">
            <img src="15A9F9B2-3395-44EA-9864-F4E4E1809B47.png" alt="Klikalny obrazek – zdrowie psychiczne">
        </a>
    </div>
    <div class="info">
        ⚠️ Pamiętaj: zastąp <strong>twoje-zdjecie.png</strong> ścieżką do swojego pliku,<br>
        a <strong>https://docelowy-link.pl</strong> adresem strony, która ma się otworzyć po kliknięciu.
    </div>
</body>
</html>
