<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kompletacja zamówienia</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

button{
padding:12px;
font-size:16px;
margin:10px;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
border:3px solid black;
}

ul{
list-style:none;
padding:0;
}

li{
background:#eee;
margin:6px;
padding:12px;
border-radius:6px;
font-size:18px;
}

.done{
background:#8ee28e;
}

</style>
</head>

<body>

<h1>📦 Kompletacja zamówienia</h1>

<h2>1️⃣ Skan faktury</h2>

<input type="file" id="invoice" accept="image/*" capture="environment">

<br>

<button onclick="scanInvoice()">Odczytaj fakturę</button>

<h2>Lista produktów</h2>

<ul id="productList"></ul>

<h2>2️⃣ Skanuj produkty</h2>

<button onclick="startScanner()">Start skanera</button>

<div id="scanner"></div>

<script>

const products={

"037":"Minerały Nature-Min",
"206":"Forever Calcium",
"051":"Krem Aloesowo Propolisowy",
"247":"Forever Vitalize Women",
"374":"Forever Vitalize Men"

};

let order=[];

function render(){

const list=document.getElementById("productList");
list.innerHTML="";

order.forEach(p=>{

let li=document.createElement("li");

li.innerText=p.name+" ("+p.picked+"/"+p.qty+")";

if(p.picked>=p.qty){
li.classList.add("done");
}

list.appendChild(li);

});

}

function scanInvoice(){

const file=document.getElementById("invoice").files[0];

if(!file){
alert("Dodaj zdjęcie faktury");
return;
}

Tesseract.recognize(file,'eng').then(({data:{text}})=>{

let lines=text.split("\n");

order=[];

lines.forEach(line=>{

let code=line.match(/\b\d{3}\b/);
let qty=line.match(/\b\d+\b$/);

if(code && qty){

let c=code[0];
let q=parseInt(qty[0]);

if(products[c]){

order.push({
code:c,
name:products[c],
qty:q,
picked:0
});

}

}

});

render();

});

}

function startScanner(){

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:["ean_reader","code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(result){

let barcode=result.codeResult.code;

let shortCode=barcode.slice(-3);

order.forEach(p=>{

if(p.code==shortCode && p.picked<p.qty){

p.picked++;

}

});

render();

});

}

</script>

</body>
</html>
