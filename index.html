<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porównywarka Cen</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0b1c3a, #050d1f);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 40px 20px;
}

.search-box {
    width: 60%;
    padding: 18px;
    border-radius: 15px;
    border: none;
    outline: none;
    font-size: 18px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(0,150,255,0.6);
    color: white;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.product-title {
    font-size: 20px;
    margin-bottom: 15px;
}

/* OFFER */
.offer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.price {
    font-weight: bold;
}

.best {
    color: #00ff88;
    font-size: 12px;
    margin-left: 8px;
}

/* BUTTON */
button {
    background: #0a84ff;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0066cc;
}
</style>
</head>

<body>

<div class="header">
    <h1>Porównywarka cen</h1>
    <input class="search-box" placeholder="Szukaj produktu...">
</div>

<div class="container">

    <!-- Samsung -->
    <div class="card">
        <div class="product-title">Samsung Galaxy A54</div>

        <div class="offer">
            <span>Media Expert</span>
            <span class="price">1599 zł <span class="best">Najtaniej</span></span>
            <button onclick="go('https://www.mediaexpert.pl')">Przejdź</button>
        </div>

        <div class="offer">
            <span>x-kom</span>
            <span class="price">1649 zł</span>
            <button onclick="go('https://www.x-kom.pl')">Przejdź</button>
        </div>

        <div class="offer">
            <span>Allegro</span>
            <span class="price">1679 zł</span>
            <button onclick="go('https://allegro.pl')">Przejdź</button>
        </div>
    </div>

    <!-- iPhone -->
    <div class="card">
        <div class="product-title">iPhone 14</div>

        <div class="offer">
            <span>Media Expert</span>
            <span class="price">4149 zł</span>
            <button onclick="go('https://www.mediaexpert.pl')">Przejdź</button>
        </div>

        <div class="offer">
            <span>x-kom</span>
            <span class="price">4099 zł <span class="best">Najtaniej</span></span>
            <button onclick="go('https://www.x-kom.pl')">Przejdź</button>
        </div>

        <div class="offer">
            <span>Allegro</span>
            <span class="price">4199 zł</span>
            <button onclick="go('https://allegro.pl')">Przejdź</button>
        </div>
    </div>

    <!-- Logitech -->
    <div class="card">
        <div class="product-title">Myszka Logitech</div>

        <div class="offer">
            <span>Media Expert</span>
            <span class="price">159 zł</span>
            <button onclick="go('https://www.mediaexpert.pl')">Przejdź</button>
        </div>

        <div class="offer">
            <span>x-kom</span>
            <span class="price">149 zł <span class="best">Najtaniej</span></span>
            <button onclick="go('https://www.x-kom.pl')">Przejdź</button>
        </div>

        <div class="offer">
            <span>Allegro</span>
            <span class="price">165 zł</span>
            <button onclick="go('https://allegro.pl')">Przejdź</button>
        </div>
    </div>

</div>

<script>
function go(url) {
    window.open(url, "_blank");
}
</script>

</body>
</html>
