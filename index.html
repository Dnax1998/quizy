<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Zdrowie Psychiczne - Mapa pomocy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f7;  /* delikatne tło wokół obrazka */
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* kontener dla obrazka – responsywny, zachowuje proporcje */
        .image-map-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            line-height: 0;   /* usuwa dodatkową przestrzeń pod obrazkiem */
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            user-select: none;
        }

        /* mała stopka z informacją / instrukcją (opcjonalnie, nie przeszkadza) */
        .info-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.85rem;
            color: #2c3e4e;
            background: rgba(255,255,240,0.8);
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 60px;
            max-width: 90%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .info-footer a {
            color: #1f6392;
            text-decoration: none;
            border-bottom: 1px dotted #1f6392;
        }

        .info-footer a:hover {
            color: #0b3b55;
            border-bottom: 1px solid;
        }

        /* bardzo subtelne podświetlenie obszarów po najechaniu – tylko dla wygody użytkownika (nie ingeruje w design) */
        area {
            outline: none;
        }

        /* mała pomoc – kursor wskazuje, że obrazek ma klikalne strefy */
        img {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="image-map-container">
    <!-- 
        UWAGA: 
        - Wstaw tutaj ścieżkę do swojego pliku graficznego (np. "moje-tlo.png", "obrazek-zdrowie.jpg").
        - Obrazek powinien zawierać wszystkie elementy wizualne (nagłówki, telefony, przyciski, tabelę).
        - Poniższy kod tworzy KLIKALNE OBSZARY dopasowane do oryginalnego projektu.
        - Współrzędne są przygotowane PRZYKŁADOWO. Aby idealnie trafić w przyciski na TWOIM obrazku,
          zmień wartości "coords" w znacznikach <area> – możesz użyć darmowego narzędzia online "image map editor"
          lub zmierzyć piksele w programie graficznym (GIMP, Photoshop).
        - Skrypt automatycznie skaluje współrzędne, gdy obrazek jest wyświetlany w różnej szerokości.
    -->
    <img src="15A9F9B2-3395-44EA-9864-F4E4E1809B47.png"
         alt="Strona główna – Zdrowie psychiczne, telefony zaufania, poradnie i wsparcie"
         id="mainHealthImage"
         usemap="#healthMap"
         style="width:100%; height:auto;">

    <map name="healthMap" id="healthMap">
        <!-- ========== MENU GÓRNE (Strona Główna | O Nas | Artykuły | Kontakt) ========== -->
        <!-- UWAGA: współrzędne są przykładowe (zakładając obrazek o szerokości ok. 1200-1400px).
             Dostosuj je do swojego obrazka za pomocą edytora map. -->
        <area shape="rect" coords="80,110,210,150" href="#glowna" data-link-type="menu" title="Strona Główna" alt="Strona Główna">
        <area shape="rect" coords="250,110,370,150" href="#onas" data-link-type="menu" title="O Nas" alt="O Nas">
        <area shape="rect" coords="410,110,540,150" href="#artykuly" data-link-type="menu" title="Artykuły" alt="Artykuły">
        <area shape="rect" coords="580,110,710,150" href="#kontakt" data-link-type="menu" title="Kontakt" alt="Kontakt">

        <!-- ========== TELEFONY ZAUFANIA (numery oraz przycisk "Więcej informacji") ========== -->
        <!-- numer 116 111 – prostokąt wokół tekstu i numeru (klikalny telefon) -->
        <area shape="rect" coords="180,410,540,465" href="tel:116111" title="Zadzwoń na 116 111 – Telefon Zaufania dla Dzieci i Młodzieży" alt="Telefon 116 111">
        <!-- numer 800 70 222 -->
        <area shape="rect" coords="180,485,540,540" href="tel:80070222" title="Zadzwoń na 800 70 222 – Linia Wsparcia" alt="Linia Wsparcia 800 70 222">
        <!-- przycisk "Więcej informacji >" (w pobliżu telefonów) – zwykle link do strony z infolinią -->
        <area shape="rect" coords="760,470,1020,520" href="https://www.gov.pl/web/zdrowie/telefony-zaufania" target="_blank" title="Więcej informacji o telefonach zaufania" alt="Więcej informacji">

        <!-- ========== SEKCJA: Higiena Zdrowia Psychicznego (nie ma wyraźnego przycisku, ale można dodać ewentualny link; zostawiamy jako ciekawostkę – opcjonalnie) -->
        <!-- dla porządku – można kliknąć w tytuł sekcji? ale nie narzucamy -->

        <!-- ========== SEKCJA: Poradnie Psychologiczno-Pedagogiczne (przycisk "Znajdź poradnię >") ========== -->
        <area shape="rect" coords="760,670,1020,720" href="https://poradnie.ppp.edu.pl/" target="_blank" title="Znajdź poradnię psychologiczno-pedagogiczną" alt="Znajdź poradnię">

        <!-- ========== SEKCJA: Wsparcie w Fundacjach i Stowarzyszeniach (przycisk "Sprawdź możliwości >") ========== -->
        <area shape="rect" coords="760,850,1040,900" href="https://www.opp.org.pl/wsparcie-psychiczne" target="_blank" title="Sprawdź możliwości wsparcia w fundacjach" alt="Sprawdź możliwości">

        <!-- ========== TABELA: 4 INSTYTUCJE (Szpitale, Poradnie Zdrowia Psychicznego, Centra Środowiskowe, Ośrodki Interwencji Kryzysowej) ========== -->
        <!-- Szpitale Psychiatryczne – klikalny obszar pierwszej komórki -->
        <area shape="rect" coords="100,1060,360,1120" href="https://www.nfz.gov.pl/dla-pacjenta/psychiatria/szpitale" target="_blank" title="Informacje o szpitalach psychiatrycznych" alt="Szpitale Psychiatryczne">
        <!-- Poradnie Zdrowia Psychicznego -->
        <area shape="rect" coords="400,1060,660,1120" href="https://www.nfz.gov.pl/dla-pacjenta/psychiatria/poradnie" target="_blank" title="Poradnie zdrowia psychicznego - terapia i konsultacje" alt="Poradnie Zdrowia Psychicznego">
        <!-- Centra Zdrowia Środowiskowego -->
        <area shape="rect" coords="700,1060,960,1120" href="https://www.nfz.gov.pl/dla-pacjenta/psychiatria/czs" target="_blank" title="Centra Zdrowia Środowiskowego – wsparcie w społeczności" alt="Centra Zdrowia Środowiskowego">
        <!-- Ośrodki Interwencji Kryzysowej -->
        <area shape="rect" coords="100,1140,360,1200" href="https://www.niebieskalinia.pl/ośrodki-interwencji-kryzysowej" target="_blank" title="Ośrodki Interwencji Kryzysowej – pomoc w nagłych sytuacjach" alt="Ośrodki Interwencji Kryzysowej">

        <!-- dodatkowo – dla wygody: cały nagłówek “Instytucje Zdrowia Psychicznego” nie jest klikalny, ale można dodać pomocniczy obszar informacyjny -->
        <!-- UWAGA: powyższe współrzędne są orientacyjne i bazują na typowym układzie graficznym.
             Jeśli na Twoim obrazku przyciski lub teksty znajdują się w innych miejscach, popraw wartości coords.
             W razie potrzeby skorzystaj z narzędzia: https://www.image-map.net/  (wgraj obrazek, zaznacz prostokąty i wyeksportuj HTML) -->
    </map>
</div>

<div class="info-footer">
    💡 <strong>Klikalna mapa obrazu</strong> – wszystkie przyciski, numery telefonów i kafelki w tabeli są aktywne.  
    Jeśli obszary nie trafiają idealnie w Twoim obrazku → <a href="#" id="editCoordsHint">dostosuj współrzędne</a> (instrukcja w komentarzach kodu).
</div>

<script>
    (function() {
        // --------------------------------------------------------------
        // RESPONSYWNA SKALA MAPY OBRAZU
        // Działa dla shape="rect" (prostokąty) – przechowuje oryginalne współrzędne,
        // a przy zmianie rozmiaru okna lub załadowaniu obrazka przelicza je na podstawie aktualnej skali.
        // --------------------------------------------------------------
        
        const img = document.getElementById('mainHealthImage');
        const map = document.getElementById('healthMap');
        if (!img || !map) {
            console.warn('Brak obrazka lub mapy – sprawdź ID elementów.');
            return;
        }

        // Pobierz wszystkie obszary <area> z mapy
        let areas = [];
        // Zbieramy tylko area z shape="rect" – inne kształty można rozszerzyć, ale dla prostokątów jest najczęstsze
        const areaElements = map.querySelectorAll('area[shape="rect"]');
        
        // Dla każdego area zapamiętujemy ORYGINALNE współrzędne (względem naturalnych wymiarów obrazka)
        // oraz przechowujemy je w atrybucie data-original-coords
        function storeOriginalCoords() {
            for (let area of areaElements) {
                let originalCoords = area.getAttribute('coords');
                if (originalCoords && originalCoords.trim() !== '') {
                    // zapisujemy oryginalny string współrzędnych w atrybucie data
                    area.setAttribute('data-original-coords', originalCoords);
                } else {
                    // jeśli brak współrzędnych, pomijamy
                    console.warn('Brak coords dla area', area);
                }
            }
        }
        
        // Funkcja aktualizująca współrzędne w zależności od aktualnego rozmiaru obrazka
        function updateMapCoords() {
            // upewniamy się, że obrazek ma załadowane naturalne wymiary
            if (!img.naturalWidth || !img.naturalHeight) {
                // jeśli obrazek nie jest jeszcze w pełni gotowy, odczekaj
                if (img.complete && img.naturalWidth > 0) {
                    // ok, kontynuuj
                } else {
                    // poczekamy na kolejne wywołanie
                    return;
                }
            }
            
            const naturalW = img.naturalWidth;
            const naturalH = img.naturalHeight;
            const currentW = img.clientWidth;
            const currentH = img.clientHeight;
            
            if (naturalW === 0 || naturalH === 0 || currentW === 0 || currentH === 0) {
                return;
            }
            
            // skala w poziomie i pionie (zachowujemy proporcje obrazka, ale dla bezpieczeństwa obliczamy oddzielnie)
            const scaleX = currentW / naturalW;
            const scaleY = currentH / naturalH;
            
            // przeliczamy współrzędne dla każdego area (rect)
            for (let area of areaElements) {
                const originalCoordsStr = area.getAttribute('data-original-coords');
                if (!originalCoordsStr) continue;
                
                // format dla rect: "x1,y1,x2,y2"
                const parts = originalCoordsStr.split(',').map(part => parseInt(part.trim(), 10));
                if (parts.length !== 4 || parts.some(isNaN)) {
                    console.warn('Nieprawidłowe współrzędne dla area', area);
                    continue;
                }
                
                let [x1, y1, x2, y2] = parts;
                // nowe współrzędne (zaokrąglone)
                const newX1 = Math.round(x1 * scaleX);
                const newY1 = Math.round(y1 * scaleY);
                const newX2 = Math.round(x2 * scaleX);
                const newY2 = Math.round(y2 * scaleY);
                
                area.setAttribute('coords', `${newX1},${newY1},${newX2},${newY2}`);
            }
        }
        
        // Obsługa zmiany rozmiaru okna (z debounce, by nie przeciążać)
        let resizeTimer;
        function handleResize() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (img.naturalWidth && img.naturalHeight) {
                    updateMapCoords();
                }
            }, 100);
        }
        
        // Gdy obrazek jest już załadowany, przechowujemy oryginalne współrzędne (względem naturalnych rozmiarów)
        // i aktualizujemy mapę.
        function onImageLoad() {
            // Zanim przeliczymy, zapisz oryginalne współrzędne (jeśli nie istnieją)
            for (let area of areaElements) {
                if (!area.hasAttribute('data-original-coords')) {
                    const currentCoords = area.getAttribute('coords');
                    if (currentCoords && currentCoords.trim() !== '') {
                        area.setAttribute('data-original-coords', currentCoords);
                    } else {
                        // ustaw jakiś placeholder? pomijamy
                        continue;
                    }
                }
            }
            // Aktualizacja współrzędnych na podstawie bieżącego rozmiaru
            updateMapCoords();
        }
        
        // Jeśli obrazek już jest załadowany (z cache), wywołaj od razu
        if (img.complete && img.naturalWidth > 0) {
            storeOriginalCoords();      // najpierw zapamiętaj oryginalne coords (jeśli jeszcze nie ma data-*)
            // ale potrzebujemy mieć pewność, że data-original-coords jest ustawione przed skalowaniem
            for (let area of areaElements) {
                if (!area.hasAttribute('data-original-coords')) {
                    const cur = area.getAttribute('coords');
                    if (cur) area.setAttribute('data-original-coords', cur);
                }
            }
            onImageLoad();
        } else {
            img.addEventListener('load', () => {
                storeOriginalCoords();
                onImageLoad();
            });
        }
        
        // Nasłuchiwanie zmiany rozmiaru okna
        window.addEventListener('resize', handleResize);
        
        // dodatkowa aktualizacja po ewentualnym obróceniu ekranu (orientacja)
        window.addEventListener('orientationchange', function() {
            setTimeout(() => {
                if (img.naturalWidth) updateMapCoords();
            }, 50);
        });
        
        // Jeśli jakiekolwiek style lub czcionki wpływają na opóźnienie, ponownie sprawdź po krótkim czasie
        setTimeout(() => {
            if (img.naturalWidth && img.naturalHeight) updateMapCoords();
        }, 200);
        
        // mała pomoc: wyświetlenie instrukcji edycji współrzędnych po kliknięciu w link "dostosuj współrzędne"
        const editHint = document.getElementById('editCoordsHint');
        if (editHint) {
            editHint.addEventListener('click', (e) => {
                e.preventDefault();
                alert(
                    "📐 JAK DOSTOSOWAĆ WSPÓŁRZĘDNE?\n\n" +
                    "1. Otwórz obrazek (ten sam plik) w edytorze graficznym lub na stronie https://www.image-map.net/\n" +
                    "2. Załaduj swój obrazek i zaznaczaj prostokątami przyciski (menu, 'Więcej informacji', 'Znajdź poradnię', 'Sprawdź możliwości', komórki tabeli).\n" +
                    "3. Skopiuj wygenerowane współrzędne (coords) dla każdego obszaru.\n" +
                    "4. W kodzie HTML znajdź odpowiednie znaczniki <area> i wstaw nowe wartości 'coords'.\n" +
                    "5. Zapisz plik i odśwież stronę – obszary będą idealnie pasować.\n\n" +
                    "💡 UWAGA: Obrazek nie traci jakości – skrypt automatycznie skaluje współrzędne dla responsywności."
                );
            });
        }
        
        // zapewniamy też, że wszystkie linki otwierają się w sposób bezpieczny (dodanie target="_blank" dla zewnętrznych)
        // oraz zabezpieczenie przed lukami
        const allAreas = map.querySelectorAll('area');
        for (let area of allAreas) {
            let href = area.getAttribute('href');
            if (href && href.startsWith('http') && !area.getAttribute('target')) {
                area.setAttribute('target', '_blank');
                area.setAttribute('rel', 'noopener noreferrer');
            }
            // dodanie tytułu jeśli brak
            if (!area.getAttribute('title') && href) {
                if (href.startsWith('tel:')) {
                    area.setAttribute('title', `Zadzwoń: ${href.replace('tel:', '')}`);
                } else {
                    area.setAttribute('title', 'Kliknij, aby przejść');
                }
            }
        }
        
        // małe usprawnienie – dla linków wewnętrznych (#) nie dodajemy przewijania jeśli to placeholder, ale pozwalamy
        // żeby nie przerywać użytkownikowi – pozostawiamy domyślne działanie, ale można zmienić.
        // Dla estetyki – nic więcej nie robimy.
        console.log('✅ Klikalna mapa gotowa – strefy są responsywne!');
    })();
</script>

<!-- 
    INSTRUKCJA KOŃCOWA:
    ====================
    1. Zmień atrybut src obrazka: <img src="twoj-obrazek-tla.png"> na prawdziwą ścieżkę do Twojego pliku PNG/JPG.
    2. Jeśli elementy (przyciski, numery, kafelki) na Twoim obrazku znajdują się w innych miejscach niż założono:
       - użyj narzędzia online https://www.image-map.net/
       - wgraj swój obrazek, zaznaczaj prostokątami (rect) każdy klikalny obszar.
       - Skopiuj wygenerowane współrzędne do odpowiednich znaczników <area>.
    3. W razie potrzeby zmień docelowe linki (href) – np. zamiast #glowna wstaw rzeczywisty adres podstrony.
    4. Kod w pełni responsywny – działa na telefonach i desktopach, współrzędne skalują się automatycznie.
    5. Aby opublikować na GitHub: utwórz repozytorium, wgraj plik HTML i obrazek, włącz GitHub Pages.
       Domena podłączona będzie działać bez dodatkowych zmian.

    POWODZENIA! Twoja strona z "klikalnym zdjęciem" jest gotowa.
-->
</body>
</html>
