<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Drużyny – CS2 Liga</title>
    <style>/* ten sam CSS – pomijam dla zwięzłości, w praktyce kopiuj */</style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f1e; color: #e0e0e0; }
        a { color: #bb86fc; text-decoration: none; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; }
        header { background: #1f1f2e; padding: 1rem 0; border-bottom: 2px solid #bb86fc; position: sticky; top: 0; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: bold; color: #bb86fc; }
        .logo span { color: #fff; }
        nav ul { display: flex; list-style: none; gap: 1.5rem; }
        nav ul li a { color: #e0e0e0; font-weight: 500; padding: 0.5rem 0; }
        nav ul li a:hover, nav ul li a.active { color: #bb86fc; border-bottom: 2px solid #bb86fc; }
        .btn { background: #bb86fc; color: #0f0f1e; padding: 0.5rem 1.2rem; border-radius: 5px; font-weight: bold; }
        section { padding: 2rem 0; }
        h1 { color: #bb86fc; margin-bottom: 1.5rem; }
        .search-box { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .search-box input { flex: 1; padding: 0.8rem; border: none; border-radius: 5px; background: #1f1f2e; color: #fff; }
        .search-box button { padding: 0.8rem 2rem; }
        .druzyny-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .druzyna-karta { background: #1f1f2e; border-radius: 8px; padding: 1.5rem; text-align: center; border-left: 4px solid #bb86fc; }
        .druzyna-karta img { width: 80px; height: 80px; background: #2a2a3a; border-radius: 50%; margin-bottom: 1rem; }
        .druzyna-karta h3 { margin-bottom: 0.5rem; }
        .druzyna-karta p { color: #aaa; }
        .footer { background: #1a1a2a; text-align: center; padding: 2rem 0; margin-top: 2rem; }
        .dropdown-content { display: none; position: absolute; background: #1f1f2e; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border-radius: 5px; }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { display: block; padding: 0.8rem 1rem; border-bottom: 1px solid #2a2a3a; }
    </style>
</head>
<body>
    <header>[... taki sam nagłówek jak w index, z aktywną zakładką "Drużyny" ...]</header>

    <div class="container">
        <h1>Drużyny</h1>
        <div class="search-box">
            <input type="text" placeholder="Szukaj drużyny...">
            <button class="btn">Szukaj</button>
        </div>
        <div class="druzyny-grid">
            <div class="druzyna-karta">
                <img src="https://via.placeholder.com/80" alt="logo">
                <h3>Virtus.Pro</h3>
                <p>Kapitan: byali</p>
                <p>Dywizja 1 | 10-2</p>
                <a href="profil_druzyny.html">Profil</a>
            </div>
            <div class="druzyna-karta">
                <img src="https://via.placeholder.com/80" alt="logo">
                <h3>FaZe Clan</h3>
                <p>Kapitan: karrigan</p>
                <p>Dywizja 1 | 9-3</p>
                <a href="#">Profil</a>
            </div>
            <div class="druzyna-karta">
                <img src="https://via.placeholder.com/80" alt="logo">
                <h3>Team Spirit</h3>
                <p>Kapitan: chopper</p>
                <p>Dywizja 2 | 11-1</p>
                <a href="#">Profil</a>
            </div>
            <!-- więcej drużyn -->
        </div>
    </div>

    <footer class="footer">[...]</footer>
</body>
</html>
