<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator etykiet lokalizacyjnych QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f3f4f6; margin: 0; padding: 20px; }
        .app { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        h1 { margin: 0; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .btn-back { background: #e2e8f0; color: #1e293b; padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; }
        .controls { display: flex; gap: 16px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
        .controls select { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 40px; font-size: 16px; background: white; min-width: 200px; }
        .btn { padding: 12px 24px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; background: #e2e8f0; color: #1e293b; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-pdf { background: #8b5cf6; color: white; }
        .info { background: #f1f5f9; padding: 12px 16px; border-radius: 16px; margin-bottom: 20px; color: #475569; }
        .preview-title { font-weight: 600; margin: 20px 0 12px 0; color: #334155; }
        .label-grid { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .label-item { 
            width: 50mm; 
            height: 30mm; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            padding: 3mm; 
            background: white; 
            display: flex; 
            align-items: center; 
            gap: 3mm;
        }
        .label-qr { width: 20mm; height: 20mm; }
        .label-text { flex: 1; text-align: center; }
        .label-text .location { font-size: 14px; font-weight: 700; color: #1e293b; }
        .label-text .rack { font-size: 10px; color: #64748b; margin-top: 2px; }
        @media print {
            body { background: white; padding: 0; }
            .app { box-shadow: none; padding: 10px; }
            .no-print, .header, .controls, .info, .preview-title, .btn { display: none !important; }
            .label-grid { gap: 0; }
            .label-item { border: 1px dashed #ccc; border-radius: 0; page-break-inside: avoid; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🏷️ Etykiety lokalizacyjne QR (50×30 mm)</h1>
        <button class="btn-back" id="backBtn">⬅️ Powrót do magazynu</button>
    </div>

    <div class="controls">
        <select id="rackSelect">
            <option value="all">Wszystkie regały (A, B, C, D)</option>
            <option value="A">Regał A</option>
            <option value="B">Regał B</option>
            <option value="C">Regał C</option>
            <option value="D">Regał D</option>
        </select>
        <button class="btn btn-primary" id="generateBtn">🔄 Generuj podgląd</button>
        <button class="btn btn-pdf" id="downloadPdfBtn">📥 Pobierz PDF</button>
        <button class="btn" id="printBtn">🖨️ Drukuj</button>
    </div>

    <div class="info">
        ℹ️ Każda etykieta zawiera kod QR z identyfikatorem lokalizacji (np. RA-P3-K12) oraz czytelny tekst. Naklej na odpowiednie miejsce na regale.
    </div>

    <div class="preview-title">📄 Podgląd etykiet</div>
    <div id="labelGrid" class="label-grid"></div>
</div>

<script>
    const RACKS = ['A', 'B', 'C', 'D'];
    const LEVELS = 5;
    const COLUMNS = 21;

    const rackSelect = document.getElementById('rackSelect');
    const generateBtn = document.getElementById('generateBtn');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');
    const printBtn = document.getElementById('printBtn');
    const backBtn = document.getElementById('backBtn');
    const labelGrid = document.getElementById('labelGrid');

    function getLocationId(rack, level, col) {
        return `R${rack}-P${level}-K${col}`;
    }

    function generateQRCode(data, size = 80) {
        const qr = qrcode(0, 'M');
        qr.addData(data);
        qr.make();
        const cells = qr.getModuleCount();
        const cellSize = size / cells;
        let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
        for (let row = 0; row < cells; row++) {
            for (let col = 0; col < cells; col++) {
                if (qr.isDark(row, col)) {
                    svg += `<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="black" />`;
                }
            }
        }
        svg += '</svg>';
        return svg;
    }

    function renderLabels(rackFilter = 'all') {
        let html = '';
        for (const rack of RACKS) {
            if (rackFilter !== 'all' && rack !== rackFilter) continue;
            for (let level = 1; level <= LEVELS; level++) {
                for (let col = 1; col <= COLUMNS; col++) {
                    const locId = getLocationId(rack, level, col);
                    const displayText = `${rack}-${level}-${col}`;
                    const qrSvg = generateQRCode(locId, 70);
                    
                    html += `
                        <div class="label-item">
                            <div class="label-qr">${qrSvg}</div>
                            <div class="label-text">
                                <div class="location">${displayText}</div>
                                <div class="rack">${locId}</div>
                            </div>
                        </div>
                    `;
                }
            }
        }
        labelGrid.innerHTML = html || '<p>Wybierz regał i kliknij "Generuj podgląd".</p>';
    }

    async function generatePDF() {
        const rackFilter = rackSelect.value;
        const { jsPDF } = window.jspdf;
        
        const labelWidth = 50;
        const labelHeight = 30;
        const margin = 5;
        
        const pdf = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: 'a4'
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        
        let x = margin;
        let y = margin;
        const labelsPerRow = Math.floor((pageWidth - 2 * margin) / labelWidth);
        const rowHeight = labelHeight;

        for (const rack of RACKS) {
            if (rackFilter !== 'all' && rack !== rackFilter) continue;
            for (let level = 1; level <= LEVELS; level++) {
                for (let col = 1; col <= COLUMNS; col++) {
                    const locId = getLocationId(rack, level, col);
                    const displayText = `${rack}-${level}-${col}`;
                    
                    const qr = qrcode(0, 'M');
                    qr.addData(locId);
                    qr.make();
                    const size = 20;
                    const canvas = document.createElement('canvas');
                    const cells = qr.getModuleCount();
                    canvas.width = cells;
                    canvas.height = cells;
                    const ctx = canvas.getContext('2d');
                    const imageData = ctx.createImageData(cells, cells);
                    for (let r = 0; r < cells; r++) {
                        for (let c = 0; c < cells; c++) {
                            const idx = (r * cells + c) * 4;
                            const val = qr.isDark(r, c) ? 0 : 255;
                            imageData.data[idx] = val;
                            imageData.data[idx+1] = val;
                            imageData.data[idx+2] = val;
                            imageData.data[idx+3] = 255;
                        }
                    }
                    ctx.putImageData(imageData, 0, 0);
                    const qrImg = canvas.toDataURL('image/png');
                    
                    pdf.setDrawColor(200);
                    pdf.setLineWidth(0.1);
                    pdf.rect(x, y, labelWidth, labelHeight);
                    
                    pdf.addImage(qrImg, 'PNG', x + 3, y + (labelHeight - size) / 2, size, size);
                    
                    pdf.setFont('Helvetica', 'bold');
                    pdf.setFontSize(12);
                    pdf.text(displayText, x + size + 8, y + labelHeight/2 + 2);
                    pdf.setFontSize(8);
                    pdf.setFont('Helvetica', 'normal');
                    pdf.text(locId, x + size + 8, y + labelHeight/2 + 8);
                    
                    x += labelWidth;
                    if (x + labelWidth > pageWidth - margin) {
                        x = margin;
                        y += rowHeight;
                        if (y + rowHeight > pageHeight - margin) {
                            pdf.addPage();
                            x = margin;
                            y = margin;
                        }
                    }
                }
            }
        }
        
        pdf.save(`etykiety_lokalizacyjne_${rackFilter}.pdf`);
    }

    generateBtn.addEventListener('click', () => {
        renderLabels(rackSelect.value);
    });

    downloadPdfBtn.addEventListener('click', async () => {
        await generatePDF();
    });

    printBtn.addEventListener('click', () => {
        window.print();
    });

    backBtn.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    // Generuj domyślnie dla wszystkich
    renderLabels('all');
</script>
</body>
</html>
