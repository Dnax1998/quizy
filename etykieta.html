<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator etykiet PDF 100x150 mm + BOLD + KOD Z LEWEJ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #f3f4f6; margin: 0; padding: 20px; }
        .app { max-width: 900px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        h1 { margin: 0; color: #1e293b; display: flex; align-items: center; gap: 8px; }
        .btn-back { background: #e2e8f0; color: #1e293b; padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; text-decoration: none; }
        .input-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .input-row input { flex: 1; min-width: 120px; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 40px; font-size: 16px; }
        .input-row .copies-input { max-width: 100px; }
        .btn { padding: 12px 20px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; background: #e2e8f0; color: #1e293b; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-pdf { background: #8b5cf6; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .table-container { margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        th { background: #f1f5f9; padding: 12px; text-align: left; font-weight: 600; color: #334155; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .action-btn { background: none; border: none; font-size: 18px; cursor: pointer; margin: 0 4px; }
        .preview { margin-top: 24px; border-top: 2px dashed #cbd5e1; padding-top: 20px; }
        .label-preview { display: flex; flex-direction: column; align-items: center; }
        .label { 
            width: 100mm; 
            height: 150mm; 
            border: 1px solid #ccc; 
            margin-bottom: 12px; 
            padding: 10mm 8mm; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            align-items: flex-start; 
        }
        .label .code { 
            font-size: 100px; 
            font-weight: 700; 
            line-height: 1.2; 
            text-align: left; 
            margin-left: 0; 
            padding-left: 5mm; 
        }
        .label .quantity { 
            font-size: 80px; 
            font-weight: 700; 
            text-align: center; 
            width: 100%; 
        }
        .label .date { 
            font-size: 65px; 
            font-weight: 700; 
            text-align: center; 
            color: #1e293b; 
            width: 100%; 
        }
        .total-badge { background: #e2e8f0; padding: 2px 10px; border-radius: 20px; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🏷️ Generator etykiet PDF (100x150 mm) – BOLD</h1>
        <button class="btn-back" id="backToWarehouseBtn">⬅️ Powrót do magazynu</button>
    </div>
    
    <div class="input-row">
        <input type="text" id="productCode" placeholder="Kod (np. 896)" autocomplete="off">
        <input type="text" id="quantity" placeholder="Ilość (np. 101)" autocomplete="off">
        <input type="text" id="prodDate" placeholder="Data (np. 26.02.26)" autocomplete="off">
        <input type="number" id="copies" class="copies-input" placeholder="Kopie" min="1" max="50" value="1" style="text-align:center;">
        <button class="btn btn-primary" id="addBtn">➕ Dodaj</button>
    </div>

    <div class="table-container">
        <table id="itemsTable">
            <thead>
                <tr><th>Kod</th><th>Ilość</th><th>Data</th><th style="width:80px;">Akcje</th></tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>

    <div style="display: flex; gap: 12px; justify-content: space-between; flex-wrap: wrap;">
        <div>
            <button class="btn btn-pdf" id="downloadPdfBtn">📥 Pobierz PDF</button>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="btn btn-warning" id="clearBtn">🗑️ Wyczyść listę</button>
            <button class="btn btn-danger" id="deleteAllBtn">❌ Usuń wszystko</button>
        </div>
    </div>

    <div class="preview">
        <h2>📄 Podgląd etykiet <span id="totalCount" class="total-badge"></span></h2>
        <div id="labelPreview" class="label-preview"></div>
    </div>
</div>

<script>
    let items = [];

    const productCodeInp = document.getElementById('productCode');
    const quantityInp = document.getElementById('quantity');
    const prodDateInp = document.getElementById('prodDate');
    const copiesInp = document.getElementById('copies');
    const addBtn = document.getElementById('addBtn');
    const itemsBody = document.getElementById('itemsBody');
    const labelPreview = document.getElementById('labelPreview');
    const totalCount = document.getElementById('totalCount');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');
    const clearBtn = document.getElementById('clearBtn');
    const deleteAllBtn = document.getElementById('deleteAllBtn');
    const backToWarehouseBtn = document.getElementById('backToWarehouseBtn');

    try {
        const saved = localStorage.getItem('etykiety_bold_left_items');
        if (saved) items = JSON.parse(saved);
    } catch(e) {}

    function saveToStorage() {
        localStorage.setItem('etykiety_bold_left_items', JSON.stringify(items));
    }

    function renderTable() {
        if (items.length === 0) {
            itemsBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#64748b;">Brak pozycji. Dodaj powyżej.</td></tr>';
            labelPreview.innerHTML = '<p style="color:#64748b;">Dodaj pozycje, aby zobaczyć podgląd etykiet.</p>';
            totalCount.textContent = '';
            return;
        }

        totalCount.textContent = `Łącznie: ${items.length} etykiet`;

        let html = '';
        items.forEach((item, index) => {
            html += `<tr>
                <td><strong>${item.code || '—'}</strong></td>
                <td>${item.qty || '—'}</td>
                <td>${item.date || '—'}</td>
                <td>
                    <button class="action-btn" data-index="${index}" data-action="edit">✏️</button>
                    <button class="action-btn" data-index="${index}" data-action="remove">🗑️</button>
                </td>
            </tr>`;
        });
        itemsBody.innerHTML = html;

        let previewHtml = '';
        items.forEach(item => {
            previewHtml += `
                <div class="label">
                    <div class="code">${item.code || ''}</div>
                    <div class="quantity">${item.qty || ''}</div>
                    <div class="date">${item.date || ''}</div>
                </div>
            `;
        });
        labelPreview.innerHTML = previewHtml;

        document.querySelectorAll('[data-action="edit"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = e.target.dataset.index;
                const item = items[index];
                productCodeInp.value = item.code || '';
                quantityInp.value = item.qty || '';
                prodDateInp.value = item.date || '';
                copiesInp.value = 1;
                items.splice(index, 1);
                saveToStorage();
                renderTable();
            });
        });
        document.querySelectorAll('[data-action="remove"]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = e.target.dataset.index;
                items.splice(index, 1);
                saveToStorage();
                renderTable();
            });
        });
    }

    addBtn.addEventListener('click', () => {
        const code = productCodeInp.value.trim();
        const qty = quantityInp.value.trim();
        const date = prodDateInp.value.trim();
        let copies = parseInt(copiesInp.value);
        if (isNaN(copies) || copies < 1) copies = 1;
        if (copies > 50) copies = 50;

        if (!code || !qty || !date) {
            alert('Wypełnij wszystkie pola');
            return;
        }

        for (let i = 0; i < copies; i++) {
            items.push({ code, qty, date });
        }

        productCodeInp.value = '';
        quantityInp.value = '';
        prodDateInp.value = '';
        copiesInp.value = 1;

        saveToStorage();
        renderTable();
        productCodeInp.focus();
    });

    clearBtn.addEventListener('click', () => {
        if (confirm('Czy na pewno wyczyścić całą listę?')) {
            items = [];
            saveToStorage();
            renderTable();
        }
    });

    deleteAllBtn.addEventListener('click', () => {
        if (confirm('Usunąć wszystkie dane (lokalnie)?')) {
            items = [];
            saveToStorage();
            renderTable();
        }
    });

    downloadPdfBtn.addEventListener('click', () => {
        if (items.length === 0) {
            alert('Brak etykiet do wygenerowania PDF.');
            return;
        }

        const { jsPDF } = window.jspdf;
        const pageWidth = 100;
        const pageHeight = 150;

        const pdf = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: [pageWidth, pageHeight]
        });

        for (let i = 0; i < items.length; i++) {
            const item = items[i];
            if (i > 0) {
                pdf.addPage([pageWidth, pageHeight]);
            }

            pdf.setFont('Helvetica', 'bold');
            
            // KOD PRODUKTU – przesunięty w lewo (pozycja X = 15 mm od lewej)
            pdf.setFontSize(100);
            pdf.text(item.code, 15, 65, { align: 'left' });
            
            pdf.setFontSize(80);
            pdf.text(item.qty, pageWidth / 2, 100, { align: 'center' });
            
            pdf.setFontSize(65);
            pdf.text(item.date, pageWidth / 2, 130, { align: 'center' });
        }

        pdf.save(`etykiety_${new Date().toISOString().slice(0,10)}.pdf`);
    });

    prodDateInp.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addBtn.click();
    });

    backToWarehouseBtn.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    renderTable();
</script>
</body>
</html>
