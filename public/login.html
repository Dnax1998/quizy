<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie - Metin2 Escrow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><a href="/">🏠 Strona główna</a></nav>
    <main class="form-container">
        <h2>Logowanie</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Login" required>
            <input type="password" id="password" placeholder="Hasło" required>
            <button type="submit">Zaloguj</button>
        </form>
        <p>Nie masz konta? <a href="register.html">Zarejestruj się</a></p>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) {
                alert('Zalogowano pomyślnie');
                window.location.href = '/';
            } else {
                const err = await res.json();
                alert('Błąd: ' + err.error);
            }
        });
    </script>
</body>
</html>
