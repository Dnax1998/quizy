<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Wystaw przedmiot - Metin2 Escrow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><a href="/">🏠 Strona główna</a> | <a href="dashboard.html">Moje transakcje</a></nav>
    <main class="form-container">
        <h2>Wystaw item na sprzedaż</h2>
        <form id="offerForm">
            <input type="text" id="server" placeholder="Serwer (np. Barbarian)" required>
            <input type="text" id="item_name" placeholder="Nazwa przedmiotu" required>
            <input type="number" id="price" placeholder="Cena w zł" required min="1">
            <textarea id="description" placeholder="Opis (opcjonalnie)"></textarea>
            <button type="submit">Wystaw</button>
        </form>
    </main>
    <script>
        document.getElementById('offerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const server = document.getElementById('server').value;
            const item_name = document.getElementById('item_name').value;
            const price = parseInt(document.getElementById('price').value);
            const description = document.getElementById('description').value;
            const res = await fetch('/api/offer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ server, item_name, price, description })
            });
            if (res.ok) {
                alert('Oferta wystawiona!');
                window.location.href = '/';
            } else {
                const err = await res.json();
                alert('Błąd: ' + err.error);
            }
        });
    </script>
</body>
</html>
