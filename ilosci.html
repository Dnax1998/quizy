<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stan Etykiet - Zsynchronizowany</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f4f6f9; margin: 0; padding: 20px; }
        .app { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        h1 { margin: 0; color: #1e293b; font-size: 1.8rem; }
        .btn-back { background: #e2e8f0; color: #1e293b; padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .search-box { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .btn-adj { padding: 8px 12px; border: 1px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; margin: 2px; }
        .btn-del { color: #e11d48; border-color: #fecaca; background: #fff1f2; font-weight: bold; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>📦 Stan Magazynowy (Synchronizacja)</h1>
        <button class="btn-back" id="backBtn">⬅️ Powrót</button>
    </div>
    
    <input type="text" id="searchBar" class="search-box" placeholder="🔍 Szukaj produktu w magazynie...">

    <table>
        <thead>
            <tr>
                <th>Kod</th>
                <th>Nazwa</th>
                <th>Sztuki</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="4">Pobieranie...</td></tr></tbody>
    </table>
</div>

<div id="toast" class="toast-msg">Zaktualizowano</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allProducts = {};

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    // POBIERANIE DANYCH Z MAGAZYNU (KOLEKCJA SLOTS)
    async function loadData() {
        allProducts = {};
        const slots = await db.collection("slots").get();
        for (const slot of slots.docs) {
            const batches = await slot.ref.collection("batches").get();
            batches.forEach(batch => {
                const b = batch.data();
                const name = b.productName || "Nieznany";
                if (!allProducts[name]) {
                    allProducts[name] = { code: b.productCode || '-', pieces: 0, refs: [] };
                }
                allProducts[name].pieces += parseInt(b.pieces || 0);
                allProducts[name].refs.push({ slotId: slot.id, batchId: batch.id });
            });
        }
        render();
    }

    function render() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        Object.keys(allProducts).forEach(name => {
            if (name.toLowerCase().includes(query) || allProducts[name].code.toLowerCase().includes(query)) {
                const item = allProducts[name];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.code}</td>
                    <td>${name}</td>
                    <td><strong>${item.pieces}</strong></td>
                    <td>
                        <button class="btn-adj" onclick="adjust('${name}', 10)">+10</button>
                        <button class="btn-adj" onclick="adjust('${name}', -10)">-10</button>
                    </td>
                `;
                tbody.appendChild(row);
            }
        });
    }

    window.adjust = async (name, delta) => {
        const target = allProducts[name].refs[0];
        if (!target) return;
        const ref = db.collection("slots").doc(target.slotId).collection("batches").doc(target.batchId);
        const doc = await ref.get();
        await ref.update({ pieces: Math.max(0, parseInt(doc.data().pieces || 0) + delta) });
        showToast('Zaktualizowano stan w magazynie');
        loadData();
    };

    document.getElementById('searchBar').addEventListener('input', render);
    document.getElementById('backBtn').addEventListener('click', () => window.location.href = 'index.html');

    loadData();
</script>
</body>
</html>
