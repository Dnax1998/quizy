<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stan Etykiet do Oklejenia</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f4f6f9; margin: 0; padding: 20px; }
        .app { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .btn-adj { padding: 6px 10px; border: 1px solid #cbd5e1; background: #fff; cursor: pointer; border-radius: 6px; }
        .btn-del { color: #dc2626; border-color: #fecaca; background: #fef2f2; font-weight: bold; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>📦 Stan Etykiet</h1>
        <button onclick="window.location.href='index.html'">⬅️ Powrót</button>
    </div>

    <input type="text" id="searchBar" class="search-box" placeholder="🔍 Szukaj produktu...">

    <table>
        <thead>
            <tr>
                <th>Kod</th>
                <th>Nazwa</th>
                <th>Ilość</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="toast" class="toast">Zaktualizowano</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let stocks = {};

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    }

    // Pobieranie danych
    db.collection("labelStocks").onSnapshot(snapshot => {
        stocks = {};
        snapshot.forEach(doc => stocks[doc.id] = { id: doc.id, ...doc.data() });
        render();
    });

    function render() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        Object.values(stocks).forEach(item => {
            if(item.productName?.toLowerCase().includes(query)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.productCode || '-'}</td>
                    <td>${item.productName || 'Brak'}</td>
                    <td><strong>${item.qty || 0}</strong></td>
                    <td>
                        <button class="btn-adj" onclick="update('${item.id}', -1)">-1</button>
                        <button class="btn-adj" onclick="update('${item.id}', 1)">+1</button>
                        <button class="btn-adj btn-del" onclick="remove('${item.id}')">❌ Usuń</button>
                    </td>
                `;
                tbody.appendChild(row);
            }
        });
    }

    window.update = async (id, delta) => {
        const current = stocks[id].qty || 0;
        await db.collection("labelStocks").doc(id).set({ qty: Math.max(0, current + delta) }, { merge: true });
        showToast('Zmieniono ilość');
    };

    window.remove = async (id) => {
        if(confirm('Na pewno usunąć?')) {
            await db.collection("labelStocks").doc(id).delete();
            showToast('Usunięto rekord');
        }
    };

    document.getElementById('searchBar').addEventListener('input', render);
</script>

</body>
</html>
