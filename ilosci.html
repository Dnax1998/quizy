<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stan Etykiet - Integracja z Magazynem</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f4f6f9; margin: 0; padding: 20px; }
        .app { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        h1 { margin: 0; color: #1e293b; font-size: 1.6rem; }
        .btn-back { background: #e2e8f0; color: #1e293b; padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 40px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .qty-badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>📦 Stan Etykiet (zsynchronizowany z magazynem)</h1>
        <button class="btn-back" onclick="window.location.href='index.html'">⬅️ Powrót</button>
    </div>
    
    <input type="text" id="searchBar" class="search-box" placeholder="🔍 Szukaj produktu...">

    <table>
        <thead>
            <tr>
                <th>Kod</th>
                <th>Nazwa Produktu</th>
                <th>Sztuki w Magazynie</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Funkcja pobierająca dane dokładnie tak jak Twój magazyn
    async function loadData() {
        const warehouseMap = {}; // Mapowanie: nazwa -> suma sztuk
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="3">Ładowanie danych...</td></tr>';

        const slots = await db.collection("slots").get();
        for (const slot of slots.docs) {
            const batches = await slot.ref.collection("batches").get();
            batches.forEach(batch => {
                const data = batch.data();
                const name = data.productName || "Bez nazwy";
                if (!warehouseMap[name]) {
                    warehouseMap[name] = { code: data.productCode || '-', qty: 0 };
                }
                warehouseMap[name].qty += parseInt(data.pieces || 0);
            });
        }
        render(warehouseMap);
    }

    function render(data) {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        Object.keys(data).forEach(name => {
            if (name.toLowerCase().includes(query) || data[name].code.toLowerCase().includes(query)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data[name].code}</td>
                    <td>${name}</td>
                    <td><span class="qty-badge">${data[name].qty} szt</span></td>
                `;
                tbody.appendChild(row);
            }
        });
    }

    document.getElementById('searchBar').addEventListener('input', () => loadData());
    loadData();
</script>

</body>
</html>
