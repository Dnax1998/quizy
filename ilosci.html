<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stan Etykiet</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
    *{
        box-sizing:border-box;
        font-family:'Segoe UI',sans-serif;
    }

    body{
        margin:0;
        padding:20px;
        background:#f4f6f9;
    }

    .container{
        max-width:1000px;
        margin:auto;
    }

    h1{
        margin-bottom:20px;
        color:#1e293b;
    }

    .card{
        background:white;
        border-radius:24px;
        padding:24px;
        box-shadow:0 8px 20px rgba(0,0,0,0.05);
        margin-bottom:20px;
    }

    .form-row{
        display:grid;
        grid-template-columns:1fr 1fr auto;
        gap:12px;
        margin-bottom:20px;
    }

    input, select{
        padding:14px;
        border-radius:16px;
        border:1px solid #cbd5e1;
        font-size:15px;
    }

    button{
        border:none;
        border-radius:16px;
        padding:14px 20px;
        cursor:pointer;
        font-weight:600;
    }

    .btn-primary{
        background:#2563eb;
        color:white;
    }

    .btn-danger{
        background:#ef4444;
        color:white;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th{
        text-align:left;
        padding:12px;
        background:#f1f5f9;
    }

    td{
        padding:12px;
        border-bottom:1px solid #e2e8f0;
    }

    tr:hover{
        background:#f8fafc;
    }

    .low{
        color:#dc2626;
        font-weight:700;
    }

    .good{
        color:#16a34a;
        font-weight:700;
    }

    .actions{
        display:flex;
        gap:8px;
    }

    .small-btn{
        padding:8px 12px;
        border-radius:10px;
        font-size:13px;
    }

</style>
</head>

<body>

<div class="container">

    <h1>🏷️ Stan Etykiet</h1>

    <div class="card">

        <div class="form-row">

            <select id="productSelect">
                <option value="">-- Wybierz produkt --</option>
            </select>

            <input type="number" id="labelsCount" placeholder="Ilość etykiet">

            <button class="btn-primary" id="addLabelsBtn">
                ➕ Dodaj
            </button>

        </div>

    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>Produkt</th>
                    <th>Kod</th>
                    <th>Stan etykiet</th>
                    <th>Status</th>
                    <th>Akcje</th>
                </tr>
            </thead>

            <tbody id="labelsTableBody">
                <tr>
                    <td colspan="5">
                        Ładowanie...
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

<script>

    // ========= FIREBASE =========

    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);

    const db = firebase.firestore();

    // ========= ELEMENTY =========

    const productSelect = document.getElementById('productSelect');
    const labelsCount = document.getElementById('labelsCount');
    const addLabelsBtn = document.getElementById('addLabelsBtn');
    const labelsTableBody = document.getElementById('labelsTableBody');

    let productsList = [];
    let labelsStock = [];

    // ========= PRODUKTY =========

    function subscribeProducts(){

        db.collection("products")
        .onSnapshot(snapshot => {

            productsList = [];

            snapshot.forEach(doc => {

                productsList.push({
                    id: doc.id,
                    ...doc.data()
                });

            });

            renderProductsSelect();

        });

    }

    function renderProductsSelect(){

        productSelect.innerHTML =
        '<option value="">-- Wybierz produkt --</option>';

        productsList.forEach(prod => {

            productSelect.innerHTML += `
                <option value="${prod.id}">
                    ${prod.name} (${prod.code || 'brak kodu'})
                </option>
            `;

        });

    }

    // ========= ETYKIETY =========

    function subscribeLabels(){

        db.collection("labelsStock")
        .onSnapshot(snapshot => {

            labelsStock = [];

            snapshot.forEach(doc => {

                labelsStock.push({
                    id: doc.id,
                    ...doc.data()
                });

            });

            renderLabelsTable();

        });

    }

    function renderLabelsTable(){

        if(labelsStock.length === 0){

            labelsTableBody.innerHTML = `
                <tr>
                    <td colspan="5">
                        Brak etykiet
                    </td>
                </tr>
            `;

            return;
        }

        let html = '';

        labelsStock.forEach(item => {

            const low = item.quantity <= 200;

            html += `
                <tr>

                    <td>${item.productName}</td>

                    <td>${item.productCode || '—'}</td>

                    <td class="${low ? 'low' : 'good'}">
                        ${item.quantity}
                    </td>

                    <td>
                        ${low ? '🔴 Mało etykiet' : '🟢 OK'}
                    </td>

                    <td>

                        <div class="actions">

                            <button 
                                class="btn-primary small-btn add-more-btn"
                                data-id="${item.id}">
                                ➕ Dodaj
                            </button>

                            <button 
                                class="btn-danger small-btn delete-btn"
                                data-id="${item.id}">
                                🗑️ Usuń
                            </button>

                        </div>

                    </td>

                </tr>
            `;

        });

        labelsTableBody.innerHTML = html;

        bindButtons();

    }

    // ========= DODAWANIE =========

    addLabelsBtn.addEventListener('click', async () => {

        const productId = productSelect.value;
        const quantity = parseInt(labelsCount.value);

        if(!productId){

            alert('Wybierz produkt');
            return;

        }

        if(!quantity || quantity <= 0){

            alert('Podaj ilość');
            return;

        }

        const product = productsList.find(p => p.id === productId);

        if(!product){

            alert('Nie znaleziono produktu');
            return;

        }

        const existing = labelsStock.find(
            l => l.productId === productId
        );

        try{

            if(existing){

                await db.collection("labelsStock")
                .doc(existing.id)
                .update({

                    quantity:
                        (existing.quantity || 0)
                        + quantity

                });

            }else{

                await db.collection("labelsStock")
                .add({

                    productId: product.id,
                    productName: product.name,
                    productCode: product.code || '',
                    quantity: quantity,
                    createdAt:
                        firebase.firestore.FieldValue.serverTimestamp()

                });

            }

            labelsCount.value = '';

            alert('Dodano etykiety');

        }catch(err){

            alert(err.message);

        }

    });

    // ========= BUTTONY =========

    function bindButtons(){

        document.querySelectorAll('.delete-btn')
        .forEach(btn => {

            btn.addEventListener('click', async () => {

                if(!confirm('Usunąć?')) return;

                try{

                    await db.collection("labelsStock")
                    .doc(btn.dataset.id)
                    .delete();

                }catch(err){

                    alert(err.message);

                }

            });

        });

        document.querySelectorAll('.add-more-btn')
        .forEach(btn => {

            btn.addEventListener('click', async () => {

                const value = prompt('Ile dodać etykiet?');

                if(value === null) return;

                const qty = parseInt(value);

                if(!qty || qty <= 0){

                    alert('Niepoprawna ilość');
                    return;

                }

                const item = labelsStock.find(
                    x => x.id === btn.dataset.id
                );

                if(!item) return;

                try{

                    await db.collection("labelsStock")
                    .doc(item.id)
                    .update({

                        quantity:
                            (item.quantity || 0)
                            + qty

                    });

                }catch(err){

                    alert(err.message);

                }

            });

        });

    }

    // ========= START =========

    subscribeProducts();
    subscribeLabels();

</script>

</body>
</html>
