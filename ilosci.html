<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stan Etykiet - Wyszukiwanie</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .app { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        .search-area { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; }
        .btn { background: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app">
    <h1>🏷️ Stan Etykiet</h1>
    <div class="search-area">
        <label>Automatyczne wyszukiwanie produktu:</label>
        <input type="text" id="productFilter" placeholder="Wpisz nazwę produktu..." oninput="filterProducts()">
        <select id="productSelect"><option value="">-- Wybierz z przefiltrowanych --</option></select>
        <input type="number" id="labelQty" placeholder="Ilość etykiet">
        <button class="btn" id="saveBtn">Zapisz stan</button>
    </div>
</div>

<script>
    const firebaseConfig = { /* Wklej tutaj ponownie swój config */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allProducts = [];

    // Pobierz produkty raz przy starcie
    db.collection("products").get().then(snap => {
        allProducts = snap.docs.map(doc => ({ id: doc.id, name: doc.data().name }));
        filterProducts(); // Wyświetl wszystko na starcie
    });

    function filterProducts() {
        const query = document.getElementById('productFilter').value.toLowerCase();
        const select = document.getElementById('productSelect');
        select.innerHTML = '<option value="">-- Wybierz produkt --</option>';
        
        allProducts.filter(p => p.name.toLowerCase().includes(query)).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            select.appendChild(opt);
        });
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
        const id = document.getElementById('productSelect').value;
        const qty = parseInt(document.getElementById('labelQty').value);
        if(!id) return alert("Wybierz produkt!");
        await db.collection("labelStocks").doc(id).set({ qty: qty }, { merge: true });
        alert("Zapisano!");
    });
</script>
</body>
</html>
