<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stan Etykiet do Oklejenia</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f4f6f9; margin: 0; padding: 20px; }
        .app { max-width: 1000px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        h1 { margin: 0; color: #1e293b; display: flex; align-items: center; gap: 8px; font-size: 1.8rem; }
        .btn-back { background: #e2e8f0; color: #1e293b; padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-back:hover { background: #cbd5e1; }
        
        .form-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .form-box h3 { margin-top: 0; margin-bottom: 14px; color: #334155; }
        .input-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .input-group { flex: 1; min-width: 180px; display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 14px; font-weight: 600; color: #475569; }
        .input-group input { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 40px; font-size: 16px; width: 100%; background: white; }
        
        .btn { padding: 12px 24px; border-radius: 40px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.15s; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        
        .search-bar { margin-bottom: 16px; }
        .search-box { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 40px; }

        .table-container { margin: 20px 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        th { background: #f1f5f9; padding: 14px; text-align: left; font-weight: 600; color: #334155; font-size: 15px; }
        td { padding: 14px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; font-size: 15px; }
        tr:hover { background: #f8fafc; }
        
        .qty-badge { background: #fee2e2; color: #991b1b; padding: 6px 12px; border-radius: 40px; font-weight: 700; font-size: 16px; display: inline-block; min-width: 60px; text-align: center; }
        .qty-badge.good { background: #dcfce7; color: #166534; }
        
        .quick-actions { display: flex; gap: 4px; }
        .btn-adj { padding: 6px 10px; font-size: 12px; font-weight: 700; border: 1px solid #cbd5e1; background: white; border-radius: 6px; cursor: pointer; color: #334155; }
        .btn-adj:hover { background: #e2e8f0; }
        .btn-adj.plus { color: #166534; border-color: #bbf7d0; background: #f0fdf4; }
        .btn-adj.plus:hover { background: #dcfce7; }
        
        .action-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
        .action-btn:hover { background: #e2e8f0; }
        
        .total-badge { background: #2563eb; color: white; padding: 4px 12px; border-radius: 40px; font-size: 14px; font-weight: 600; }
        .alert-row { background: #fff7ed; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🏷️ Stan Etykiet na Oklejenie <span id="totalCount" class="total-badge">0 rodzajów</span></h1>
        <button class="btn-back" id="backToWarehouseBtn">⬅️ Powrót do magazynu</button>
    </div>
    
    <div class="form-box">
        <h3>➕ Wprowadź nowy stan etykiet</h3>
        <div class="input-row">
            <div class="input-group">
                <label for="productCode">Kod produktu / artykułu</label>
                <input type="text" id="productCode" placeholder="np. IND-12345 lub 067" autocomplete="off">
            </div>
            <div class="input-group" style="flex: 1.5;">
                <label for="productName">Nazwa produktu</label>
                <input type="text" id="productName" placeholder="np. Dezodorant męski Black" autocomplete="off">
            </div>
            <div class="input-group" style="max-width: 150px;">
                <label for="labelQty">Liczba etykiet</label>
                <input type="number" id="labelQty" placeholder="np. 500" min="0" value="0" style="text-align: center;">
            </div>
            <button class="btn btn-primary" id="addBtn">Zapisz / Dodaj</button>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" id="searchBar" class="search-box" placeholder="🔍 Szukaj po kodzie lub nazwie produktu..." autocomplete="off">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Kod</th>
                    <th>Nazwa produktu</th>
                    <th style="width: 110px; text-align: center;">Stan etykiet</th>
                    <th style="width: 220px; text-align: center;">Szybka korekta</th>
                    <th style="width: 90px; text-align: center;">Akcje</th>
                </tr>
            </thead>
            <tbody id="labelsTableBody"></tbody>
        </table>
    </div>

    <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
        <button class="btn btn-danger" id="clearAllBtn">❌ Usuń całą bazę etykiet</button>
    </div>
</div>

<script>
    let labelStocks = [];

    const productCodeInp = document.getElementById('productCode');
    const productNameInp = document.getElementById('productName');
    const labelQtyInp = document.getElementById('labelQty');
    const addBtn = document.getElementById('addBtn');
    const labelsTableBody = document.getElementById('labelsTableBody');
    const totalCount = document.getElementById('totalCount');
    const searchBar = document.getElementById('searchBar');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const backToWarehouseBtn = document.getElementById('backToWarehouseBtn');

    // Wczytywanie danych z localStorage
    try {
        const saved = localStorage.getItem('magazyn_stan_etykiet_oklejenie');
        if (saved) labelStocks = JSON.parse(saved);
    } catch(e) { console.error("Błąd wczytywania bazy etykiet", e); }

    function saveToStorage() {
        localStorage.setItem('magazyn_stan_etykiet_oklejenie', JSON.stringify(labelStocks));
    }

    // Renderowanie tabeli
    function renderTable() {
        const query = searchBar.value.trim().toLowerCase();
        
        // Filtrowanie wyników wyszukiwania
        const filteredItems = labelStocks.filter(item => 
            (item.code || '').toLowerCase().includes(query) || 
            (item.name || '').toLowerCase().includes(query)
        );

        totalCount.textContent = `${labelStocks.length} rodzajów`;

        if (filteredItems.length === 0) {
            labelsTableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#64748b; padding: 30px;">Brak etykiet w bazie pasujących do kryteriów.</td></tr>`;
            return;
        }

        // Sortowanie alfabetyczne po nazwie
        filteredItems.sort((a,b) => (a.name || '').localeCompare(b.name || ''));

        let html = '';
        filteredItems.forEach((item) => {
            const isLow = item.qty <= 50; // Ostrzeżenie przy niskim stanie etykiet
            const badgeClass = isLow ? 'qty-badge' : 'qty-badge good';
            const rowClass = isLow ? 'alert-row' : '';

            html += `<tr class="${rowClass}">
                <td><strong>${item.code || '—'}</strong></td>
                <td>${item.name || '—'}</td>
                <td style="text-align: center;"><span class="${badgeClass}">${item.qty} szt</span></td>
                <td>
                    <div class="quick-actions" style="justify-content: center;">
                        <button class="btn-adj" onclick="adjustQty('${item.id}', -50)">-50</button>
                        <button class="btn-adj" onclick="adjustQty('${item.id}', -10)">-10</button>
                        <button class="btn-adj plus" onclick="adjustQty('${item.id}', 10)">+10</button>
                        <button class="btn-adj plus" onclick="adjustQty('${item.id}', 50)">+50</button>
                        <button class="btn-adj plus" onclick="adjustQty('${item.id}', 100)">+100</button>
                    </div>
                </td>
                <td style="text-align: center;">
                    <button class="action-btn" title="Edytuj" onclick="editItem('${item.id}')">✏️</button>
                    <button class="action-btn" title="Usuń" style="color: #ef4444;" onclick="deleteItem('${item.id}')">🗑️</button>
                </td>
            </tr>`;
        });
        labelsTableBody.innerHTML = html;
    }

    // Dodawanie lub aktualizacja stanu etykiet
    addBtn.addEventListener('click', () => {
        const code = productCodeInp.value.trim();
        const name = productNameInp.value.trim();
        let qty = parseInt(labelQtyInp.value);

        if (isNaN(qty) || qty < 0) qty = 0;
        if (!code || !name) {
            alert('Wprowadź kod oraz nazwę produktu!');
            return;
        }

        // Sprawdzenie czy produkt o tym kodzie już istnieje w bazie etykiet
        const existingItem = labelStocks.find(item => item.code.toLowerCase() === code.toLowerCase());
        
        if (existingItem) {
            if (confirm(`Produkt o kodzie ${code} istnieje już w bazie. Czy chcesz nadpisać jego stan etykiet na wartość: ${qty} szt?`)) {
                existingItem.name = name;
                existingItem.qty = qty;
            } else {
                return;
            }
        } else {
            // Dodawanie nowego rekordu
            labelStocks.push({
                id: 'id_' + Date.now() + Math.random().toString(36).substr(2, 5),
                code: code,
                name: name,
                qty: qty
            });
        }

        // Czyszczenie pól formularza
        productCodeInp.value = '';
        productNameInp.value = '';
        labelQtyInp.value = '0';

        saveToStorage();
        renderTable();
        productCodeInp.focus();
    });

    // Szybka korekta przyciskami +/-
    window.adjustQty = function(id, amount) {
        const item = labelStocks.find(i => i.id === id);
        if (item) {
            item.qty = Math.max(0, item.qty + amount); // Stan nie może spaść poniżej 0
            saveToStorage();
            renderTable();
        }
    };

    // Edycja elementu
    window.editItem = function(id) {
        const item = labelStocks.find(i => i.id === id);
        if (item) {
            productCodeInp.value = item.code;
            productNameInp.value = item.name;
            labelQtyInp.value = item.qty;
            
            // Usuwamy stary rekord, użytkownik kliknie "Zapisz", aby wprowadzić go na nowo
            labelStocks = labelStocks.filter(i => i.id !== id);
            saveToStorage();
            renderTable();
            productCodeInp.focus();
        }
    };

    // Usuwanie pojedynczego elementu
    window.deleteItem = function(id) {
        if (confirm('Czy na pewno chcesz usunąć ten produkt z bazy etykiet?')) {
            labelStocks = labelStocks.filter(i => i.id !== id);
            saveToStorage();
            renderTable();
        }
    };

    // Filtrowanie tabeli na bieżąco podczas wpisywania w wyszukiwarkę
    searchBar.addEventListener('input', renderTable);

    // Usuwanie całej lokalnej bazy danych
    clearAllBtn.addEventListener('click', () => {
        if (confirm('🚨 UWAGA! Czy na pewno chcesz całkowicie wyczyścić bazę ilości etykiet do oklejenia? Tej operacji nie da się cofnąć.')) {
            labelStocks = [];
            saveToStorage();
            renderTable();
        }
    });

    // Powrót do głównego widoku
    backToWarehouseBtn.addEventListener('click', () => {
        window.location.href = 'index.html';
    });

    // Obsługa kliknięcia Enter w formularzu
    labelQtyInp.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addBtn.click();
    });

    // Pierwsze uruchomienie
    renderTable();
</script>
</body>
</html>
