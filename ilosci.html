<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stan Etykiet do Oklejenia (Firebase)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #f4f6f9; margin: 0; padding: 20px; }
        .app { max-width: 1100px; margin: 0 auto; background: white; border-radius: 24px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        h1 { margin: 0; color: #1e293b; font-size: 1.8rem; }
        .btn-back { background: #e2e8f0; color: #1e293b; padding: 10px 18px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .search-box { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 16px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; }
        th { background: #f1f5f9; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .btn-adj { padding: 8px 12px; border: 1px solid #cbd5e1; background: white; border-radius: 8px; cursor: pointer; margin: 2px; }
        .btn-del { color: #e11d48; border-color: #fecaca; background: #fff1f2; font-weight: bold; }
        .toast-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 40px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>📦 Stan Magazynowy (szczytane z index.html)</h1>
        <button class="btn-back" id="backToWarehouseBtn">⬅️ Powrót</button>
    </div>
    
    <input type="text" id="searchBar" class="search-box" placeholder="🔍 Szukaj produktu...">

    <table id="stocksTable">
        <thead>
            <tr>
                <th>Kod</th>
                <th>Nazwa produktu</th>
                <th>Sztuki</th>
                <th>Kartony</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody id="labelsTableBody">
            <tr><td colspan="5" style="text-align:center;">Pobieranie danych z magazynu...</td></tr>
        </tbody>
    </table>
</div>

<div id="toast" class="toast-msg">Zaktualizowano</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbMTVozOhIXesvF59REYnIOtmo-V5qimk",
        authDomain: "forevermagazyn.firebaseapp.com",
        projectId: "forevermagazyn",
        storageBucket: "forevermagazyn.firebasestorage.app",
        messagingSenderId: "251843942343",
        appId: "1:251843942343:web:2c81227b12ab4ad0052be2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let warehouseData = {}; 

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 2000);
    }

    // GŁÓWNA LOGIKA: Pobieranie z kolekcji "slots" (tak jak w index.html)
    async function loadWarehouseData() {
        const data = {};
        const slots = await db.collection("slots").get();
        
        for (const slot of slots.docs) {
            const batches = await slot.ref.collection("batches").get();
            batches.forEach(batch => {
                const bData = batch.data();
                const pName = bData.productName || "Brak nazwy";
                if (!data[pName]) {
                    data[pName] = { code: bData.productCode || '-', pieces: 0, cartons: 0, ids: [] };
                }
                data[pName].pieces += parseInt(bData.pieces || 0);
                data[pName].cartons += parseInt(bData.cartons || 0);
                data[pName].ids.push({ slotId: slot.id, batchId: batch.id });
            });
        }
        warehouseData = data;
        renderTable();
    }

    function renderTable() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const tbody = document.getElementById('labelsTableBody');
        tbody.innerHTML = '';

        Object.keys(warehouseData).forEach(name => {
            const item = warehouseData[name];
            if (name.toLowerCase().includes(query) || item.code.toLowerCase().includes(query)) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.code}</td>
                    <td>${name}</td>
                    <td><strong>${item.pieces}</strong></td>
                    <td>${item.cartons}</td>
                    <td>
                        <button class="btn-adj" onclick="adjust('${name}', 10)">+10</button>
                        <button class="btn-adj" onclick="adjust('${name}', -10)">-10</button>
                        <button class="btn-adj btn-del" onclick="clearProduct('${name}')">❌ Usuń</button>
                    </td>
                `;
                tbody.appendChild(row);
            }
        });
    }

    // Funkcja modyfikująca dane w bazie (działa na pierwszym znalezionym batchu danego produktu)
    window.adjust = async function(name, delta) {
        const target = warehouseData[name].ids[0];
        if (!target) return;
        
        const docRef = db.collection("slots").doc(target.slotId).collection("batches").doc(target.batchId);
        const doc = await docRef.get();
        const newPieces = Math.max(0, parseInt(doc.data().pieces || 0) + delta);
        
        await docRef.update({ pieces: newPieces });
        showToast('Zmieniono sztuki');
        loadWarehouseData(); // Odśwież widok
    };

    window.clearProduct = async function(name) {
        if(!confirm('Czy na pewno wyczyścić ten produkt?')) return;
        // Pętla usuwająca wszystkie batche danego produktu
        for(let target of warehouseData[name].ids) {
            await db.collection("slots").doc(target.slotId).collection("batches").doc(target.batchId).delete();
        }
        showToast('Usunięto produkt');
        loadWarehouseData();
    };

    document.getElementById('searchBar').addEventListener('input', renderTable);
    document.getElementById('backToWarehouseBtn').addEventListener('click', () => window.location.href = 'index.html');

    // Start
    loadWarehouseData();
</script>

</body>
</html>
